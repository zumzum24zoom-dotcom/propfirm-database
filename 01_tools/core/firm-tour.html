<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Firm Tour</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0e17; color: #c8d6e5; font-family: 'JetBrains Mono', monospace, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ヘッダー */
.header { padding: 10px 16px; border-bottom: 1px solid #1e2d3d; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
h1 { color: #00d4aa; font-size: 15px; white-space: nowrap; }
.stats { color: #636e7b; font-size: 11px; display: flex; gap: 12px; }
.stats span { color: #00d4aa; font-weight: bold; }
.controls { display: flex; gap: 6px; margin-left: auto; }
button { background: #111827; border: 1px solid #1e2d3d; color: #c8d6e5; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 11px; white-space: nowrap; }
button:hover { border-color: #00d4aa; color: #00d4aa; }
.btn-next { background: #f0b90b; color: #0a0e17; border-color: #f0b90b; font-weight: bold; }
.btn-next:hover { background: #d4a009; color: #0a0e17; }

/* 2カラムレイアウト */
.body { display: flex; flex: 1; overflow: hidden; }

/* 左: ファームリスト */
.firm-list-wrap { width: 300px; flex-shrink: 0; overflow-y: auto; border-right: 1px solid #1e2d3d; padding: 8px; display: flex; flex-direction: column; gap: 3px; }
.firm-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; transition: all .15s; }
.firm-item:hover { background: #131c2e; border-color: #1e2d3d; }
.firm-item.selected { background: #0d1f3a; border-color: #3b82f6; }
.firm-item.done { background: #061a0f; border-color: #166534; }
.firm-item.done .firm-name { color: #4ade80; }
.firm-item.done .firm-num { color: #166534; }
.firm-num { color: #636e7b; font-size: 10px; min-width: 18px; text-align: right; flex-shrink: 0; }
input[type=checkbox] { width: 14px; height: 14px; accent-color: #22c55e; cursor: pointer; flex-shrink: 0; }
.firm-name { font-size: 12px; flex: 1; }
.done-mark { color: #22c55e; font-size: 12px; flex-shrink: 0; }
.firm-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
.badge-plans { background: #1e3a5f; color: #60a5fa; }
.badge-data { background: #1a3a2a; color: #34d399; }
.badge-empty { background: #1a1a1a; color: #636e7b; }
.badge-manual { background: #3a1a0a; color: #f97316; border: 1px solid #7c2d12; }

/* 右: URL詳細パネル */
.detail-wrap { flex: 1; overflow-y: auto; padding: 16px; }
.detail-empty { color: #636e7b; font-size: 13px; padding: 40px; text-align: center; }
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1e2d3d; }
.detail-slug { color: #7dd3fc; font-size: 16px; font-weight: bold; }
.detail-actions { display: flex; gap: 8px; margin-left: auto; }
a.open-btn { background: #1e3a5f; border: 1px solid #3b82f6; color: #60a5fa; padding: 5px 12px; border-radius: 5px; font-size: 11px; text-decoration: none; font-family: inherit; white-space: nowrap; }
a.open-btn:hover { background: #2a4a6f; }
.copy-all-btn { background: #3b82f6; border-color: #3b82f6; color: #fff; }
.copy-all-btn:hover { background: #2563eb; }
.copy-all-btn.ok { background: #22c55e; border-color: #22c55e; }

/* URLテーブル */
.section-title { font-size: 10px; color: #636e7b; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
td { padding: 4px 8px; border-bottom: 1px solid #0f1825; vertical-align: top; }
a.url-link { color: #94a3b8; text-decoration: none; word-break: break-all; }
a.url-link:hover { color: #7dd3fc; }
.col-label { color: #fbbf24; white-space: nowrap; padding-left: 8px; }
.col-label.plan { color: #c084fc; }
.col-slots { color: #86efac; white-space: nowrap; font-size: 10px; padding-left: 4px; }
.no-data { color: #636e7b; font-size: 11px; padding: 8px 0; }

/* スクロールバー */
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>🗺 Firm Tour</h1>
  <div class="stats">
    完了: <span id="done-count">0</span> / <span id="total-count">0</span>
    &nbsp;|&nbsp; データあり: <span id="data-count">0</span>
  </div>
  <div class="controls">
    <button class="btn-next" onclick="openNext()">▶ 次を開く</button>
    <button onclick="resetAll()">リセット</button>
  </div>
</div>

<div class="body">
  <div class="firm-list-wrap" id="firm-list"></div>
  <div class="detail-wrap" id="detail-panel">
    <div class="detail-empty">← ファームを選択するとURLが表示されます</div>
  </div>
</div>

<script>
const GH_BASE = 'https://raw.githubusercontent.com/zumzum24zoom-dotcom/propfirm-database/master/data/firms/';
const SLOT_URL = 'http://localhost:9000/data/firm-slot-urls.json';
const LS_KEY = 'pfd-tour-done';
const LS_SEL = 'pfd-tour-selected';

const FIRMS = [
  { slug: 'city-traders-imperium', dataSlug: 'citytradersimperium',   name: 'City Traders Imperium',   url: 'https://citytradersimperium.com/' },
  { slug: 'ftmo',                  dataSlug: 'ftmo',                  name: 'FTMO',                    url: 'https://ftmo.com/en/' },
  { slug: 'the5ers',               dataSlug: 'the5ers',               name: 'The5ers',                 url: 'https://www.the5ers.com/' },
  { slug: 'fundednext',            dataSlug: 'fundednext',            name: 'FundedNext',              url: 'https://fundednext.com/' },
  { slug: 'fundedelite',           dataSlug: 'fundedelite',           name: 'FundedElite',             url: 'https://fundedelite.com/' },
  { slug: 'top-one-trader',        dataSlug: 'toponetrader',          name: 'Top One Trader',          url: 'https://www.toponetrader.com/' },
  { slug: 'instant-funding',       dataSlug: 'instantfunding',        name: 'Instant Funding',         url: 'https://instantfunding.com/' },
  { slug: 'fintokei',              dataSlug: 'fintokei',              name: 'Fintokei',                url: 'https://www.fintokei.com/' },
  { slug: 'hantec-trader',         dataSlug: 'htrader',               name: 'Hantec Trader',           url: 'https://htrader.hmarkets.com/' },
  { slug: 'alpha-capital',         dataSlug: 'alphacapitalgroup',     name: 'Alpha Capital',           url: 'https://www.alphacapitalgroup.uk/' },
  { slug: 'e8-markets',            dataSlug: 'e8markets',             name: 'E8 Markets',              url: 'https://e8markets.com/' },
  { slug: 'maven',                 dataSlug: 'maventrading',          name: 'Maven',                   url: 'https://maventrading.com/' },
  { slug: 'bem-funding',           dataSlug: 'bemfunding',            name: 'BEM Funding',             url: 'https://bemfunding.com/' },
  { slug: 'brightfunded',          dataSlug: 'brightfunded',          name: 'BrightFunded',            url: 'https://brightfunded.com/' },
  { slug: 'blueberry-funded',      dataSlug: 'blueberryfunded',       name: 'Blueberry Funded',        url: 'https://blueberryfunded.com/' },
  { slug: 'aquafunded',            dataSlug: 'aquafunded',            name: 'AquaFunded',              url: 'https://aquafunded.com/' },
  { slug: 'for-traders',           dataSlug: 'fortraders',            name: 'For Traders',             url: 'https://fortraders.com/' },
  { slug: 'lark-funding',          dataSlug: 'larkfunding',           name: 'Lark Funding',            url: 'https://www.larkfunding.com/' },
  { slug: 'qt-funded',             dataSlug: 'qtfunded',              name: 'QT Funded',               url: 'https://qtfunded.quanttekel.com/' },
  { slug: 'audacity-capital',      dataSlug: 'audacity',              name: 'Audacity Capital',        url: 'https://audacity.capital/' },
  { slug: 'moneta-funded',         dataSlug: 'monetafunded',          name: 'Moneta Funded',           url: 'https://www.monetafunded.com/' },
  { slug: 'atmos-funded',          dataSlug: 'atmosfunded',           name: 'Atmos Funded',            url: 'https://atmosfunded.com/' },
  { slug: 'finotive-funding',      dataSlug: 'finotivefunding',       name: 'Finotive Funding',        url: 'https://finotivefunding.com/' },
  { slug: 'trade-the-pool',        dataSlug: 'tradethepool',          name: 'Trade The Pool',          url: 'https://tradethepool.com/' },
  { slug: 'thinkcapital',          dataSlug: 'thinkcapital',          name: 'ThinkCapital',            url: 'https://www.thinkcapital.com/' },
  { slug: 'funded-trading-plus',   dataSlug: 'fundedtradingplus',     name: 'Funded Trading Plus',     url: 'https://www.fundedtradingplus.com/' },
  { slug: 'nordic-funder',         dataSlug: 'nordicfunder',          name: 'Nordic Funder',           url: 'https://nordicfunder.com/' },
  { slug: 'fxify',                 dataSlug: 'fxify',                 name: 'FXIFY',                   url: 'https://fxify.com/' },
  { slug: 'the-trading-pit',       dataSlug: 'thetradingpit',         name: 'The Trading Pit',         url: 'https://www.thetradingpit.com/' },
  { slug: 'ment-funding',          dataSlug: 'mentfunding',           name: 'Ment Funding',            url: 'https://mentfunding.com/' },
  { slug: 'hola-prime',            dataSlug: 'holaprime',             name: 'Hola Prime',              url: 'https://holaprime.com/' },
  { slug: 'fundingpips',           dataSlug: 'fundingpips',           name: 'FundingPips',             url: 'https://fundingpips.com/' },
];

const BLOCKED = new Set(['fundingpips','e8-markets','moneta-funded','atmos-funded','funded-trading-plus']);

let slotData = {};
let selectedSlug = localStorage.getItem(LS_SEL) || '';

function getDone() { try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { return []; } }
function saveDone(a) { localStorage.setItem(LS_KEY, JSON.stringify(a)); }

function toggle(slug, e) {
  e.stopPropagation();
  let done = getDone();
  done.includes(slug) ? done = done.filter(s => s !== slug) : done.push(slug);
  saveDone(done);
  renderList();
  updateStats();
}

function select(slug) {
  selectedSlug = slug;
  localStorage.setItem(LS_SEL, slug);
  renderList();
  renderDetail(slug);
}

function openNext() {
  const done = getDone();
  for (const f of FIRMS) {
    if (!done.includes(f.slug)) {
      window.open(f.url, '_blank');
      select(f.slug);
      document.querySelector(`[data-slug="${f.slug}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }
  alert('全ファーム完了！');
}

function resetAll() {
  if (!confirm('チェックをリセットしますか？')) return;
  saveDone([]);
  renderList();
  updateStats();
}

function updateStats() {
  const done = getDone();
  document.getElementById('done-count').textContent = done.length;
  document.getElementById('total-count').textContent = FIRMS.length;
  const dataCount = Object.values(slotData.firms || {}).filter(f => (f.slot_urls||[]).length > 0).length;
  document.getElementById('data-count').textContent = dataCount;
}

function renderList() {
  const done = getDone();
  const list = document.getElementById('firm-list');
  list.innerHTML = '';
  FIRMS.forEach((f, i) => {
    const isDone = done.includes(f.slug);
    const isSel = f.slug === selectedSlug;
    const fd = (slotData.firms || {})[f.slug];
    const urlCount = fd ? (fd.slot_urls||[]).length + (fd.plan_urls||[]).length : 0;

    const div = document.createElement('div');
    div.className = 'firm-item' + (isDone ? ' done' : '') + (isSel ? ' selected' : '');
    div.dataset.slug = f.slug;
    div.onclick = () => select(f.slug);

    div.innerHTML =
      `<span class="firm-num">${i+1}</span>` +
      `<input type="checkbox" ${isDone?'checked':''} onclick="toggle('${f.slug}',event)">` +
      `<span class="firm-name">${f.name}</span>` +
      (isDone ? `<span class="done-mark">✓</span>` : '') +
      (BLOCKED.has(f.slug) ? `<span class="badge badge-manual">⚠手動</span>` : '') +
      (urlCount > 0 ? `<span class="badge badge-data">${urlCount}URL</span>` : '');

    list.appendChild(div);
  });
}

function renderDetail(slug) {
  const panel = document.getElementById('detail-panel');
  const f = FIRMS.find(x => x.slug === slug);
  if (!f) { panel.innerHTML = '<div class="detail-empty">← ファームを選択</div>'; return; }

  const fd = (slotData.firms || {})[slug] || { slot_urls: [], plan_urls: [] };
  const allUrls = [...fd.slot_urls.map(u => u.url), ...fd.plan_urls.map(p => p.url)].join('\n').replace(/'/g, "\\'");

  const slotRows = fd.slot_urls.map(u =>
    `<tr><td><a class="url-link" href="${u.url}" target="_blank">${u.url}</a></td>` +
    `<td class="col-label">${u.label}</td>` +
    `<td class="col-slots">${u.slots}</td></tr>`
  ).join('');

  const planRows = fd.plan_urls.map(p =>
    `<tr><td><a class="url-link" href="${p.url}" target="_blank">${p.url}</a></td>` +
    `<td class="col-label plan">${p.plan_name}</td>` +
    `<td class="col-slots">plan</td></tr>`
  ).join('');

  const blockedWarn = BLOCKED.has(slug)
    ? `<div style="background:#1a0a00;border:1px solid #7c2d12;color:#f97316;font-size:11px;padding:8px 12px;border-radius:5px;margin-bottom:12px;">⚠ このサイトはBot保護(403)のためNotebookLMから直接アクセス不可。ブラウザで開いてテキストコピー or PDF保存して手動追加してください。</div>`
    : '';

  panel.innerHTML =
    `<div class="detail-header">` +
    `<span class="detail-slug">${f.name}</span>` +
    `<div class="detail-actions">` +
    `<a class="open-btn" href="${f.url}" target="_blank">公式サイト →</a>` +
    `<button class="copy-all-btn" onclick="copyAll(this,'${slug}')">全URLコピー (${fd.slot_urls.length + fd.plan_urls.length}件)</button>` +
    `</div></div>` +
    blockedWarn +
    (slotRows ? `<div class="section-title">スロット別URL (${fd.slot_urls.length}件)</div><table>${slotRows}</table>` : '<div class="no-data">スロットURL未収集</div>') +
    (planRows ? `<div class="section-title">プラン別URL (${fd.plan_urls.length}件)</div><table>${planRows}</table>` : '');
}

function copyAll(btn, slug) {
  const fd = (slotData.firms || {})[slug] || { slot_urls: [], plan_urls: [] };
  const text = [...fd.slot_urls.map(u => u.url), ...fd.plan_urls.map(p => p.url)].join('\n');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ コピー済'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = `全URLコピー`; btn.classList.remove('ok'); }, 1500);
  });
}

async function init() {
  try {
    const r = await fetch(SLOT_URL);
    if (r.ok) slotData = await r.json();
  } catch {}
  renderList();
  updateStats();
  if (selectedSlug) renderDetail(selectedSlug);
}

init();
</script>
</body>
</html>
