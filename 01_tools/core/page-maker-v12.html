async function callAPI(body) {
  for (let attempt = 0; attempt <= 3; attempt++) {
    const resp = await fetch(LLM_PROXY, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify(body),
    });
    if (resp.status === 429) { await new Promise(r => setTimeout(r, 5000*(attempt+1))); continue; }
    if (!resp.ok) {
      let detail="";
      try{ const j=await resp.json(); detail=j?.error?.message||j?.error||JSON.stringify(j); }catch(_){ try{detail=await resp.text();}catch(__){} }
      throw new Error(`HTTP ${resp.status}${detail?" — "+detail:""}`);
    }
    return await resp.json();
  }
}
function exText(r) { return (r.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(""); }

function exportJSON(data,fn) {
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"})); a.download=fn; a.click();
}
function importJSON(cb) {
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.style.position="fixed"; inp.style.opacity="0"; inp.style.top="-100px";
  document.body.appendChild(inp);
  inp.onchange=e=>{
    const f=e.target.files?.[0];
    document.body.removeChild(inp);
    if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{cb(JSON.parse(r.result))}catch(err){alert("JSONパースエラー: "+err.message)}};
    r.onerror=()=>alert("ファイル読み込みエラー");
    r.readAsText(f);
  };
  inp.click();
}

function slugify(str){
  return(str||"").toLowerCase().replace(/\s+/g,"-").replace(/[^\w\-]/g,"").replace(/--+/g,"-").replace(/^-+|-+$/g,"");
}
function getSlotText(sd,key){
  const arr=sd?.[key];
  if(!arr||arr.length===0)return"";
  const m=arr.find(f=>f.merged);
  return(m?m.text:arr.map(f=>f.text||"").join("\n")).trim();
}
// 名前スロットは「値が入ったら自動ロック」（＝作成後ロック / 方式b）。空なら編集可、埋まれば上書き保護。
const NAME_SLOTS=new Set(["firmName","challengeName"]);
function isSlotLocked(locks,sd,id){
  if(locks&&Object.prototype.hasOwnProperty.call(locks,id))return !!locks[id]; // 明示トグルが最優先（🔒/🔓）
  return NAME_SLOTS.has(id)&&getSlotText(sd,id)!==""; // 名前スロット: 値があれば自動ロック
}
async function writeHugoFile(dirHandle,pathParts,content){
  let cur=dirHandle;
  for(let i=0;i<pathParts.length-1;i++)cur=await cur.getDirectoryHandle(pathParts[i],{create:true});
  const fh=await cur.getFileHandle(pathParts[pathParts.length-1],{create:true});
  const w=await fh.createWritable();await w.write(content);await w.close();
}

// 現在のIDの最大採番値を求める（f12/p34 → 34）
function maxNumId(firms){
  let mx=0;
  (firms||[]).forEach(f=>{
    const fn=parseInt(String(f.id).replace(/\D/g,""))||0; if(fn>mx)mx=fn;
    (f.plans||[]).forEach(p=>{const pn=parseInt(String(p.id).replace(/\D/g,""))||0; if(pn>mx)mx=pn});
  });
  return mx;
}
// incoming(ファイル側)のFirmを、base(現在)と突き合わせて衝突計画を作る
// 返り値: { autoAdd:[firm...], conflicts:[{name, base:{firm}, incoming:{firm}}], glossaryAdd:[term...] }
function planMerge(base, incoming){
  const baseFirms=base.firms||[];
  const baseByName=new Map(baseFirms.map(f=>[f.name,f]));
  const autoAdd=[]; const conflicts=[];
  (incoming.firms||[]).forEach(inf=>{
    const hit=baseByName.get(inf.name);
    if(!hit){ autoAdd.push(inf); }
    else { conflicts.push({name:inf.name, base:hit, incoming:inf}); }
  });
  // 用語辞典: key重複は除外して追加分のみ
  const baseKeys=new Set((base.glossaryTerms||[]).map(t=>t.key).filter(Boolean));
  const glossaryAdd=(incoming.glossaryTerms||[]).filter(t=>t.key&&!baseKeys.has(t.key));
  return {autoAdd, conflicts, glossaryAdd};
}
// incoming側Firmを取り込む際、ID衝突を避けて採番し直し、tabDataもキー付け替えして返す
// 返り値: { firm:{新ID,plans...}, tabEntries:{newId:tabData,...}, nextCounter }
function reidFirm(inf, incomingTabMap, startCounter){
  let c=startCounter;
  const newFid="f"+String(c++);
  const tabEntries={};
  const oldFid=inf.id;
  const newPlans=(inf.plans||[]).map(p=>{
    const newPid="p"+String(c++);
    const oldTab=incomingTabMap[p.id];
    if(oldTab)tabEntries[newPid]=JSON.parse(JSON.stringify(oldTab));
    return {id:newPid,name:p.name};
  });
  const oldFirmTab=incomingTabMap[oldFid];
  if(oldFirmTab)tabEntries[newFid]=JSON.parse(JSON.stringify(oldFirmTab));
  const firm={id:newFid,name:inf.name,plans:newPlans};
  if(inf.pinned)firm.pinned=true;
  return {firm, tabEntries, nextCounter:c};
}

// ═══════════════════════════════════════════════════
// Firm統合（同名2箱を1つに寄せる）
// ═══════════════════════════════════════════════════
// slotDataを項目単位でマージ。
//  - 片方だけ値あり → 値ある方を採用
//  - 両方値ありで内容同じ → そのまま
//  - 両方値ありで内容違う → conflictとして記録（既定keep=残す側）
// 返り値: {merged, conflicts:[{scope,planName,slotKey,keepText,absorbText}]}
function slotTextOf(arr){
  if(!Array.isArray(arr))return "";
  return arr.map(x=>(x&&x.text!=null)?String(x.text):"").join("").trim();
}
function mergeSlotData(keepSD, absorbSD, scope, planName){
  const merged={...(keepSD||{})};
  const conflicts=[];
  // 名称系（Firm名/Challenge名）は常に残す側を優先し、競合に出さない
  const NAME_KEYS=new Set(["firmName","challengeName"]);
  const allKeys=new Set([...Object.keys(keepSD||{}),...Object.keys(absorbSD||{})]);
  allKeys.forEach(k=>{
    const kt=slotTextOf(keepSD?.[k]);
    const at=slotTextOf(absorbSD?.[k]);
    if(!kt&&at){ merged[k]=absorbSD[k]; }            // 残す側が空 → 吸収側で埋める
    else if(kt&&at&&kt!==at){                         // 両方あって違う
      if(NAME_KEYS.has(k))return;                     // 名称系は残す側のまま（競合扱いしない）
      conflicts.push({scope,planName,slotKey:k,keepText:kt,absorbText:at,keepVal:keepSD[k],absorbVal:absorbSD[k]});
    }
    // それ以外（残す側のみ／同一）は残す側のまま
  });
  return {merged,conflicts};
}
// keepFirm に absorbFirm を吸収する計画を作る（実適用は別関数）
// Planは名前で突合。重複しないPlanはkeepへ移動、同名Planはslot/archiveをマージ。
function planFirmConsolidation(keepFirm, absorbFirm, tabDataMap){
  const conflicts=[];
  // Firm本体スロット
  const keepFirmSD=tabDataMap[keepFirm.id]?.slotData||{};
  const absorbFirmSD=tabDataMap[absorbFirm.id]?.slotData||{};
  const firmMerge=mergeSlotData(keepFirmSD,absorbFirmSD,"firm",keepFirm.name);
  conflicts.push(...firmMerge.conflicts);

  const keepPlansByName=new Map((keepFirm.plans||[]).map(p=>[p.name,p]));
  const planActions=[]; // {type:'merge'|'move', keepPlan?, absorbPlan, slotConflicts?}
  (absorbFirm.plans||[]).forEach(ap=>{
    const kp=keepPlansByName.get(ap.name);
    if(kp){
      const kSD=tabDataMap[kp.id]?.slotData||{};
      const aSD=tabDataMap[ap.id]?.slotData||{};
      const m=mergeSlotData(kSD,aSD,"plan",ap.name);
      conflicts.push(...m.conflicts);
      planActions.push({type:"merge",keepPlan:kp,absorbPlan:ap});
    }else{
      planActions.push({type:"move",absorbPlan:ap});
    }
  });
  return {conflicts,planActions,firmMerge};
}

function getPlanNames(firmId, firms, tabDataMap) {
  const firm = firms.find(f => f.id === firmId);
  
  // A. 既存Planタブから取得
  if (firm?.plans?.length > 0) {
    return firm.plans.map(p => p.name).filter(Boolean);
  }
  
  // B. planListスロットから取得
  const firmData = tabDataMap[firmId];
  const planListSlot = firmData?.slotData?.planList;
  if (planListSlot?.length > 0) {
    const merged = planListSlot.find(f => f.merged);
    let text = merged ? merged.text : planListSlot[0]?.text || "";
    
    // textが配列の場合は最初の要素を取得
    if (Array.isArray(text)) {
      text = text[0] || "";
    }
    
    // textが文字列であることを確認
    if (typeof text === 'string' && text) {
      return text.split(/[,、\n|｜]/).map(s => s.trim()).filter(Boolean);
    }
  }
  
  // C. 未登録
  return null;
}

function getFirmName(firmId, tabDataMap) {
  const firmData = tabDataMap[firmId];
  const firmNameSlot = firmData?.slotData?.firmName;
  if (firmNameSlot?.length > 0) {
    const merged = firmNameSlot.find(f => f.merged);
    return merged ? merged.text : firmNameSlot[0]?.text || "";
  }
  return "";
}

// ── Derive: GLOSSARY_SEED = Firm項目(F01-F22) + Plan項目(P01-P20+P02b) + GLOSSARY_BASE ──
// Firm項目・Plan項目は MASTER_DEFS から自動生成。GLOSSARY_BASE のみ直接編集可。
function buildGlossarySeed(masterDefs, base) {
  const firmItems = masterDefs.dbp01
    .filter(d => d.fkey && d.definition)
    .map(d => ({key:d.fkey, term:d.term, type:"label", category:"Firm項目", definition:d.definition}));
  const planItems = [];
  masterDefs.dbp02.forEach(d => {
    if (d.pkey && d.definition)
      planItems.push({key:d.pkey, term:d.term, type:"label", category:"Plan項目", definition:d.definition});
    if (d.extra?.pkey)
      planItems.push({key:d.extra.pkey, term:d.extra.term, type:"label", category:"Plan項目", definition:d.extra.definition});
  });
  planItems.sort((a,b) => {
    const an = parseInt(a.key.replace(/[Pb]/g,"")), bn = parseInt(b.key.replace(/[Pb]/g,""));
    return an !== bn ? an - bn : (a.key.includes("b") ? 1 : -1);
  });
  return [...firmItems, ...planItems, ...base];
}
const GLOSSARY_SEED = buildGlossarySeed(MASTER_DEFS, GLOSSARY_BASE);

// 用語辞典 参照ヘルパ（プロンプト生成が辞典を単一情報源として参照）
// 辞典を直せばプロンプトの表記ルールも自動で変わる
// ═══════════════════════════════════════════════════
function glossaryRulesBlock(glossaryTerms) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  const byKey = {};
  T.forEach(t => { if (t.key) byKey[t.key] = t; });
  const term = k => (byKey[k]?.term) || "";
  const catTerms = cat => T.filter(t => t.category === cat).map(t => t.term);

  const dd = catTerms("DD計算基準").join(" / ");
  const phase = `${term("PHASE_C")} / ${term("PHASE_F")}`;
  const diff = catTerms("早見表差分").filter((v,i,a)=>a.indexOf(v)===i).join(" / ");
  const freq = catTerms("出金頻度").join(" / ");

  return `【用語辞典（厳守・正本）】
この辞典の表記を唯一の正本とする。出力は必ず下記の表記に統一すること。

■ フェーズ名称（統一変換）
- ${phase} のみを使用。Evaluation／Assessment／Phase／Step／Master／Live／Funded Account／Real Account 等の表記は全て ${term("PHASE_C")}／${term("PHASE_F")} に変換する。

■ DD計算基準（この6表記のみ）
- ${dd}
- 括弧は全角（）。リセット時刻・計算詳細は補足注記に記載しテーブルの基準列には書かない。

■ 制限ルールの有無表記（早見表C/Fセルの値）
- 有: ファームが明示的に制限・条件を課している
- ※有: 条件付きで許可（条件の中身は詳細列にルール全容を書く）
- 無: そのルールで縛られない。公式が「なし」と明記している場合も、公式に制限の記載が見つからない場合も、共に「無」に一本化する（旧「なし（明示）」「記載なし」は廃止）
- ${term("ABS_NA")}: 該当項目自体が構造上適用されない（全角ハイフン。例: Funded側に合格目標が存在しない）。「無」とは区別する

■ 最低取引日数の表記（全角括弧）
- 合格要件: ${term("P02")}
- 出金要件: ${term("P02b")}

■ 早見表の差分判定
- ${diff}（EASE=Funded側が緩い／TRAP=Funded側が厳しい）
- C/Fが同値なら差分は「ー」。同値でも省略せず両列に同じ値を素直に記載する（旧「F列をーにする」運用は廃止）

■ 出金頻度
- ${freq}
`;
}

// 辞典のlabelから項目リスト行を動的生成（カテゴリ指定）
function glossaryItemLines(glossaryTerms, category) {
  // Firm項目 / Plan項目 は MASTER_DEFS 由来の派生カテゴリ。用語辞典(glossaryTerms)が
  // 古いラベルに drift していても、ここは必ず正本(MASTER_DEFS)から直接構築する。
  // これにより prompt→NotebookLM→取込(labelToId)・プレビュー(SLOT_DEFS)のラベルが常に一致する。
  if (category === "Firm項目" || category === "Plan項目") {
    const items = [];
    if (category === "Firm項目") {
      MASTER_DEFS.dbp01.filter(d => d.fkey && d.definition)
        .forEach(d => items.push({key:d.fkey, term:d.term, definition:d.definition}));
    } else {
      MASTER_DEFS.dbp02.forEach(d => {
        if (d.pkey && d.definition) items.push({key:d.pkey, term:d.term, definition:d.definition});
        if (d.extra?.pkey) items.push({key:d.extra.pkey, term:d.extra.term, definition:d.extra.definition});
      });
      items.sort((a,b) => {
        const an = parseInt(a.key.replace(/[Pb]/g,"")), bn = parseInt(b.key.replace(/[Pb]/g,""));
        return an !== bn ? an - bn : (a.key.includes("b") ? 1 : -1);
      });
    }
    return items.map(t => `${t.key}. ${t.term}${t.definition ? " — " + t.definition : ""}`).join("\n");
  }
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  return T.filter(t => t.category === category && t.key)
    .map(t => `${t.key}. ${t.term}${t.definition ? " — " + t.definition : ""}`)
    .join("\n");
}

// DD計算基準の件数
function ddTypesCount(glossaryTerms) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  return T.filter(t => t.category === "DD計算基準").length;
}
// DD計算基準の一覧（「A / B / C（N分類）」形式）
function ddTypesStr(glossaryTerms) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  const types = T.filter(t => t.category === "DD計算基準").map(t => t.term);
  return types.join(" / ") + "（" + types.length + "分類）";
}
// 早見表差分の表記行（「F側が緩い=EASE / F側が厳しい=TRAP / 同一=ー」形式）
function diffTermLine(glossaryTerms) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  const byKey = {};
  T.forEach(t => { if (t.key) byKey[t.key] = t; });
  return `F側が緩い=${byKey["DIFF_EASE"]?.term||"EASE"} / F側が厳しい=${byKey["DIFF_TRAP"]?.term||"TRAP"} / 同一=${byKey["DIFF_NONE"]?.term||"ー"}`;
}
// 出金頻度×計算式の行（「   - 随時 → X」形式で各行）
function freqCalcLines(glossaryTerms) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  return T.filter(t => t.category === "出金頻度")
    .map(t => { const m=(t.definition||"").match(/MAX\((\d+)日/); const f=m?`MAX(${m[1]}, X)`:"X"; return `   - ${t.term} → ${f}`; })
    .join("\n");
}
// 計算結果の列名セット（CALC_PASS/PAYOUT/TOTAL/ARRIVAL/STEPS）
function calcColNames(glossaryTerms) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  const byKey = {};
  T.forEach(t => { if (t.key) byKey[t.key] = t; });
  return {
    pass:    byKey["CALC_PASS"]?.term    || "最短合格",
    payout:  byKey["CALC_PAYOUT"]?.term  || "最速出金",
    total:   byKey["CALC_TOTAL"]?.term   || "トータル日数",
    arrival: byKey["CALC_ARRIVAL"]?.term || "着金目安",
    steps:   byKey["CALC_STEPS"]?.term   || "Steps",
  };
}

function CopyBtn({text,label,color,getText,style:sx}) {
  const [ok,set]=useState(false);
  const handleCopy=()=>{
    const t=getText?getText():text;
    if(!t){alert(label+" : データなし");return;}
    try{navigator.clipboard.writeText(t).then(()=>{set(true);setTimeout(()=>set(false),1500)}).catch(()=>{
      // fallback
      const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);set(true);setTimeout(()=>set(false),1500);
    })}catch(e){
      const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);set(true);setTimeout(()=>set(false),1500);
    }
  };
  return <Btn color={color} onClick={handleCopy} style={sx}>{ok?"✓":label||"Copy"}</Btn>;
}

// ── リサイズハンドル ──
function useResize(initial,dir,min,max) {
  const [size,setSize]=useState(initial);
  const dragging=useRef(false);
  const startPos=useRef(0);
  const startSize=useRef(0);

  const onMouseDown=useCallback(e=>{
    e.preventDefault();
    dragging.current=true;
    startPos.current=dir==="x"?e.clientX:e.clientY;
    startSize.current=size;
    const onMove=ev=>{
      if(!dragging.current)return;
      const delta=(dir==="x"?ev.clientX:ev.clientY)-startPos.current;
      setSize(Math.max(min,Math.min(max,startSize.current+delta)));
    };
    const onUp=()=>{dragging.current=false;document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp)};
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  },[size,dir,min,max]);

  return [size,onMouseDown,setSize];
}

function ResizeHandle({dir,onMouseDown}) {
  const isH=dir==="x";
  return (
    <div onMouseDown={onMouseDown} style={{
      [isH?"width":"height"]:6,[isH?"height":"width"]:"100%",
      cursor:isH?"col-resize":"row-resize",background:"transparent",
      flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
      zIndex:10,
    }}>
      <div style={{[isH?"width":"height"]:2,[isH?"height":"width"]:"30%",background:C.borderLight,borderRadius:1}} />
    </div>
  );
}

function VerticalTabs({firms,activeId,onSelect,onAddFirm,onAddPlan,onDelete,onRename,width,onBulkImport,onReorder,tabDataMap,glossaryTerms,onMergeFirm,onDeleteMany,onTogglePin,sections,onAddSection,onRenameSection,onDeleteSection,onToggleCompleted,onMoveFirmToSection,onReorderSection,sessionName,onSessionNameChange,onSaveSelected}) {
  const [collapsed,setCollapsed]=useState({});
  const [secCollapsed,setSecCollapsed]=useState({});
  const [editSecId,setEditSecId]=useState(null);
  const [editSecName,setEditSecName]=useState("");
  const [showAddSec,setShowAddSec]=useState(false);
  const [newSecName,setNewSecName]=useState("");
  const [dragSecOver,setDragSecOver]=useState(null);
  // 起動時/新規Firm出現時：新規のみ折りたたみ（activeIdによる自動展開はしない → クリック開閉に委任）
  const knownFirmsRef=useRef(null);
  useEffect(()=>{
    setCollapsed(prev=>{
      const next={...prev};
      const known=knownFirmsRef.current;
      (firms||[]).forEach(f=>{
        const isNew=!known||!known.has(f.id);
        if(isNew)next[f.id]=true; // 新規は折りたたみ
      });
      return next;
    });
    knownFirmsRef.current=new Set((firms||[]).map(f=>f.id));
  },[firms]);
  const [showImport,setShowImport]=useState(false);
  useEffect(()=>{const h=()=>setShowImport(true);document.addEventListener("pfd-csv-open",h);return()=>document.removeEventListener("pfd-csv-open",h)},[]);
  const [csvText,setCsvText]=useState("");
  const [dragId,setDragId]=useState(null);
  const [dragSecId,setDragSecId]=useState(null);
  const [sortAlpha,setSortAlpha]=useState(false);
  const [checked,setChecked]=useState({}); // クリック選択 {firmId:true}
  const [copied,setCopied]=useState(false);
  const [hideActive,setHideActive]=useState(true);
  const [showPromptMenu,setShowPromptMenu]=useState(false);
  // ブラシ複数選択／解除
  const brushRef=useRef(false);
  const brushModeRef=useRef("select"); // "select" | "deselect"
  useEffect(()=>{
    const onUp=()=>{brushRef.current=false};
    window.addEventListener("mouseup",onUp);
    return()=>window.removeEventListener("mouseup",onUp);
  },[]);
  // Active Firm Panel 用 state
  const [panelFirmName,setPanelFirmName]=useState("");
  const [planEditId,setPlanEditId]=useState(null);
  const [planEditName,setPlanEditName]=useState("");
  // パネル対象Firmを導出（activeIdがplanならその親Firmを返す）
  const panelFirm=useMemo(()=>{
    const f=firms.find(f=>f.id===activeId);
    if(f)return f;
    return firms.find(f=>(f.plans||[]).some(p=>p.id===activeId))||null;
  },[firms,activeId]);
  // panelFirmが変わったらFirm名をパネルに同期
  useEffect(()=>{
    setPanelFirmName(panelFirm?.name||"");
    setPlanEditId(null);
  },[panelFirm?.id]);
  // plan名がリネームされたら編集値も同期
  useEffect(()=>{
    if(!planEditId)return;
    const p=(panelFirm?.plans||[]).find(p=>p.id===planEditId);
    if(p)setPlanEditName(p.name||"");
  },[planEditId,panelFirm]);

  const checkedCount=Object.values(checked).filter(Boolean).length;
  const clearChecks=()=>setChecked({});
  const selectAll=()=>{const n={};firms.forEach(f=>{if(!f.completed)n[f.id]=true});setChecked(n)};

  // グループ内ソート: ピン済(非完了) → 通常(非完了) → 完了
  const sortGroup=(list)=>{
    const byName=(a,b)=>{
      const na=getFirmName(a.id,tabDataMap)||a.name||"";
      const nb=getFirmName(b.id,tabDataMap)||b.name||"";
      return na.localeCompare(nb,"ja");
    };
    const maySort=arr=>sortAlpha?[...arr].sort(byName):arr;
    return[
      ...maySort(list.filter(f=>f.pinned&&!f.completed)),
      ...maySort(list.filter(f=>!f.pinned&&!f.completed)),
      ...list.filter(f=>f.completed),
    ];
  };
  const hasSections=(sections||[]).length>0;

  // 選択アイテムを Firm名＋配下Plan の階層テキストでクリップボードへコピー
  // - Firmにチェック → そのFirm名＋全Planを出力
  // - Plan単独チェック（親Firm未チェック）→ 親Firm名＋チェックしたPlanのみを出力
  const copyChecked=()=>{
    const lines=[];
    firms.forEach(f=>{
      const firmChecked=!!checked[f.id];
      const plans=f.plans||[];
      const selPlans=firmChecked?plans:plans.filter(p=>checked[p.id]);
      if(!firmChecked&&selPlans.length===0)return;
      lines.push(getFirmName(f.id,tabDataMap)||f.name||"（未命名）");
      selPlans.forEach(p=>lines.push(`  - ${p.name||"（未命名プラン）"}`));
    });
    if(!lines.length)return;
    const text=lines.join("\n");
    const done=()=>{setCopied(true);setTimeout(()=>{setCopied(false);setChecked({})},1500)};
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{
        const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
      });
    }else{
      const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
    }
  };

  // 選択Firmをまとめて削除
  const deleteChecked=()=>{
    const firmIds=Object.keys(checked).filter(id=>checked[id]&&firms.some(f=>f.id===id));
    if(!firmIds.length)return;
    if(!window.confirm(`Firm ${firmIds.length}件（配下Plan含む）を削除しますか？`))return;
    onDeleteMany&&onDeleteMany(firmIds,[]);
    setChecked({});
  };

  // 選択Firmの全Planを対象にDBP_02出力プロンプトを生成
  const [planCopied,setPlanCopied]=useState(false);
  const copyPlanOutput=()=>{
    const targetIds=new Set();
    firms.forEach(f=>{
      if(checked[f.id])targetIds.add(f.id);
      else if((f.plans||[]).some(p=>checked[p.id]))targetIds.add(f.id);
    });
    const targets=firms.filter(f=>targetIds.has(f.id));
    if(!targets.length)return"";
    const planItems=glossaryItemLines(glossaryTerms,"Plan項目");
    const _pCount=MASTER_DEFS.dbp02.filter(d=>d.pkey).length;
    const _ddStr=ddTypesStr(glossaryTerms);
    const _diffLine=diffTermLine(glossaryTerms);
    const blocks=targets.map(f=>{
      const firmName=getFirmName(f.id,tabDataMap)||f.name||"（未命名）";
      const planNames=getPlanNames(f.id,firms,tabDataMap)||(f.plans||[]).map(p=>p.name);
      const plans=(planNames||[]).filter(Boolean);
      const planLine=plans.length?plans.map(n=>`- ${n}`).join("\n"):"（プラン未登録 — 公式サイトから全プランを収集すること）";
      return`【対象ファーム】${firmName}\n【対象プラン】\n${planLine}`;
    }).join("\n\n");
    const text=`${blocks}\n\n${glossaryRulesBlock(glossaryTerms)}\n\nNotebookLMソース定義のDBP_02セクションに従い、上記の各プランについて以下を出力してください:\n\n--- Plan項目 ---\n${planItems}\n\nプランごとに【1テーブル】を出力。列は必ず: 項目 | C | F | 差分 | 詳細\n\n- 先頭に「Steps」行を追加: C列=0/1/2（Instant=0 / 1-Step=1 / 2-Step=2）、F列・差分=「—」、詳細=ステップ構成を1文\n- 項目: 上記${_pCount}項目を各1行（順序維持）\n- C / F: Challenge値 / Funded値。型に従う:\n   ・数字型（利益目標%・最低取引日数(日)・日次損失%・最大損失%）= 数値+単位\n   ・Lossタイプ（日次損失タイプ・最大損失タイプ）= ${_ddStr}のみ\n   ・その他の制約 = 有 / 無 / ※有 / ー（無=そのルールで縛られない＝公式が「なし」明記でも制限の記載が無くても共に「無」 / ※有=条件付き許可・条件の中身を詳細列に / ー=項目が構造上存在しない。「記載なし」「なし（明示）」は使わない）\n   ・C/Fが同値でも省略せず両列に同じ値を記載し差分は「ー」。F非該当（構造上存在しない）のみ F列「ー」\n- 差分: ${_diffLine}\n- 詳細: 【詳細がルールの正本】詳細を読めばそのルールについて不明な点がない状態で記述すること。補足・おまけ扱い禁止。C/F値の数字を詳細に再掲して、条件・例外・ペナルティを含む完結した本文として書くこと。常体（だ・である調・体言止め）で書き「です・ます」調は禁止。値が「無」の項目は「Challenge・Funded共に〔ルール名〕について明示的に制限する記載はない」と書く\n  ・利益目標で複数ステップの合格目標が分かれる場合: C列・詳細とも「X% / Y% / Z%」のスラッシュ区切り（例:「8% / 5%」）で書き、「1次/2次/3次」ラベルは使わない\n  ・最低取引日数: P02（合格）=Challenge専用 / P02b（出金）=Funded専用。各行は自分のフェーズだけ書き反対フェーズに言及しない（P02のF=ー・P02bのC=ーは構造上自明なので打ち消し文「Fundedでは…記載はない」等は書かない）。括弧書き「（合格）（出金）」も不可。P02日数あり→「Challengeでは合格に〔N日〕の取引が必要。」/ P02無→「Challengeでは合格に必要な最低取引日数について明示的に制限する記載はない。」/ P02b日数あり→「Fundedでは出金に〔N日〕の取引が必要。」/ P02b無→「Fundedでは出金に必要な最低取引日数について明示的に制限する記載はない。」\n- 「禁止行為」は上記ルール表（項目|C|F|差分|詳細）に含めない（別シェイプ）。各プランのルール表の直後に、独立した禁止行為テーブルを追加: 列は必ず 行為名 | 備考 | 行為 | 処分。1行=1行為（行為名=名称 例:HFT / 行為=その行為の具体的説明 / 処分=違反時のペナルティ 例:即時失格 / 備考=極稀にC/Fで可否が異なる場合のみ・通常空）。禁止行為が無ければこのテーブルは省略\n\nプランごとに【ルール表＋（あれば）禁止行為テーブル】を出力。表記は用語辞典に厳密準拠。`;
    const done=()=>{setPlanCopied(true);setTimeout(()=>setPlanCopied(false),1500)};
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{
        const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
      });
    }else{
      const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
    }
  };

  const handleImport=()=>{
    const lines=csvText.trim().split("\n").filter(l=>l.trim());
    if(!lines.length)return;
    const data=lines.map(line=>{
      const parts=line.split(",").map(s=>s.trim().replace(/^"|"$/g,""));
      return{firmName:parts[0]||"",plans:parts.slice(1).filter(Boolean)};
    });
    onBulkImport(data);
    setCsvText("");setShowImport(false);
  };

  // セクションヘッダー（通常 or 未分類）
  const renderSectionHeader=(sec,isUnsectioned=false)=>{
    const isOver=dragSecOver===sec.id;
    return (
      <div
        draggable={!isUnsectioned}
        onDragStart={e=>{if(!isUnsectioned){e.stopPropagation();setDragSecId(sec.id)}}}

        onDragOver={e=>{if(dragId||dragSecId){e.preventDefault();setDragSecOver(sec.id)}}}

        style={{padding:"4px 7px",

        }}>
        {!isUnsectioned&&(
          <span onClick={()=>setSecCollapsed(p=>({...p,[sec.id]:!p[sec.id]}))}

            {secCollapsed[sec.id]?"▶":"▼"}
          </span>

            onBlur={()=>{onRenameSection&&onRenameSection(sec.id,editSecName);setEditSecId(null)}}
            onKeyDown={e=>{if(e.key==="Enter"){onRenameSection&&onRenameSection(sec.id,editSecName);setEditSecId(null)}if(e.key==="Escape")setEditSecId(null)}}
            style={{flex:1,background:C.bg,color:C.textBright,border:`1px solid ${C.blue}`,borderRadius:3,padding:"1px 4px",fontSize:"0.68rem",fontFamily:font,outline:"none"}} />
        ):(
          <span onDoubleClick={isUnsectioned?undefined:()=>{setEditSecId(sec.id);setEditSecName(sec.name)}}
            style={{flex:1,fontSize:"0.62rem",fontWeight:700,
              color:isOver?C.blue:(isUnsectioned?C.textDim:C.textDim),
              letterSpacing:"0.06em",textTransform:"uppercase",userSelect:"none"}}>
            {isUnsectioned?"未分類":(sec.name||"（未命名）")}
          </span>
        )}
        {isOver&&<span style={{fontSize:"0.55rem",color:C.blue,flexShrink:0}}>ドロップ</span>}
        {!isUnsectioned&&editSecId!==sec.id&&(
          <React.Fragment>
            <span onClick={()=>{setEditSecId(sec.id);setEditSecName(sec.name)}}
              title="名前変更" style={{cursor:"pointer",color:C.textDim,fontSize:"0.58rem",opacity:0.5,userSelect:"none"}}>✎</span>
            <span onClick={()=>{if(window.confirm(`「${sec.name}」を削除しますか？\nFirmは未分類に移動します。`))onDeleteSection&&onDeleteSection(sec.id)}}
              title="削除" style={{cursor:"pointer",color:C.red,fontSize:"0.6rem",opacity:0.5,userSelect:"none"}}>×</span>
          </React.Fragment>
        )}
      </div>
    );
  };

  // Firm行リスト（グループ共通）
  const renderFirms=(firmList)=>{
    const sorted=sortGroup(firmList);
    const lastPinnedId=(()=>{const ps=sorted.filter(f=>f.pinned&&!f.completed);return ps.length?ps[ps.length-1].id:null;})();
    const firstCompletedId=sorted.find(f=>f.completed)?.id;
    const visible=hideActive?sorted.filter(f=>f.id!==activeId&&!(f.plans||[]).some(p=>p.id===activeId)):sorted;
    return visible.map(firm=>{
      const isActive=activeId===firm.id||(firm.plans||[]).some(p=>p.id===activeId);
      const isChecked=!!checked[firm.id]&&!firm.completed;
      const isExpanded=!collapsed[firm.id]&&!firm.completed;
      const hasPlans=(firm.plans||[]).length>0;
      const cardBorder=firm.completed?C.border:(isActive?C.accent:(firm.pinned?`${C.red}88`:(isChecked?C.blue:C.border)));
      return (
        <div key={firm.id} style={{margin:"3px 5px 0"}}>
          {/* 完了区切り線 */}
          {firm.id===firstCompletedId&&sorted.some(f=>!f.completed)&&(
            <div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 0 1px"}}>
              <div style={{flex:1,height:"1px",background:`${C.textDim}28`}}/>
              <span style={{fontSize:"0.52rem",color:C.textDim,flexShrink:0,letterSpacing:"0.08em"}}>完了</span>
              <div style={{flex:1,height:"1px",background:`${C.textDim}28`}}/>
            </div>
          )}
          {/* ピン区切り */}
          {firm.id===lastPinnedId&&<div style={{height:3,marginBottom:2,borderBottom:`1px dashed ${C.red}44`}}/>}

          {/* ── Firm カード ── */}
          <div
            onDragOver={e=>{if(!firm.completed)e.preventDefault()}}
            onDrop={e=>{e.preventDefault();if(dragId&&dragId!==firm.id){onReorder(dragId,firm.id);setDragId(null);setDragSecOver(null)}}}
            style={{
              borderRadius:isExpanded&&hasPlans?`5px 5px 0 0`:5,
              border:`1px solid ${cardBorder}`,
              borderBottom:isExpanded&&hasPlans?`1px solid ${C.borderLight}`:`1px solid ${cardBorder}`,
              background:isChecked?`${C.blue}28`:(firm.pinned&&!firm.completed?`${C.red}08`:C.surfaceAlt),
              opacity:firm.completed?0.38:1,
              transition:"opacity 0.15s,border-color 0.1s",
              overflow:"hidden",
            }}>
            {/* カードヘッダー行：全体ドラッグ可 */}
            <div
              draggable={!firm.completed}
              onDragStart={e=>{setDragId(firm.id)}}
              onDragEnd={()=>setDragId(null)}
              onMouseDown={e=>{
                if(firm.completed||e.button!==0)return;
                const wasSelected=!!checked[firm.id];
                brushRef.current=true;
                brushModeRef.current=wasSelected?"deselect":"select";
                setChecked(p=>({...p,[firm.id]:!wasSelected}));
              }}
              onMouseEnter={()=>{
                if(!brushRef.current||firm.completed)return;
                setChecked(p=>({...p,[firm.id]:brushModeRef.current==="select"}));
              }}
              onDoubleClick={e=>{
                if(firm.completed)return;
                setCollapsed(p=>({...p,[firm.id]:!p[firm.id]}));
              }}
              style={{padding:"5px 6px",cursor:firm.completed?"default":"grab",
                display:"flex",alignItems:"center",gap:6,userSelect:"none"}}>
              {/* ラジオボタン（編集ターゲット） */}
              <div
                draggable={false}
                onMouseDown={e=>e.stopPropagation()}
                onDoubleClick={e=>e.stopPropagation()}
                onDragStart={e=>e.stopPropagation()}
                onClick={e=>{e.stopPropagation();onSelect(firm.id)}}
                title={activeId===firm.id?"編集中":"編集ターゲットにする"}
                style={{
                  width:15,height:15,borderRadius:"50%",flexShrink:0,cursor:"pointer",
                  border:`2px solid ${activeId===firm.id?C.accent:(firm.pinned?`${C.red}88`:C.textDim)}`,
                  background:activeId===firm.id?C.accent:"transparent",
                  transition:"background 0.12s,border-color 0.12s",
                }}
              />
              {/* 展開インジケーター＋Firm名 */}
              <span style={{fontSize:"0.48rem",color:isActive?C.accent:C.textDim,flexShrink:0,
                opacity:hasPlans?0.7:0.2,lineHeight:1,pointerEvents:"none"}}>
                {isExpanded?"▾":"▸"}
              </span>
              <span style={{
                  fontSize:"0.75rem",fontWeight:isActive?700:400,
                  color:isActive?C.accent:(isChecked?C.textBright:C.text),
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,
                  pointerEvents:"none",
                }}>{firm.name||"（未命名）"}</span>
              {/* Plan数バッジ（折りたたみ時のみ） */}
              {!isExpanded&&hasPlans&&(
                <span style={{fontSize:"0.52rem",color:C.textDim,flexShrink:0,
                  background:C.bg,borderRadius:8,padding:"0 4px",lineHeight:"1.6",
                  border:`1px solid ${C.border}`,pointerEvents:"none"}}>
                  {firm.plans.length}
                </span>
              )}
              {/* ボタン群（ドラッグ・選択を遮断） */}
              <div
                draggable={false}
                onMouseDown={e=>e.stopPropagation()}
                onDoubleClick={e=>e.stopPropagation()}
                onDragStart={e=>e.stopPropagation()}
                style={{display:"flex",alignItems:"center",gap:2,flexShrink:0}}>
                {firm.completed?(
                  <span onClick={e=>{e.stopPropagation();onToggleCompleted&&onToggleCompleted(firm.id)}}
                    title="完了解除"
                    style={{fontSize:"0.75rem",cursor:"pointer",color:C.green,fontWeight:700,userSelect:"none"}}>↩</span>
                ):(
                  <React.Fragment>
                    <span onClick={e=>{e.stopPropagation();onTogglePin&&onTogglePin(firm.id)}}
                      title={firm.pinned?"ピンを外す":"上に固定"}
                      style={{fontSize:"0.9rem",cursor:"pointer",lineHeight:1,
                        opacity:firm.pinned?1:0.2,userSelect:"none"}}>🔺</span>
                    <span onClick={e=>{e.stopPropagation();onToggleCompleted&&onToggleCompleted(firm.id)}}
                      title="完了にする"
                      style={{fontSize:"0.9rem",cursor:"pointer",lineHeight:1,
                        opacity:0.2,userSelect:"none"}}>🔻</span>
                  </React.Fragment>
                )}
              </div>
            </div>
          </div>

          {/* Planリスト（展開時・カード外に続く形で表示） */}
          {isExpanded&&hasPlans&&(
            <div style={{
              borderLeft:`1px solid ${cardBorder}`,
              borderRight:`1px solid ${cardBorder}`,
              borderBottom:`1px solid ${cardBorder}`,
              borderRadius:`0 0 5px 5px`,
              background:C.bg,
              overflow:"hidden",
            }}>
              {firm.plans.map((plan,pi)=>{
                const isPlanActive=activeId===plan.id;
                const isPlanChecked=!!checked[plan.id];
                return (
                  <div key={plan.id}
                    onMouseDown={e=>{
                      if(e.button!==0)return;
                      const wasSelected=!!checked[plan.id];
                      brushRef.current=true;
                      brushModeRef.current=wasSelected?"deselect":"select";
                      setChecked(p=>({...p,[plan.id]:!wasSelected}));
                    }}
                    onMouseEnter={()=>{
                      if(!brushRef.current)return;
                      setChecked(p=>({...p,[plan.id]:brushModeRef.current==="select"}));

                    style={{
                      padding:"3px 8px 3px 18px",cursor:"pointer",userSelect:"none",

                    }}>

                      <span
                        onMouseDown={e=>e.stopPropagation()}
                        onClick={e=>{e.stopPropagation();onSelect(plan.id);}}
                        title={isPlanActive?"編集中":"編集ターゲットにする"}
                        style={{fontSize:"0.52rem",color:isPlanActive?C.blue:`${C.blue}88`,flexShrink:0,cursor:"pointer"}}>▸</span>
                      <span style={{
                          fontSize:"0.7rem",fontWeight:isPlanActive?600:400,
                          color:isPlanActive?C.blue:(isPlanChecked?C.textBright:`${C.text}cc`),
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,
                          pointerEvents:"none",
                        }}>{plan.name||"（未命名）"}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* 空マージン */}
          <div style={{height:3}}/>
        </div>
      );
    });
  };

  const unsectionedFirms=firms.filter(f=>!f.sectionId);

  return (
    <div style={{width,flexShrink:0,background:C.surface,overflow:"auto",display:"flex",flexDirection:"column"}}>
      {/* ヘッダー */}
      <div style={{padding:"6px 7px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
        <span style={{fontSize:"0.72rem",fontWeight:700,color:C.accent,flexShrink:0}}>Firms</span>

        <div style={{position:"relative"}}>
          {showPromptMenu&&<div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setShowPromptMenu(false)}/>}
          <Btn color={C.purple} onClick={()=>setShowPromptMenu(v=>!v)}
            style={{padding:"1px 7px",fontSize:"0.68rem"}}>プロンプト▾</Btn>
          {showPromptMenu&&(
            <div style={{position:"absolute",top:"calc(100% + 3px)",right:0,zIndex:200,
              background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,
              padding:4,display:"flex",flexDirection:"column",gap:2,minWidth:110,
              boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
              <div onClick={()=>setShowPromptMenu(false)}>
                <CopyBtn getText={()=>generateResearchPrompt(activeId,firms,tabDataMap,glossaryTerms)}
                  label="リサーチ" color={C.purple} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}} />
              </div>
              <div onClick={()=>setShowPromptMenu(false)}>
                <CopyBtn getText={()=>generateSourcePrompt(activeId,firms,tabDataMap,glossaryTerms,"status")}
                  label="取得状況" color={C.purple} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}} />
              </div>
              <div onClick={()=>setShowPromptMenu(false)}>
                <CopyBtn getText={()=>generateSourcePrompt(activeId,firms,tabDataMap,glossaryTerms,"cleanup")}
                  label="ファイル整理" color={C.purple} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}} />
              </div>
              <div onClick={()=>setShowPromptMenu(false)}><CopyBtn getText={()=>{
                const firm=firms.find(f=>f.id===activeId);if(!firm)return"";
                const firmName=getFirmName(activeId,tabDataMap)||firm.name||"[ファーム名]";
                const planNames=getPlanNames(activeId,firms,tabDataMap)||[];
                const planBlock=planNames.length>0?`【対象プラン一覧】\n${planNames.map(p=>`- ${p}`).join("\n")}`:`【対象プラン一覧】\n（プラン未登録）`;
                const firmItems=glossaryItemLines(glossaryTerms,"Firm項目").split("\n").filter(l=>!/^F2[12]\./.test(l)).join("\n");
                return`【対象ファーム】${firmName}\n\n${planBlock}\n\n${glossaryRulesBlock(glossaryTerms)}\n\nNotebookLMソース定義のDBP_01セクションに従い、以下を出力してください:\n\n--- Firm情報 ---\n${firmItems}\n\n- テーブル1: 価格テーブル（各プランの口座サイズ別価格）\n- テーブル2: Firm基本情報\n- テーブル3: レバレッジ\n- テーブル4: 手数料\n- テーブル5: プラン比較テーブル\n\n各項目・各テーブルには見出し・説明文・本体・補足注記（必要時）を含めること。価格テーブルの実体はFirm単位で保持し、各プラン記事はこれを参照する。`;
              }} label="ファーム" color={C.blue} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}} /></div>

// ─── スキャナーJSONからクーポン設定を抽出 ───────────────────────────────────
function extractCouponConfig(scanData) {
  const url = scanData?.meta?.url || "";
  const interactive = scanData?.interactive || [];
  for (const el of interactive) {
    const t = el.text || "";
    const m = t.match(/(?:code|coupon|promo)[^\w]*([A-Z0-9_-]{3,16})/i)
           || t.match(/^CODE\s*[:\s]+([A-Z0-9_-]{3,16})$/i);
    if (!m) continue;
    const code = m[1].toUpperCase();
    // コンテナセレクタ（末尾要素を1つ上げる）
    const parts = (el.selector||"").split(" > ");
    const selector = parts.slice(0, -1).join(" > ") || el.selector || "";
    const today = new Date().toISOString().split("T")[0];
    return { url, selector, pattern:"CODE\\\\s*[:\\\\s]+([A-Z0-9_-]{3,16})",
      notes:`"${t.slice(0,40)}" から抽出`, verified:today, lastCode:code, lastScanned:today };
  }
  return null;
}

function PastePanel({onSendToTarget,onTranslateToTarget,onFormatToTarget,onArchive,externalRef,archives,onDeleteArchive,height,onOpenChild,onTextPasted}) {
  const taRef=useRef(null);
  const setRefs=useCallback(el=>{taRef.current=el;if(externalRef)externalRef.current=el},[externalRef]);
  const [dragOver,setDragOver]=useState(false);
  const [ocrStatus,setOcrStatus]=useState("");
  const [showArchives,setShowArchives]=useState(false);

  const handleImageOCR=useCallback(async file=>{
    if(!file||!file.type.startsWith("image/"))return;
    setOcrStatus("OCR中...");
    try {
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file)});
      const data=await callAPI({model:MODEL,max_tokens:4000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:renderPrompt("ocr_image",{})}]}]});
      if(taRef.current){const ta=taRef.current;ta.value+=(ta.value?"\n\n--- OCR ---\n":"")+exText(data)}
      setOcrStatus("完了"); setTimeout(()=>setOcrStatus(""),2000);
    } catch(e){setOcrStatus("エラー: "+e.message)}
  },[]);

  const getSelected=()=>{const ta=taRef.current;if(!ta)return"";return ta.value.substring(ta.selectionStart,ta.selectionEnd).trim()||ta.value.trim()};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:4,height,flexShrink:0,borderBottom:`1px solid ${C.border}`,padding:"8px 10px",overflow:"hidden"}}>

  );
}

// 取り込み対象エリア

function TargetPanel({text,onAutoAssign,autoAssigning,onTableParse,translating,onClear,onAdd,activeSlot,onSelectText,onSendToPaste,activeType,onImportPlanTables}) {
  // 取込エリア内で選択し終えた瞬間に文字を記憶（スロットclickで選択が消えても保持される）
  const captureSel=()=>{const s=window.getSelection()?.toString();if(s&&s.trim())onSelectText&&onSelectText(s);};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,padding:"8px 10px",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:"0.78rem",fontWeight:700,color:C.yellow}}>取込エリア</span>
          {translating&&<span style={{fontSize:"0.65rem",color:C.blue}}>処理中...</span>}
        </div>
        <div style={{display:"flex",gap:3}}>
          <Btn color={C.purple} disabled={!text} onClick={onSendToPaste}
            style={{padding:"1px 6px",fontSize:"0.68rem"}} title="取込エリア → 貼付エリア（差し戻し・整形/翻訳のやり直し用）">⇧</Btn>
          <Btn color={C.yellow} bg={autoAssigning?C.surface:C.yellow} style={{color:autoAssigning?C.textDim:C.bg}}
            disabled={autoAssigning||!text} onClick={()=>onAutoAssign(text)}>
            {autoAssigning?"振り分け中...":"自動"}
          </Btn>
          <Btn color={C.green} disabled={!text} onClick={()=>onTableParse&&onTableParse(text)}
            style={{padding:"1px 8px",fontSize:"0.68rem"}} title="整形済み表を決定的にスロット格納（AI不使用・100%精度）">格納</Btn>
          {activeType==="firm"&&<Btn color={C.blue} disabled={!text} onClick={()=>onImportPlanTables&&onImportPlanTables(text)}
            style={{padding:"1px 8px",fontSize:"0.68rem"}} title="「## …（プラン名）」区切りの複数早見表から、プランを一括生成し各値まで投入">全プラン</Btn>}
          <Btn color={C.accent} disabled={!activeSlot} onClick={onAdd} title={activeSlot?`${activeSlot}に取り込み`:"スロットを選択してください"}>
            ⇨
          </Btn>
          <Btn color={C.red} onClick={onClear} style={{padding:"1px 5px"}}>×</Btn>
        </div>
      </div>
      <div onMouseUp={captureSel} onKeyUp={captureSel} style={{flex:1,overflow:"auto",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:8,
        fontSize:"0.8rem",fontFamily:font,lineHeight:1.6,color:C.textBright,whiteSpace:"pre-wrap",userSelect:"text"}}>
        {text ? text.split("\n").map((line, i) => {
          const hasContent = line.trim().length > 0;
          return (
            <div key={i}
              onClick={hasContent ? e => {
                const sel = window.getSelection();
                if (!sel) return;
                sel.removeAllRanges();
                const r = document.createRange();
                r.selectNodeContents(e.currentTarget);
                sel.addRange(r);
                captureSel();
              } : undefined}
              title={hasContent ? "クリックで行を選択 → スロットclickで格納" : undefined}
              style={{cursor: hasContent ? "pointer" : "default", padding: "0 2px", borderRadius: 2, minHeight: "1em"}}
            >
              {line || " "}
            </div>
          );
        }) : <span style={{color:C.textDim}}>貼り付けエリアから「翻訳→対象」または「→対象」で送る</span>}
      </div>
      <div style={{fontSize:"0.62rem",color:C.textDim}}>
        {activeSlot?`選択中: ${activeSlot}`:"テキスト選択 ⇄ スロット選択（順不同）→ ⇨ で格納"}
      </div>
    </div>
  );
}

function NotionItemSelectModal({show,onClose,templateMode,currentSlots,slotData,onGenerate}) {
  const [selectedItems,setSelectedItems]=useState([]);
  
  useEffect(()=>{
    if(show){
      // 初期状態: データがあるスロットを全選択
      const filled=currentSlots.filter(s=>slotData[s.id]?.length>0).map(s=>s.id);
      setSelectedItems(filled);
    }
  },[show,currentSlots,slotData]);
  
  if(!show)return null;
  
  // セクション別にグループ化
  const sections={};
  currentSlots.forEach(s=>{
    const sec=s.section||"その他";
    if(!sections[sec])sections[sec]=[];
    sections[sec].push(s);
  });
  
  const toggleItem=(id)=>setSelectedItems(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const selectAll=()=>setSelectedItems(currentSlots.map(s=>s.id));
  const deselectAll=()=>setSelectedItems([]);

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>

                  {secName}
                </div>

                  const filled=slotData[s.id]?.length>0;
                  const selected=selectedItems.includes(s.id);
                  return (
                    <div key={s.id} onClick={()=>toggleItem(s.id)} style={{
                      display:"flex",alignItems:"center",gap:6,padding:"3px 8px",marginBottom:2,
                      background:selected?C.accentDim:C.surfaceAlt,border:`1px solid ${selected?C.accent:C.border}`,
                      borderRadius:4,cursor:"pointer",opacity:filled?1:0.6
                    }}>
                      <input type="checkbox" checked={selected} onChange={()=>{}} style={{cursor:"pointer"}}/>

        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn onClick={onClose} color={C.textDim}>キャンセル</Btn>
          <Btn onClick={()=>onGenerate(selectedItems)} color={C.accent}>📋 プレビュー生成（{selectedItems.length}件）</Btn>
        </div>
      </div>
    </div>
  );
}

function NotionPreviewModal({show,text,onClose}) {
  const[val,setVal]=useState(text||"");
  const[copied,setCopied]=useState(false);
  useEffect(()=>{if(show)setVal(text||"")},[show,text]);
  
  const handleCopy=async()=>{
    try {
      // Clipboard APIを使ってタブ文字を確実に保持
      await navigator.clipboard.writeText(val);
      setCopied(true);
      setTimeout(()=>setCopied(false),1500);
    } catch(err) {
      // フォールバック: 従来の方法
      const ta=document.createElement("textarea");
      ta.value=val;
      ta.style.cssText="position:fixed;opacity:0;white-space:pre"; // white-space:preでタブを保持
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(()=>setCopied(false),1500);
    }
  };
  
  if(!show)return null;
  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"80vw",maxWidth:900,maxHeight:"85vh",background:C.surface,border:`2px solid ${C.accent}`,borderRadius:8,padding:20,display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:"0.9rem",fontWeight:700,color:C.accent}}>📋 Notion本文プレビュー</div>
            <div style={{fontSize:"0.65rem",color:C.textDim,marginTop:2}}>このテキストをNotionページ本文に貼り付けてください</div>
          </div>
          <span onClick={onClose} style={{cursor:"pointer",color:C.red,fontSize:"1.3rem",lineHeight:1}}>×</span>
        </div>
        <textarea value={val} onChange={e=>setVal(e.target.value)} style={{
          flex:1,minHeight:450,background:C.bg,color:C.textBright,border:`1px solid ${C.border}`,borderRadius:6,padding:14,
          fontSize:"0.76rem",fontFamily:"'Courier New',monospace",lineHeight:1.7,resize:"none",outline:"none",whiteSpace:"pre"
        }}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn onClick={onClose} color={C.textDim}>閉じる</Btn>
          <Btn onClick={handleCopy} color={copied?C.green:C.accent}>{copied?"✓ コピー済み":"📋 クリップボードにコピー"}</Btn>
        </div>
      </div>
    </div>
  );
}

// ルールテーブル 入力型分類（2026-06 型指定）

function parseRd(val){
  const p=(val||"").split("|");
  return{c:(p[0]||"").trim(),f:(p[1]||"").trim(),diff:(p[2]||"").trim(),note:p.slice(3).join("|").trim()};
}
function serializeRd({c,f,diff,note}){
  const parts=[c||"",f||"",diff||"",note||""];
  while(parts.length&&!parts[parts.length-1])parts.pop();
  return parts.join("|");
}
// ── 禁止行為（別シェイプ）── slotData["rd_prohibited"] には JSON文字列で {items:[{行為名,備考,行為,処分}]} を格納。
// 他rd_*の "C|F|差分|詳細" とは構造が異なるため専用のparse/serializeで扱う（撲滅ではなく型の一点化）。
function parseProhibit(text){
  if(!text||!String(text).trim())return{items:[]};
  try{
    const o=JSON.parse(text);
    if(o&&Array.isArray(o.items))return{items:o.items.map(it=>({
      行為名:String(it.行為名||it.name||"").trim(),
      備考:String(it.備考||"").trim(),
      行為:String(it.行為||it.act||it.desc||"").trim(),
      処分:String(it.処分||it.penalty||"").trim(),
    }))};
  }catch(e){}
  return{items:[]};
}
function serializeProhibit(items){
  const cleaned=(items||[]).map(it=>({
    行為名:String(it.行為名||"").trim(),
    備考:String(it.備考||"").trim(),
    行為:String(it.行為||"").trim(),
    処分:String(it.処分||"").trim(),
  })).filter(it=>it.行為名||it.行為||it.処分||it.備考);
  return cleaned.length?JSON.stringify({items:cleaned}):"";
}
// NotebookLM一括取込: プランbody内の禁止行為テーブル（| 行為名 | 備考 | 行為 | 処分 |）→ items[]
function parseProhibitTable(body){
  const lines=(body||"").split("\n").map(l=>l.trim());
  const items=[];let colMap=null;
  for(const line of lines){
    if(!line.startsWith("|")){colMap=null;continue;}
    const cells=line.replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
    if(/^[-:\s]*$/.test(cells.join("")))continue; // 区切り行
    if(cells.includes("行為名")&&cells.includes("処分")){ // ヘッダ行
      colMap={name:cells.indexOf("行為名"),note:cells.indexOf("備考"),act:cells.indexOf("行為"),pen:cells.indexOf("処分")};
      continue;
    }
    if(colMap){
      const get=i=>(i>=0&&i<cells.length)?cells[i]:"";
      const name=get(colMap.name);
      if(!name||name==="ー"||name==="—")continue;
      items.push({行為名:name,備考:get(colMap.note),行為:get(colMap.act),処分:get(colMap.pen)});
    }
  }
  return items;
}
// 複数プラン早見表テキストを「## …（プラン名）」見出しで分割（全プラン一括取込用）
function splitPlanSections(text){
  const rawLines=(text||"").split("\n");
  const sections=[];let cur=null;
  for(const raw of rawLines){
    const line=raw.trim();
    const m=line.match(/^#{1,6}\s+(.*)$/);
    // 禁止行為テーブルの見出し（### …禁止行為…）は新プランとして扱わず、直前プランの本文に含める
    if(m&&!/禁止行為/.test(m[1])){
      let name=m[1].trim();
      const pm=name.match(/[（(]\s*([^）)]+?)\s*[）)]\s*$/); // 括弧内をプラン名に
      if(pm)name=pm[1].trim();
      else name=name.replace(/ルール早見表/g,"").replace(/^[-–—\s]+|[-–—\s]+$/g,"").trim();
      cur={name,bodyLines:[]};sections.push(cur);
    } else if(cur){
      cur.bodyLines.push(raw);
    }
  }
  return sections.filter(s=>s.name).map(s=>({name:s.name,body:s.bodyLines.join("\n")}));
}
// 1プラン分の早見表（項目|C|F|差分|詳細）を rd_* スロット値へ。handleTableParse の rd_* 分岐と同ロジック
function parsePlanRuleTable(body){
  const text=(body||"").replace(/￥/g,"¥").replace(/＄/g,"$");
  const parseRow=line=>{const c=line.split("|").map(c=>c.trim());if(c[0]==="")c.shift();if(c[c.length-1]==="")c.pop();return c;};
  const rawLines=text.split("\n").map(l=>l.trim()).filter(l=>l);
  const allLines=[];
  for(let i=0;i<rawLines.length;i++){let line=rawLines[i];if(line.startsWith("|")){while(!line.endsWith("|")&&i+1<rawLines.length){i++;line=line+" "+rawLines[i];}}allLines.push(line);}
  const tableLines=allLines.filter(l=>l.startsWith("|"));
  const labelToId={};
  SLOT_DEFS.dbp02.filter(s=>s.section==="詳細").forEach(s=>{labelToId[s.label]=s.id;});
  labelToId["Steps"]="steps";
  labelToId["最低取引日数"]="rd_minDays";
  labelToId["最低取引日数（合格）"]="rd_minDays";
  labelToId["最低取引日数（出金）"]="rd_minDays";
  const stripPKey=s=>s.replace(/^P\d+[a-z]*[:：.．]\s*/,"").trim();
  const updates={};let stored=0;
  tableLines.forEach(line=>{
    const cells=parseRow(line);
    if(cells.length<2)return;
    const item=stripPKey(cells[0]);
    if(item==="項目"||item==="項目名"||/^[-:\s]+$/.test(item))return;
    const id=labelToId[item];
    if(!id)return;
    if(id==="rd_prohibited")return; // 禁止行為は別テーブル（parseProhibitTable）で処理
    if(id==="steps"){updates[id]=(cells[1]||"").trim();}
    else if(item==="最低取引日数（出金）"&&updates["rd_minDays"]){
      const prev=updates["rd_minDays"].split("|");
      const newF=(cells[2]||"—").trim();const newDiff=(cells[3]||"—").trim();
      const newDetail=cells.slice(4).join("|").trim();
      const prevDetail=prev.slice(3).join("|").trim();
      const mergedDetail=prevDetail&&newDetail?`${prevDetail} / ${newDetail}`:prevDetail||newDetail;
      updates["rd_minDays"]=`${prev[0]||"—"}|${newF}|${newDiff}|${mergedDetail}`;
    } else {
      const C=cells[1]||"—",F=cells[2]||"—",diff=cells[3]||"—";
      const detail=cells.slice(4).join("|").trim();
      updates[id]=`${C}|${F}|${diff}|${detail}`;
    }
    stored++;
  });
  return {updates,stored};
}
function rdBadge(v,yesno){
  if(!v||v==="記載なし"||v==="ー")return{color:C.textDim,bg:"transparent",text:v||"—"};
  if(yesno){
    if(v.includes("なし"))return{color:C.green,bg:`${C.green}20`,text:v};
    if(v.includes("制限")||v.includes("あり"))return{color:C.red,bg:`${C.red}20`,text:v};
  }
  if(/\d/.test(v))return{color:C.yellow,bg:"transparent",text:v};
  return{color:C.text,bg:"transparent",text:v};
}
function diffStyle(d){
  if(d==="EASE")return{color:C.blue,fontWeight:700};
  if(d==="TRAP")return{color:C.red,fontWeight:700};
  return{color:C.textDim,fontWeight:400};
}

function ProhibitEditor({items,setItems}){
  const upd=(i,key,v)=>setItems(prev=>prev.map((it,idx)=>idx===i?{...it,[key]:v}:it));
  const add=()=>setItems(prev=>[...prev,{行為名:"",備考:"",行為:"",処分:""}]);
  const del=i=>setItems(prev=>prev.filter((_,idx)=>idx!==i));
  const inp={background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"3px 6px",fontSize:"0.68rem",fontFamily:font,outline:"none"};
  // コピー: NotebookLM互換テーブル形式（| 行為名 | 備考 | 行為 | 処分 |）→ 再取込・外部貼付け両対応
  const [copiedFb,setCopiedFb]=useState(null); // null | "all" | "i{index}"
  const toTable=(rows)=>{
    const esc=s=>String(s||"").replace(/\|/g,"\\|").replace(/\r?\n/g," ");
    const head="| 行為名 | 備考 | 行為 | 処分 |\n|---|---|---|---|";
    const body=(rows||[]).map(it=>`| ${esc(it.行為名)} | ${esc(it.備考)} | ${esc(it.行為)} | ${esc(it.処分)} |`).join("\n");
    return body?head+"\n"+body:"";
  };
  const doCopy=(rows,tag)=>{
    const t=toTable(rows);if(!t)return;
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).catch(()=>{});
    setCopiedFb(tag);setTimeout(()=>setCopiedFb(null),1200);
  };
  // 丸ごと貼り付け: file:// では clipboard.readText が不可なので、貼付け欄(Ctrl+V)→置換/追加 方式
  const [pasteOpen,setPasteOpen]=useState(false);
  const [pasteText,setPasteText]=useState("");
  const applyPaste=(mode)=>{
    const parsed=parseProhibitTable(pasteText);
    if(!parsed.length){alert("禁止行為テーブル（| 行為名 | 備考 | 行為 | 処分 |）が見つかりません。\n丸ごとコピーした内容を貼り付けてください。");return;}
    if(mode==="replace"){
      if(items.length&&!window.confirm(`既存 ${items.length}件 を、貼り付けた ${parsed.length}件 で置き換えますか？`))return;
      setItems(parsed);
    }else{
      setItems(prev=>[...prev,...parsed]);
    }
    setPasteText("");setPasteOpen(false);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span style={{fontSize:"0.6rem",color:C.textDim}}>禁止行為（1行=1行為。行為名・行為(説明)・処分を入力。備考は極稀なC/F差異用）</span>

          {items.length>0&&<span onClick={()=>doCopy(items,"all")} title="全禁止行為をテーブル形式でクリップボードへコピー"
            style={{cursor:"pointer",fontSize:"0.62rem",fontWeight:700,color:copiedFb==="all"?C.green:C.accent,border:`1px solid ${copiedFb==="all"?C.green:C.accent}`,borderRadius:3,padding:"2px 8px",whiteSpace:"nowrap"}}>{copiedFb==="all"?"✓ コピー済":"⧉ 丸ごとコピー"}</span>}
          <span onClick={()=>setPasteOpen(o=>!o)} title="丸ごとコピーしたテーブルを貼り付けて置換/追加"
            style={{cursor:"pointer",fontSize:"0.62rem",fontWeight:700,color:pasteOpen?C.bg:C.blue,background:pasteOpen?C.blue:"transparent",border:`1px solid ${C.blue}`,borderRadius:3,padding:"2px 8px",whiteSpace:"nowrap"}}>⤵ 丸ごと貼り付け</span>
        </div>
      </div>
      {pasteOpen&&(
        <div style={{display:"flex",flexDirection:"column",gap:5,padding:8,background:C.bg,border:`1px solid ${C.blue}55`,borderRadius:4}}>
          <span style={{fontSize:"0.58rem",color:C.textDim}}>丸ごとコピーしたテーブルをここに貼り付け（Ctrl+V）→ 置換 または 追加</span>
          <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={3}
            placeholder="| 行為名 | 備考 | 行為 | 処分 |&#10;|---|---|---|---|&#10;| HFT |  | … | … |"
            style={{...inp,width:"100%",resize:"vertical",fontSize:"0.64rem"}} />
          <div style={{display:"flex",gap:6}}>
            <span onClick={()=>applyPaste("replace")} style={{cursor:"pointer",fontSize:"0.62rem",fontWeight:700,color:C.bg,background:C.yellow,borderRadius:3,padding:"3px 10px"}}>置換（全消去して貼付）</span>
            <span onClick={()=>applyPaste("append")} style={{cursor:"pointer",fontSize:"0.62rem",fontWeight:700,color:C.bg,background:C.green,borderRadius:3,padding:"3px 10px"}}>追加（末尾に足す）</span>
            <span onClick={()=>{setPasteOpen(false);setPasteText("")}} style={{cursor:"pointer",fontSize:"0.62rem",color:C.textDim,border:`1px solid ${C.border}`,borderRadius:3,padding:"3px 10px"}}>閉じる</span>
          </div>
        </div>
      )}
      {items.map((it,i)=>(
        <div key={i} style={{display:"flex",gap:4,alignItems:"flex-start",borderLeft:`2px solid ${C.border}`,paddingLeft:6}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,paddingTop:2}}>
            <span onClick={()=>del(i)} title="この行為を削除"

            <span onClick={()=>doCopy([it],"i"+i)} title="この1行為を全フィールドコピー"
              style={{cursor:"pointer",color:copiedFb==="i"+i?C.green:C.textDim,fontSize:"0.74rem",lineHeight:1,userSelect:"none"}}>{copiedFb==="i"+i?"✓":"⧉"}</span>

              <input value={it.行為名} onChange={e=>upd(i,"行為名",e.target.value)} placeholder="行為名（例: HFT）" style={{...inp,flex:"1 1 160px",minWidth:120}}/>
              <input value={it.備考} onChange={e=>upd(i,"備考",e.target.value)} placeholder="備考（通常空欄）" style={{...inp,flex:"1 1 120px",minWidth:90,color:C.textDim}}/>
            </div>
            <input value={it.行為} onChange={e=>upd(i,"行為",e.target.value)} placeholder="行為（説明）" style={{...inp,width:"100%"}}/>

    </div>
  );
}

function RuleTableEditor({slotData,setSlotData,locks,setLocks,copyTargets,onCopyRuleSlot,allPlans,currentPlanId,onUpdatePlanSlot}){
  const [open,setOpen]=useState(null); // 編集中のslotId
  const [draft,setDraft]=useState({c:"",f:"",diff:"ー",note:""});
  const [prohibitItems,setProhibitItems]=useState([]); // 禁止行為（別シェイプ）編集用 items
  const [copySel,setCopySel]=useState({}); // コピー先プランID選択
  const [copied,setCopied]=useState(false);
  const [cmpTab,setCmpTab]=useState("quick"); // 全プラン比較タブ: quick=早見表 / detail=詳細
  const [rowDrafts,setRowDrafts]=useState({}); // 他プランのインライン編集ドラフト {planId:{c,f,diff,note}}
  // 指定プランの指定スロットの値を取り出してパース（禁止行為は別シェイプ）
  const planVal=(pl,sid)=>{
    const fr=pl&&pl.slotData?pl.slotData[sid]:null;if(!fr||!fr.length)return null;
    const m=fr.find(f=>f.merged);const txt=m?m.text:(fr[0]?.text||"");if(!txt)return null;
    if(sid===PROHIBIT_ID){const its=parseProhibit(txt).items;return{prohibit:true,count:its.length,names:its.map(i=>i.行為名).filter(Boolean).join(" / ")};}
    return parseRd(txt);
  };
  const cmpTh=(w)=>({padding:"3px 5px",textAlign:w?"center":"left",color:C.textDim,fontWeight:700,fontSize:"0.55rem",whiteSpace:"nowrap",borderBottom:`1px solid ${C.border}`,...(w?{width:w}:{})});
  const cmpTd=(w)=>({padding:"3px 5px",color:C.text,verticalAlign:"top",fontSize:"0.6rem",...(w?{width:w,textAlign:"center"}:{})});
  const cmpInp={background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"2px 4px",fontSize:"0.6rem",fontFamily:font,outline:"none"};
  // 比較表を開いたとき、他プランのインライン編集ドラフトを各プランの現在値で初期化（item切替時のみ）
  useEffect(()=>{
    if(!open||open===PROHIBIT_ID){setRowDrafts({});return;}
    const d={};
    (allPlans||[]).forEach(pl=>{
      if(pl.id===currentPlanId)return;
      const pv=planVal(pl,open);
      if(pv&&!pv.prohibit){
        const c=pv.c||"",f=pv.f||"";const ad=autoDiff(open,c,f);
        d[pl.id]={c,f,diff:ad!=null?ad:(pv.diff||"ー"),note:pv.note||"",dm:false};
      }else{
        d[pl.id]={c:"",f:"",diff:"ー",note:"",dm:false};
      }
    });
    setRowDrafts(d);
  },[open]);
  // インライン行ドラフト: 編集中プランは draft、他プランは rowDrafts
  const rowOf=(pl)=>pl.id===currentPlanId?draft:(rowDrafts[pl.id]||{c:"",f:"",diff:"ー",note:""});
  const setRowOf=(pl,patch)=>{
    const apply=(prev)=>{
      const base=prev||{c:"",f:"",diff:"ー",note:"",dm:false};
      const merged={...base,...patch};
      if("diff" in patch){merged.dm=true;} // 差分を手動変更
      else if(("c" in patch||"f" in patch)&&!merged.dm){ // C/F変更→オート再計算
        const ad=autoDiff(open,merged.c,merged.f);
        if(ad!=null)merged.diff=ad;
      }
      return merged;
    };
    if(pl.id===currentPlanId){setDraft(p=>apply(p));}
    else{setRowDrafts(prev=>({...prev,[pl.id]:apply(prev[pl.id])}));}
  };
  // 他プラン行を確定（編集中プランは下の「保存」で確定するためスキップ）
  const commitRow=(pl)=>{
    if(pl.id===currentPlanId||!onUpdatePlanSlot)return;
    const d=rowDrafts[pl.id];if(!d)return;
    onUpdatePlanSlot(pl.id,open,serializeRd(normalize(open,d)));
  };

  const slots=SLOT_DEFS.dbp02.filter(s=>s.id.startsWith("rd_"));
  const getVal=id=>{
    const fr=slotData[id];if(!fr?.length)return"";
    const m=fr.find(f=>f.merged);return m?m.text:fr[0]?.text||"";
  };
  const typeOf=id=>NUM_IDS.has(id)?"num":LOSSTYPE_IDS.has(id)?"loss":id===PROHIBIT_ID?"prohibit":"yn3";
  const withUnit=(raw,unit)=>{
    const v=(raw||"").trim();
    if(!v||NUM_SPECIAL.includes(v)||v==="ー"||v==="—")return v;
    return unit&&!v.endsWith(unit)?v+unit:v;
  };
  // ── 差分オート判定 ── F が C より緩い→EASE / 厳しい→TRAP / 同等or非該当→ー / 判定不能→null（手動）
  const firstNum=s=>{const m=String(s||"").match(/-?\d+(?:\.\d+)?/);return m?parseFloat(m[0]):null;};
  const isNAv=v=>{v=(v||"").trim();return !v||v==="ー"||v==="—";};
  const autoDiff=(id,c,f)=>{
    c=(c||"").trim();f=(f||"").trim();
    if(isNAv(c)||isNAv(f))return "ー";
    if(c===f)return "ー";
    if(c==="無"&&f==="無")return "ー";
    if(c==="無")return "TRAP"; // C=無(最緩)・F=制限あり → F厳しい
    if(f==="無")return "EASE"; // F=無(最緩) → F緩い
    if(LOSSTYPE_IDS.has(id)){ // DD計算タイプ（厳しさ順位）
      const cr=DD_DIFF_RANK[c],fr=DD_DIFF_RANK[f];
      if(cr==null||fr==null)return null;
      return fr<cr?"EASE":fr>cr?"TRAP":"ー";
    }
    if(DIFF_HIGH_EASY.has(id)||DIFF_LOW_EASY.has(id)){ // 数値型
      if(id==="rd_target"&&!(c.includes("%")&&f.includes("%")))return null; // 利益目標は両方%のみ
      const cn=firstNum(c),fn=firstNum(f);
      if(cn!=null&&fn!=null){
        if(cn===fn)return "ー";
        const fLooser=DIFF_HIGH_EASY.has(id)?fn>cn:fn<cn;
        return fLooser?"EASE":"TRAP";
      }
    }
    if(CAT_STRICT[c]!=null&&CAT_STRICT[f]!=null){ // カテゴリ（無<※有<有）
      return CAT_STRICT[f]<CAT_STRICT[c]?"EASE":CAT_STRICT[f]>CAT_STRICT[c]?"TRAP":"ー";
    }
    return null; // 判定不能 → 手動
  };
  const openRow=(slot)=>{
    if(locks[slot.id])return;
    if(slot.id===PROHIBIT_ID){
      const its=parseProhibit(getVal(slot.id)).items;
      setProhibitItems(its.length?its:[{行為名:"",備考:"",行為:"",処分:""}]);
    } else {
      setDraft({...parseRd(getVal(slot.id)),dm:false}); // dm=差分手動フラグ（false=オート）
    }
    setOpen(slot.id);setCopySel({});setCopied(false);
  };
  // メイン編集: C/F変更で差分を自動再計算（手動上書き dm=true 時はスキップ）
  useEffect(()=>{
    if(!open||open===PROHIBIT_ID)return;
    setDraft(p=>{
      if(p.dm)return p;
      const ad=autoDiff(open,p.c,p.f);
      return (ad!=null&&ad!==p.diff)?{...p,diff:ad}:p;
    });
  },[draft.c,draft.f,open]);
  // 保存・コピー共通の値正規化（単位付与・差分自動・禁止行為特例）
  const normalize=(id,src)=>{
    const d={...src};
    if(typeOf(id)==="num"){const u=UNIT_MAP[id]||"";d.c=withUnit(d.c,u);d.f=withUnit(d.f,u);}
    // 同値・F未入力・F非該当（ー）は差分なし。EASE/TRAPはC/Fが異なる時のみ意味を持つ
    if(!d.f||d.f==="ー"||d.c===d.f)d.diff="ー";
    if(id===PROHIBIT_ID){d.f="";d.diff="ー";}
    return d;
  };
  const save=()=>{
    if(!open)return;
    const text=open===PROHIBIT_ID?serializeProhibit(prohibitItems):serializeRd(normalize(open,draft));
    setSlotData(prev=>({...prev,[open]:text?[{text}]:[]}));
    setOpen(null);
  };
  const cancel=()=>{setOpen(null);setCopySel({});setCopied(false);};
  // 編集中の項目値を選択した他プランへコピー（複数可）。現在のプランへは save() で別途反映する
  const doCopy=()=>{
    if(!open||!onCopyRuleSlot)return;
    const ids=Object.keys(copySel).filter(k=>copySel[k]);
    if(!ids.length)return;
    const text=open===PROHIBIT_ID?serializeProhibit(prohibitItems):serializeRd(normalize(open,draft));
    onCopyRuleSlot(open,text,ids);
    // 比較表のインライン表示も即同期（コピー先プランのrowDraftを上書き）。
    // これが無いと slotData は更新されるのに入力欄が再オープンまで反映されず「コピーが効かない」ように見える。
    if(open!==PROHIBIT_ID){
      const pd=parseRd(text);
      setRowDrafts(prev=>{const n={...prev};ids.forEach(id=>{if(id!==currentPlanId)n[id]={c:pd.c,f:pd.f,diff:pd.diff,note:pd.note};});return n;});
    }
    setCopied(true);setTimeout(()=>setCopied(false),1500);
  };

  // 基本は白。差分（EASE/TRAP）がある行のみその行全体を差分色で着色する
  const rowColor=d=>d==="EASE"?C.blue:d==="TRAP"?C.red:C.text;
  const cellColor=(v,rc)=>{
    if(!v||v==="ー"||v==="—")return C.textDim;
    return rc||C.text;
  };
  const Cell=({v,rc})=>(
    <span style={{fontSize:"0.7rem",color:cellColor(v,rc),whiteSpace:"nowrap",overflow:"hidden",
      textOverflow:"ellipsis",maxWidth:170,display:"inline-block",verticalAlign:"bottom"}}>{v||"—"}</span>
  );


  return(
    <div style={{overflow:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.68rem"}}>
        <thead>
          <tr style={{borderBottom:`2px solid ${C.border}`}}>
            <th style={{padding:"4px 6px",width:20,textAlign:"center"}}>
              {setLocks&&(()=>{const allL=slots.every(s=>!!locks[s.id]);return<span onClick={()=>{const next={...locks};slots.forEach(s=>{next[s.id]=!allL});setLocks(next)}} style={{cursor:"pointer",fontSize:"0.65rem",color:allL?C.yellow:C.textDim}} title={allL?"全解除":"全ロック"}>{allL?"🔒":"🔓"}</span>;})()}
            </th>
            {["項目","Challenge","Funded","差分"].map(h=>(
              <th key={h} style={{padding:"5px 6px",textAlign:"left",color:C.textDim,
                fontWeight:700,fontSize:"0.6rem",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {slots.map(slot=>{
            const t=typeOf(slot.id);
            const unit=UNIT_MAP[slot.id]||"";
            const isProhibit=slot.id===PROHIBIT_ID;
            const val=getVal(slot.id);
            const p=parseRd(val);
            const prohNames=isProhibit?parseProhibit(val).items.map(i=>i.行為名).filter(Boolean).join(" / "):"";
            const isEmpty=!val;
            const isOpen=open===slot.id;
            const locked=!!locks[slot.id];
            return(
              <React.Fragment key={slot.id}>
                <tr onClick={()=>isOpen?cancel():openRow(slot)}
                  style={{borderBottom:`1px solid ${C.border}`,cursor:locked?"default":"pointer",
                    background:isOpen?C.accentDim:"transparent"}}
                  onMouseEnter={e=>{if(!isOpen&&!locked)e.currentTarget.style.background=C.surfaceAlt}}
                  onMouseLeave={e=>{if(!isOpen)e.currentTarget.style.background="transparent"}}>
                  <td style={{padding:"4px 6px",textAlign:"center",width:20}} onClick={e=>e.stopPropagation()}>
                    {setLocks&&<span onClick={()=>setLocks(p=>({...p,[slot.id]:!locked}))} style={{cursor:"pointer",fontSize:"0.65rem",color:locked?C.yellow:C.textDim}} title={locked?"解除":"ロック"}>{locked?"🔒":"🔓"}</span>}
                  </td>
                  <td style={{padding:"6px 6px",color:isEmpty?C.textDim:C.textBright,fontWeight:isEmpty?400:500,whiteSpace:"nowrap"}}>
                    {slot.label}
                  </td>
                  {isProhibit?(
                    <td colSpan={3} style={{padding:"6px 6px"}}><Cell v={prohNames}/></td>
                  ):(<React.Fragment>
                    <td style={{padding:"6px 6px"}}><Cell v={p.c} rc={rowColor(p.diff)}/></td>
                    <td style={{padding:"6px 6px"}}><Cell v={p.f} rc={rowColor(p.diff)}/></td>
                    <td style={{padding:"6px 6px"}}><span style={diffStyle(p.diff)}>{p.diff||"—"}</span></td>
                  </React.Fragment>)}
                </tr>
                {isOpen&&(
                  <tr style={{background:C.surfaceAlt}}>
                    <td colSpan={4} style={{padding:"10px 8px"}}>
                      {isProhibit?(
                        <ProhibitEditor items={prohibitItems} setItems={setProhibitItems}/>
                      ):(<React.Fragment>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                          <ValueField label="Challenge" valKey="c" t={t} unit={unit} draft={draft} setDraft={setDraft}/>
                          <ValueField label="Funded" valKey="f" t={t} unit={unit} draft={draft} setDraft={setDraft}/>
                          <div style={{display:"flex",flexDirection:"column",gap:2}}>
                            <span style={{fontSize:"0.6rem",color:C.textDim,display:"flex",gap:5,alignItems:"center"}}>差分
                              {draft.dm
                                ?<span onClick={()=>setDraft(p=>{const ad=autoDiff(open,p.c,p.f);return{...p,dm:false,diff:ad!=null?ad:p.diff};})} title="オートに戻す" style={{cursor:"pointer",color:C.yellow,fontSize:"0.55rem",border:`1px solid ${C.yellow}`,borderRadius:2,padding:"0 4px"}}>手動 ↺auto</span>
                                :<span title="C/Fから自動判定中" style={{color:C.green,fontSize:"0.55rem",border:`1px solid ${C.green}`,borderRadius:2,padding:"0 4px"}}>AUTO</span>}
                            </span>
                            <select value={draft.diff} onChange={e=>setDraft(p=>({...p,diff:e.target.value,dm:true}))}
                              style={{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"3px 5px",fontSize:"0.68rem"}}>
                              {DIFF_OPTS.map(o=><option key={o}>{o}</option>)}
                            </select>
                          </div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:8}}>
                          <span style={{fontSize:"0.6rem",color:C.textDim}}>詳細（常体・です/ます禁止。書き出し固定: 差分=ー→「Challenge・Funded共に～」/ EASE|TRAP→「Challengeでは～。Fundedでは～」。無の項目は「～について明示的に制限する記載はない」）</span>
                          <textarea value={draft.note} onChange={e=>setDraft(p=>({...p,note:e.target.value}))}
                            placeholder="Challenge・Funded共に…" rows={4}
                            style={{width:"100%",background:C.bg,color:C.text,border:`1px solid ${C.border}`,
                              borderRadius:3,padding:"3px 6px",fontSize:"0.68rem",fontFamily:font,outline:"none",resize:"vertical"}} />
                        </div>
                      </React.Fragment>)}
                      <div style={{display:"flex",gap:4}}>
                        <Btn color={C.accent} onClick={save} style={{padding:"2px 10px",fontSize:"0.65rem"}}>保存</Btn>
                        <Btn color={C.textDim} onClick={cancel} style={{padding:"2px 10px",fontSize:"0.65rem"}}>取消</Btn>
                        {val&&<Btn color={C.red} onClick={()=>{setSlotData(p=>({...p,[slot.id]:[]}));cancel();}}
                          style={{padding:"2px 8px",fontSize:"0.65rem"}}>クリア</Btn>}
                      </div>
                      {allPlans&&allPlans.length>0&&(()=>{
                        const others=allPlans.filter(pl=>pl.id!==currentPlanId);
                        const allOn=others.length>0&&others.every(pl=>copySel[pl.id]);
                        const isProhibitOpen=slot.id===PROHIBIT_ID;
                        const editable=!isProhibitOpen; // 禁止行為（別シェイプ）はインライン編集対象外＝読取専用
                        // 差分セレクトの即時コミット（onChangeで確定）
                        const commitDiff=(pl,v)=>{if(pl.id===currentPlanId||!onUpdatePlanSlot)return;const d={...(rowDrafts[pl.id]||{c:"",f:"",diff:"ー",note:""}),diff:v};onUpdatePlanSlot(pl.id,open,serializeRd(normalize(open,d)));};
                        return (
                        <div style={{marginTop:8,paddingTop:8,borderTop:`1px dashed ${C.border}`,display:"flex",flexDirection:"column",gap:5}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontSize:"0.6rem",color:C.textDim}}>全プランの「{slot.label}」 — {editable?"各セルを直接編集（他プランは自動保存）／":""}チェック → 現在の編集値で一括上書き</span>
                            <div style={{display:"flex",gap:3}}>
                              {[["quick","早見表"],["detail","詳細"]].map(([k,lbl])=>(
                                <span key={k} onClick={()=>setCmpTab(k)} style={{cursor:"pointer",fontSize:"0.58rem",fontWeight:700,padding:"2px 9px",borderRadius:3,color:cmpTab===k?C.bg:C.textDim,background:cmpTab===k?C.accent:"transparent",border:`1px solid ${cmpTab===k?C.accent:C.border}`}}>{lbl}</span>
                              ))}
                            </div>
                          </div>
                          <div style={{border:`1px solid ${C.border}`,borderRadius:4,overflowX:"auto"}}>
                            <table style={{width:"100%",borderCollapse:"collapse"}}>
                              <thead><tr>
                                <th style={cmpTh(22)}><span onClick={()=>{const n={...copySel};if(allOn)others.forEach(pl=>delete n[pl.id]);else others.forEach(pl=>n[pl.id]=true);setCopySel(n);}} style={{cursor:"pointer",color:allOn?C.accent:C.textDim}} title={allOn?"全解除":"全選択"}>{allOn?"☑":"☐"}</span></th>
                                <th style={cmpTh()}>プラン</th>
                                {cmpTab==="quick"
                                  ?<React.Fragment><th style={cmpTh(74)}>C</th><th style={cmpTh(74)}>F</th><th style={cmpTh(66)}>差</th><th style={{...cmpTh(),width:"100%"}}/></React.Fragment>
                                  :<th style={{...cmpTh(),width:"100%"}}>詳細</th>}
                              </tr></thead>
                              <tbody>
                                {allPlans.map(pl=>{
                                  const isCur=pl.id===currentPlanId;
                                  const pv=planVal(pl,slot.id);
                                  const on=!!copySel[pl.id];
                                  const r=rowOf(pl);
                                  const diffCol=v=>v==="EASE"?C.blue:v==="TRAP"?C.red:C.textDim;
                                  return (
                                  <tr key={pl.id} style={{borderTop:`1px solid ${C.border}`,background:isCur?C.accentDim:"transparent"}}>
                                    <td style={{...cmpTd(22)}}>{isCur?<span style={{color:C.accent}}>●</span>:<span onClick={()=>setCopySel(p=>({...p,[pl.id]:!p[pl.id]}))} style={{cursor:"pointer",color:on?C.accent:C.textDim}}>{on?"☑":"☐"}</span>}</td>
                                    <td style={{...cmpTd(),color:isCur?C.accent:C.text,fontWeight:isCur?700:400,whiteSpace:"nowrap"}}>{pl.name||pl.id}{isCur&&" ●"}</td>
                                    {cmpTab==="quick"
                                      ?(editable?<React.Fragment>
                                        <td style={cmpTd(74)}><input value={r.c} onChange={e=>setRowOf(pl,{c:e.target.value})} onBlur={()=>commitRow(pl)} style={{...cmpInp,width:64}} placeholder="—"/></td>
                                        <td style={cmpTd(74)}><input value={r.f} onChange={e=>setRowOf(pl,{f:e.target.value})} onBlur={()=>commitRow(pl)} style={{...cmpInp,width:64}} placeholder="—"/></td>
                                        <td style={cmpTd(66)}><select value={r.diff||"ー"} onChange={e=>{setRowOf(pl,{diff:e.target.value});commitDiff(pl,e.target.value);}} style={{...cmpInp,width:58,color:diffCol(r.diff)}}>{["ー","EASE","TRAP"].map(o=><option key={o} value={o}>{o}</option>)}</select></td>
                                        <td style={cmpTd()}/>
                                      </React.Fragment>:<React.Fragment>
                                        <td colSpan={3} style={{...cmpTd(),color:pv?C.text:C.textDim}}>{pv?(pv.prohibit?pv.count+"件":(pv.c||"—")):"（未）"}</td>
                                        <td style={cmpTd()}/>
                                      </React.Fragment>)
                                      :(editable
                                        ?<td style={{...cmpTd(),width:"100%"}}><textarea value={r.note} onChange={e=>setRowOf(pl,{note:e.target.value})} onBlur={()=>commitRow(pl)} rows={2} style={{...cmpInp,width:"100%",resize:"vertical",lineHeight:1.4}} placeholder="詳細…"/></td>
                                        :<td style={{...cmpTd(),width:"100%",whiteSpace:"pre-wrap",lineHeight:1.5,color:pv?C.text:C.textDim}}>{pv?(pv.prohibit?(pv.names||"—"):(pv.note||"—")):"（未入力）"}</td>)}
                                  </tr>);
                                })}
                              </tbody>
                            </table>
                          </div>
                          <div>
                            <Btn color={C.accent} onClick={doCopy} disabled={!Object.values(copySel).some(Boolean)}
                              style={{padding:"2px 10px",fontSize:"0.65rem"}}>{copied?"コピー済 ✓":"▷ 選択プランへ現在値をコピー"}</Btn>
                          </div>
                        </div>
                        );
                      })()}
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}
