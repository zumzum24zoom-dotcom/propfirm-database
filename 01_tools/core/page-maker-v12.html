  // 保存先ファイル（pfdb.json）のハンドルを永続化 — 常に同一ファイルへ上書きし連番増殖を防ぐ
  const SAVE_FILE_KEY="saveFile";
  const saveSaveHandle=async h=>{try{const db=await openIDB();const tx=db.transaction(IDB_STORE,"readwrite");tx.objectStore(IDB_STORE).put(h,SAVE_FILE_KEY);}catch(e){}};
  const loadSaveHandle=async()=>{try{const db=await openIDB();return new Promise((res,rej)=>{const r=db.transaction(IDB_STORE).objectStore(IDB_STORE).get(SAVE_FILE_KEY);r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}catch(e){return null;}};
  const ensureRW=async(fh,mode="readwrite")=>{try{let p=await fh.queryPermission({mode});if(p!=="granted")p=await fh.requestPermission({mode});return p==="granted";}catch(e){return false;}};

  // 起動時にフォルダ・保存ファイルハンドルを復元
  useEffect(()=>{
    loadHandle().then(async h=>{
      if(!h)return;
      try{
        const perm=await h.queryPermission({mode:"readwrite"});
        setHugoDirName(h.name+(perm==="granted"?"":"（要確認）"));
        if(perm==="granted")setHugoDir(h);
      }catch(e){}
    });
    loadSaveHandle().then(async h=>{
      if(!h)return;
      try{setSaveFileName(h.name);}catch(e){}
    });
  },[]);

  const HUGO_FORBIDDEN_DIRS=["data","content","themes","static","layouts","assets","public"];
  const selectHugoDir=useCallback(async()=>{
    try{
      const d=await window.showDirectoryPicker({mode:"readwrite"});
      if(HUGO_FORBIDDEN_DIRS.includes(d.name)){
        alert(`⚠️ 選択フォルダ「${d.name}」は Hugo プロジェクトルートではありません。\n\npropfirm-database フォルダ（ルート）を選択してください。`);
        return;
      }
      setHugoDir(d);setHugoDirName(d.name);
      await saveHandle(d);
    }catch(e){if(e.name!=="AbortError")alert("フォルダ選択エラー: "+e.message);}
  },[]);
  const clearHugoDir=useCallback(async()=>{
    setHugoDir(null);setHugoDirName("");
    try{const db=await openIDB();const tx=db.transaction(IDB_STORE,"readwrite");tx.objectStore(IDB_STORE).delete(IDB_KEY);}catch(e){}
  },[]);
  const clearSaveFile=useCallback(async()=>{
    setSaveFileName("");
    try{const db=await openIDB();const tx=db.transaction(IDB_STORE,"readwrite");tx.objectStore(IDB_STORE).delete(SAVE_FILE_KEY);}catch(e){}
  },[]);
  const exportHugo=useCallback(async()=>{
    let dir=hugoDir;
    if(!dir){
      // 未選択なら IndexedDB から復元して再確認
      const h=await loadHandle();
      if(h){const p=await h.requestPermission({mode:"readwrite"});if(p==="granted"){setHugoDir(h);setHugoDirName(h.name);dir=h;}}
      if(!dir){alert("まずHugo出力先フォルダを選択してください");return;}
    }
    // dir を hugoDir の代わりに使う（以降 hugoDir を dir に変更）
    const hugoDir=dir;
    if(HUGO_FORBIDDEN_DIRS.includes(hugoDir.name)){
      alert(`⚠️ 出力先「${hugoDir.name}」は Hugo プロジェクトルートではありません。\n\n🔄 Hugo ボタン横の「▾」からフォルダを再選択してください（propfirm-database フォルダを選択）。`);
      return;
    }
    let count=0;
    try{
      await writeHugoFile(hugoDir,["data","glossary.json"],JSON.stringify(glossaryTerms,null,2));
      count++;
      for(const firm of firms){
        const fd=tabDataMap[firm.id];
        if(!fd)continue;
        const sd=fd.slotData||{};
        const firmName=getSlotText(sd,"firmName")||firm.name||"";
        const slug=slugify(firmName)||firm.id;
        const fj={slug};
        for(const[ek,jk]of Object.entries(FIRM_KEY_MAP))fj[jk]=getSlotText(sd,ek);
        // メールアドレス / アフィリエイトURL / クーポンコード は MASTER_DEFS スロット由来のため上のループで出力済み
        fj["プラン一覧"]=(firm.plans||[]).map(p=>p.name);
        // 攻略3断面（k_dd / k_rules / k_payout）— NotebookLM出力 or Sonnet生成のMarkdown/HTMLをそのまま格納
        const kDd=getSlotText(sd,"k_dd"); if(kDd) fj["攻略_DD"]=kDd;
        const kRules=getSlotText(sd,"k_rules"); if(kRules) fj["攻略_取引ルール"]=kRules;
        const kPayout=getSlotText(sd,"k_payout"); if(kPayout) fj["攻略_出金"]=kPayout;
        // 価格マトリクス（構造化JSON）。prices のキーをプラン名→slug に変換して出力
        const ptRaw=getSlotText(sd,"priceTable");
        if(ptRaw){try{
          const pt=JSON.parse(ptRaw);
          if(pt&&Array.isArray(pt.rows)){
            const nameToSlug={};
            (firm.plans||[]).forEach(pl=>{
              const ppsd=(tabDataMap[pl.id]||{}).slotData||{};
              const pn=getSlotText(ppsd,"challengeName")||pl.name||"";
              const cn=pn.replace(new RegExp(`^${firmName.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}\\s*[-–]\\s*`),"");
              nameToSlug[pl.name]=slugify(cn)||pl.id;
            });
            const rows=pt.rows.map(r=>{
              const np={};
              Object.entries(r.prices||{}).forEach(([k,v])=>{np[nameToSlug[k]||slugify(k)]=v;});
              return {...r,prices:np};
            });
            fj["価格テーブル"]={...pt,rows};
          }
        }catch(e){}}
        await writeHugoFile(hugoDir,["data","firms",`${slug}.json`],JSON.stringify(fj,null,2));
        count++;
        // _index.md は targetText 有無に関わらず必ず出力（type: firm が無いと firm/list.html が選ばれない）
        {
          const body=fd.targetText||"";
          const md=`---\ntype: firm\ntitle: "${firmName}"\nslug: "${slug}"\nfirm: "${slug}"\n---\n\n${body}`;
          await writeHugoFile(hugoDir,["content","firms",slug,"_index.md"],md);
          count++;
        }
        for(const plan of(firm.plans||[])){
          const pd=tabDataMap[plan.id];
          if(!pd)continue;
          const psd=pd.slotData||{};
          const planName=getSlotText(psd,"challengeName")||plan.name||"";
          const cleanName=planName.replace(new RegExp(`^${firmName.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}\\s*[-\u2013]\\s*`),"");
          const planSlug=slugify(cleanName)||plan.id;
          const pj={slug:planSlug,"\u30d5\u30a1\u30fc\u30e0":slug};
          for(const[ek,jk]of Object.entries(PLAN_KEY_MAP)){
            const raw=getSlotText(psd,ek);
            if(ek===PROHIBIT_ID){
              // \u7981\u6b62\u884c\u70ba\uff08\u5225\u30b7\u30a7\u30a4\u30d7\uff09: {items:[{\u884c\u70ba\u540d,\u5099\u8003,\u884c\u70ba,\u51e6\u5206}]}
              const pr=parseProhibit(raw);
              if(pr.items.length)pj[jk]={items:pr.items};
            } else if(ek.startsWith("rd_")){
              // \u65e9\u898b\u8868+\u8a73\u7d30\u306e\u7d71\u5408\u30ec\u30b3\u30fc\u30c9: "C|F|\u5dee\u5206|\u8a73\u7d30" \u2192 {C,F,\u5dee\u5206,\u8a73\u7d30}\uff08\u5148\u982d3\u5217\u56fa\u5b9a\u30fb\u6b8b\u308a\u3092\u8a73\u7d30\uff09
              if(raw&&raw.trim()){
                const p=raw.split("|");
                pj[jk]={C:(p[0]||"").trim(),F:(p[1]||"").trim(),"\u5dee\u5206":(p[2]||"").trim(),"\u8a73\u7d30":p.slice(3).join("|").trim()};
              }
              // \u7a7a\u306erd_\u306f\u30ad\u30fc\u3054\u3068\u7701\u7565
            } else {
              pj[jk]=raw;
            }
          }
          await writeHugoFile(hugoDir,["data","plans",`${slug}--${planSlug}.json`],JSON.stringify(pj,null,2));
          count++;
          if(pd.targetText){
            const mdp=`---\ntype: plans\ntitle: "${cleanName}"\nslug: "${planSlug}"\nfirm: "${slug}"\n---\n\n${pd.targetText}`;
            await writeHugoFile(hugoDir,["content","firms",slug,"plans",planSlug,"index.md"],mdp);
            count++;
          }
        }
      }
      dirtyRef.current=false;
      alert(`Hugo出力完了: ${count}ファイルを書き込みました`);
    }catch(e){alert("エラー: "+e.message);}
  },[hugoDir,firms,tabDataMap,glossaryTerms]);

  // データ適用（読込・復元の共通処理）— ID衝突回避＋glossary正本補完
  const applyData=useCallback(d=>{
    if(!d)return;
    if(d.firms)setFirms(d.firms);
    if(d.sections)setSections(d.sections);
    if(d.sessionName!==undefined)setSessionName(d.sessionName||"");
    if(d.tabDataMap)setTabDataMap(d.tabDataMap);
    if(d.glossaryTerms){
      const loaded=d.glossaryTerms;
      const loadedKeys=new Set(loaded.map(t=>t.key).filter(Boolean));
      const missingSeed=GLOSSARY_SEED.filter(s=>!loadedKeys.has(s.key)).map(s=>({...s}));
      setGlossaryTerms([...missingSeed,...loaded]);
    }
    if(d.firms?.[0])setActiveTabId(d.firms[0].id);
    if(d.firms){
      let maxId=0;
      const ids=new Set();
      d.firms.forEach(f=>{
        ids.add(f.id);
        const fn=parseInt(f.id.replace(/\D/g,""))||0; if(fn>maxId)maxId=fn;
        (f.plans||[]).forEach(p=>{ids.add(p.id);const pn=parseInt(p.id.replace(/\D/g,""))||0; if(pn>maxId)maxId=pn});
      });
      nextId.current=maxId+1;
      loadedIdsRef.current=ids; // 読込台帳を確定（差分反映保存の基準）
    }
  },[]);

  // pfdb.json のFirm一覧を表示してセッションへ選択マージ
  const buildPickerList=(data)=>(data.firms||[]).map(f=>({
    id:f.id,
    name:getFirmName(f.id,data.tabDataMap||{})||f.name||f.id,
    firm:f,
    planCount:(f.plans||[]).length,
  }));
  const openFirmPicker=useCallback(async()=>{
    const apply=(data)=>{
      if(!data||!Array.isArray(data.firms)){showToast("このファイルにはfirmsデータがありません");return;}
      const list=buildPickerList(data);
      if(!list.length){showToast("ファイルにFirmデータがありません");return;}
      setFirmPicker({list,checked:Object.fromEntries(list.map(f=>[f.id,false])),fileTabDataMap:data.tabDataMap||{}});
    };
    if(location.protocol==="file:"){importJSON(apply);return;}
    let fh=await loadSaveHandle();
    if(fh&&!(await ensureRW(fh,"read")))fh=null;
    if(!fh){
      if(window.showOpenFilePicker){
        try{const [picked]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});fh=picked;}
        catch(e){if(e.name!=="AbortError")showToast("✗ ファイル選択エラー: "+e.message);return;}
      }else{importJSON(apply);return;}
    }
    try{apply(JSON.parse(await (await fh.getFile()).text()));}catch(e){showToast("✗ 読込エラー: "+e.message);}
  },[showToast]);

  const applyFirmPicker=useCallback(()=>{
    if(!firmPicker)return;
    const selected=firmPicker.list.filter(item=>firmPicker.checked[item.id]);
    if(!selected.length){showToast("Firmを選択してください");return;}
    setFirms(prev=>{
      const m=new Map(prev.map(f=>[f.id,f]));
      for(const item of selected)m.set(item.id,item.firm);
      return [...m.values()];
    });
    setTabDataMap(prev=>{
      const next={...prev};
      for(const item of selected){
        [item.id,...(item.firm.plans||[]).map(p=>p.id)].forEach(id=>{if(firmPicker.fileTabDataMap[id])next[id]=firmPicker.fileTabDataMap[id];});
      }
      return next;
    });
    // nextId を最大IDより大きい値に更新
    let maxId=nextId.current-1;
    for(const item of selected){
      const fn=parseInt(item.id.replace(/\D/g,""))||0;if(fn>maxId)maxId=fn;
      (item.firm.plans||[]).forEach(p=>{const pn=parseInt(p.id.replace(/\D/g,""))||0;if(pn>maxId)maxId=pn;});
    }
    nextId.current=Math.max(nextId.current,maxId+1);
    // loadedIdsRef に追加
    const cur=loadedIdsRef.current||new Set();
    for(const item of selected){cur.add(item.id);(item.firm.plans||[]).forEach(p=>cur.add(p.id));}
    loadedIdsRef.current=cur;
    showToast(`✓ ${selected.length}社をセッションに追加`);
    setFirmPicker(null);
  },[firmPicker,showToast]);

  // 全件読込 = 保存と同一の pfdb.json から読む（記憶ハンドル優先・初回は選択して記憶）
  const importAll=useCallback(async()=>{
    // file://環境はFile System Access API不可 → 即 <input> フォールバック
    if(location.protocol==="file:"){importJSON(applyData);return;}
    // 1) 記憶した保存先ファイルがあればそこから読込（read権限のみ）
    let fh=await loadSaveHandle();
    if(fh&&!(await ensureRW(fh,"read")))fh=null;
    if(fh){
      try{
        applyData(JSON.parse(await (await fh.getFile()).text()));
        showToast(`✓ 読込完了（${fh.name}）`);
        return;
      }catch(e){fh=null;} // 権限切れ等 → フォールバック
    }
    // 2) ファイル選択（File System Access API）
    if(window.showOpenFilePicker){
      try{
        const [picked]=await window.showOpenFilePicker({types:[{description:"JSON",accept:{"application/json":[".json"]}}]});
        await saveSaveHandle(picked);
        setSaveFileName(picked.name);
        applyData(JSON.parse(await (await picked.getFile()).text()));
        showToast(`✓ 読込完了（${picked.name}）`);
        return;
      }catch(e){
        if(e.name==="AbortError")return;
        if(e.name!=="SecurityError"&&e.name!=="NotAllowedError"){
          showToast("✗ 読込エラー: "+e.message);return;
        }
      }
    }
    // 3) <input type="file"> フォールバック
    importJSON(applyData);
  },[applyData,showToast]);

  // バックアップ用：現在の全状態を取得 / 復元
  const getCurrentData=useCallback(()=>({firms,sections,sessionName,tabDataMap,glossaryTerms}),[firms,sections,tabDataMap,glossaryTerms]);
  const restoreData=useCallback(d=>applyData(d),[applyData]);

  // ═══════════════════════════════════════════════════
  // 自動保存（ドラフト）＋ 起動時復元 ＋ 離脱警告
  // ═══════════════════════════════════════════════════
  // ① 起動時：前回ドラフトがあれば確認のうえ復元（確認方式）
  useEffect(()=>{
    if(draftRestoredRef.current)return;
    draftRestoredRef.current=true;
    try{
      const raw=localStorage.getItem(DRAFT_KEY);
      if(!raw)return;
      const obj=JSON.parse(raw);
      if(!obj||!obj.data)return;
      const m=Math.round((Date.now()-(obj.ts||0))/60000);
      const when=m<1?"1分未満前":m<60?`${m}分前`:`${Math.round(m/60)}時間前`;
      if(window.confirm(`前回の自動保存データ（${when}）を復元しますか？\n\nOK＝復元 ／ キャンセル＝初期状態で開始（ドラフトは保持されます）`)){
        applyData(obj.data);
      }
    }catch(e){}
  },[applyData]);

  // ② 編集監視：変更をデバウンス（約800ms）で localStorage ドラフトへ退避
  useEffect(()=>{
    const json=JSON.stringify({firms,sections,sessionName,tabDataMap,glossaryTerms});
    if(draftBaselineRef.current===null){draftBaselineRef.current=json;return;} // 初回はベースライン記録のみ
    if(json===draftBaselineRef.current)return; // 実変更なし
    dirtyRef.current=true;
    const t=setTimeout(()=>{
      try{
        localStorage.setItem(DRAFT_KEY,JSON.stringify({ts:Date.now(),data:JSON.parse(json)}));
        draftBaselineRef.current=json;
      }catch(e){/* 容量超過等はファイル保存で担保するため無視 */}
    },800);
    return ()=>clearTimeout(t);
  },[firms,sections,tabDataMap,glossaryTerms]);

  // ③ 離脱警告：ファイル未出力（全保存/Hugo）の変更があるとき
  useEffect(()=>{
    const h=e=>{if(dirtyRef.current){e.preventDefault();e.returnValue="";}};
    window.addEventListener("beforeunload",h);
    return ()=>window.removeEventListener("beforeunload",h);
  },[]);

  // マージ実行：自動バックアップ → 衝突選択に従って統合
  const applyMerge=useCallback((incoming, plan, choices)=>{
    // 1) 実行直前に自動バックアップ
    try{
      const cur={firms,tabDataMap,glossaryTerms};
      const list=loadBackups();
      let next=[makeBackupSnapshot("(マージ前 自動退避)",cur,true),...list];
      if(next.length>BACKUP_MAX)next=next.slice(0,BACKUP_MAX);
      saveBackups(next);
    }catch(e){/* バックアップ失敗してもマージは続行可。ただし通知 */ alert("自動バックアップに失敗しました（マージは続行します）: "+e.message);}

    const incomingTab=incoming.tabDataMap||{};
    // 採番カウンタは現在＋取り込み両方の最大値+1から
    let counter=Math.max(maxNumId(firms), maxNumId(incoming.firms||[]), nextId.current-1)+1;

    // 追加対象（autoAdd + 衝突でfile/both選択分）を集める
    const toAdd=[...plan.autoAdd];
    const namesToOverwrite=new Set(); // file選択 → 既存を消す
    plan.conflicts.forEach(c=>{
      const ch=choices[c.name]||"both";
      if(ch==="file"){ toAdd.push(c.incoming); namesToOverwrite.add(c.name); }
      else if(ch==="both"){ toAdd.push(c.incoming); }
      // keep → 何もしない（スキップ）
    });

    // 既存firms：file選択されたものは除去
    let baseFirms=firms.filter(f=>!namesToOverwrite.has(f.name));
    let baseTab={...tabDataMap};
    // 除去されたfirmのtabDataも掃除
    firms.filter(f=>namesToOverwrite.has(f.name)).forEach(f=>{
      delete baseTab[f.id];
      (f.plans||[]).forEach(p=>delete baseTab[p.id]);
    });

    // 取り込みfirmをID振り直しして追加。bothで同名衝突する場合は名前に (2) を付与
    const existingNames=new Set(baseFirms.map(f=>f.name));
    const addedFirms=[];
    toAdd.forEach(inf=>{
      const r=reidFirm(inf, incomingTab, counter);
      counter=r.nextCounter;
      let nf=r.firm;
      // 名前衝突（both）なら一意化
      if(existingNames.has(nf.name)){
        let n=2, cand;
        do{ cand=`${nf.name} (${n})`; n++; }while(existingNames.has(cand));
        // 名前変更をfirm名・firmNameスロットに反映
        nf={...nf,name:cand};
        const ft=r.tabEntries[nf.id];
        if(ft){ ft.slotData={...(ft.slotData||{}),firmName:[{text:cand}]}; }
      }
      existingNames.add(nf.name);
      addedFirms.push(nf);
      Object.assign(baseTab, r.tabEntries);
    });

    // glossary統合（新規keyのみ追加）
    const baseKeys=new Set((glossaryTerms||[]).map(t=>t.key).filter(Boolean));
    const gAdd=(incoming.glossaryTerms||[]).filter(t=>t.key&&!baseKeys.has(t.key));

    const finalFirms=[...baseFirms,...addedFirms];
    setFirms(finalFirms);
    setTabDataMap(baseTab);
    if(gAdd.length)setGlossaryTerms(p=>[...p,...gAdd]);
    nextId.current=counter;
    if(addedFirms[0])setActiveTabId(addedFirms[0].id);

    alert(`マージ完了\n追加Firm: ${addedFirms.length} 件\n用語追加: ${gAdd.length} 件`);
  },[firms,tabDataMap,glossaryTerms]);

  // Firm統合の実適用
  const openConsolidate=useCallback(firmId=>{ setConsolidateKeepId(firmId); },[]);
  const applyConsolidate=useCallback((keepId,absorbId,plan,resolve)=>{
    if(!plan)return;
    const keepFirm=firms.find(f=>f.id===keepId);
    const absorbFirm=firms.find(f=>f.id===absorbId);
    if(!keepFirm||!absorbFirm)return;

    // 自動バックアップ
    try{
      const cur={firms,tabDataMap,glossaryTerms};
      const list=loadBackups();
      let next=[makeBackupSnapshot("(統合前 自動退避)",cur,true),...list];
      if(next.length>BACKUP_MAX)next=next.slice(0,BACKUP_MAX);
      saveBackups(next);
    }catch(e){alert("自動バックアップに失敗（統合は続行します）: "+e.message);}

    const ckey=c=>`${c.scope}|${c.planName}|${c.slotKey}`;
    // conflict解決をslotKey→採用valのmapに（scope/plan別）
    const pickVal=(c)=>{ const r=resolve[ckey(c)]; return r==="absorb"?c.absorbVal:c.keepVal; };

    // archives結合（重複除去）
    const mergeArchives=(aArr,bArr)=>{
      const seen=new Set(); const out=[];
      [...(aArr||[]),...(bArr||[])].forEach(t=>{const k=String(t); if(!seen.has(k)){seen.add(k);out.push(t)}});
      return out;
    };
    // slotData合成（空補完＋競合は採用値）
    const buildMergedSlot=(keepSD,absorbSD,scope,planName)=>{
      const m={...(keepSD||{})};
      const allKeys=new Set([...Object.keys(keepSD||{}),...Object.keys(absorbSD||{})]);
      allKeys.forEach(k=>{
        const kt=slotTextOf(keepSD?.[k]), at=slotTextOf(absorbSD?.[k]);
        if(!kt&&at){ m[k]=absorbSD[k]; }
        else if(kt&&at&&kt!==at){
          const c=plan.conflicts.find(x=>x.scope===scope&&x.planName===planName&&x.slotKey===k);
          if(c)m[k]=pickVal(c);
        }
      });
      return m;
    };

    const newTab={...tabDataMap};

    // Firm本体
    const keepFirmTab=tabDataMap[keepFirm.id]||{archives:[],targetText:"",slotData:{},templateMode:"dbp01"};
    const absorbFirmTab=tabDataMap[absorbFirm.id]||{archives:[],slotData:{}};
    newTab[keepFirm.id]={
      ...keepFirmTab,
      archives:mergeArchives(keepFirmTab.archives,absorbFirmTab.archives),
      slotData:buildMergedSlot(keepFirmTab.slotData,absorbFirmTab.slotData,"firm",keepFirm.name),
    };

    // Plan処理
    let counter=Math.max(maxNumId(firms),nextId.current-1)+1;
    const keepPlans=[...(keepFirm.plans||[])];
    plan.planActions.forEach(a=>{
      if(a.type==="merge"){
        const kp=a.keepPlan, ap=a.absorbPlan;
        const kTab=tabDataMap[kp.id]||{archives:[],slotData:{}};
        const aTab=tabDataMap[ap.id]||{archives:[],slotData:{}};
        newTab[kp.id]={
          ...kTab,
          archives:mergeArchives(kTab.archives,aTab.archives),
          slotData:buildMergedSlot(kTab.slotData,aTab.slotData,"plan",ap.name),
        };
      }else{ // move: 吸収側Planを新IDでkeepFirmへ
        const ap=a.absorbPlan;
        const newPid="p"+String(counter++);
        const aTab=tabDataMap[ap.id]||{archives:[],targetText:"",slotData:{},templateMode:"dbp02"};
        newTab[newPid]=JSON.parse(JSON.stringify(aTab));
        // challengeNameをkeepFirm名に合わせて更新
        const planNm=ap.name;
        newTab[newPid].slotData={...(newTab[newPid].slotData||{}),challengeName:[{text:`${keepFirm.name} - ${planNm}`}]};
        keepPlans.push({id:newPid,name:ap.name});
      }
    });

    // 吸収側tabDataを掃除
    delete newTab[absorbFirm.id];
    (absorbFirm.plans||[]).forEach(p=>delete newTab[p.id]);

    // firms更新：keepFirmのplans差し替え、absorbFirm除去
    const newFirms=firms
      .filter(f=>f.id!==absorbFirm.id)
      .map(f=>f.id===keepFirm.id?{...f,plans:keepPlans}:f);

    setFirms(newFirms);
    setTabDataMap(newTab);
    nextId.current=counter;
    setActiveTabId(keepFirm.id);

    const moved=plan.planActions.filter(a=>a.type==="move").length;
    const merged=plan.planActions.filter(a=>a.type==="merge").length;
    alert(`統合完了\n移動Plan: ${moved} 件 ／ 合成Plan: ${merged} 件\n「${absorbFirm.name}」は削除しました`);
  },[firms,tabDataMap,glossaryTerms]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      <CouponConfigModal show={couponModal.show} config={couponModal.config} slug={couponModal.slug} onClose={()=>setCouponModal(p=>({...p,show:false}))} onSaveToDir={saveCouponConfig} hugoDir={hugoDir} />
      {toastMsg&&<div style={{position:"fixed",bottom:28,right:28,zIndex:99999,background:toastMsg.startsWith("✓")?C.green:C.red,color:C.bg,padding:"8px 16px",borderRadius:6,fontSize:"0.8rem",fontWeight:700,boxShadow:"0 4px 12px rgba(0,0,0,0.4)"}}>{toastMsg}</div>}
      <BackupModal show={showBackup} onClose={()=>setShowBackup(false)} getCurrentData={getCurrentData} onRestore={restoreData} />
      <MergeModal show={showMerge} onClose={()=>setShowMerge(false)} getCurrentData={getCurrentData} onApplyMerge={applyMerge} />
      {firmPicker&&(
        <div style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setFirmPicker(null)}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:16,width:300,maxHeight:"70vh",display:"flex",flexDirection:"column",gap:8}}>
            <div style={{fontWeight:700,fontSize:"0.78rem",color:C.text}}>選択読込</div>
            <div style={{fontSize:"0.62rem",color:C.textDim}}>選んだFirmだけ現在のセッションにマージします</div>
            <div style={{display:"flex",gap:4}}>
              <Btn color={C.textDim} onClick={()=>setFirmPicker(p=>({...p,checked:Object.fromEntries(p.list.map(f=>[f.id,true]))}))} style={{fontSize:"0.58rem",padding:"1px 6px"}}>全選択</Btn>
              <Btn color={C.textDim} onClick={()=>setFirmPicker(p=>({...p,checked:Object.fromEntries(p.list.map(f=>[f.id,false]))}))} style={{fontSize:"0.58rem",padding:"1px 6px"}}>全解除</Btn>
            </div>
            <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:2,maxHeight:340}}>
              {firmPicker.list.map(item=>(
                <label key={item.id} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"3px 6px",borderRadius:3,background:firmPicker.checked[item.id]?`${C.accent}22`:"transparent"}}>
                  <input type="checkbox" checked={!!firmPicker.checked[item.id]} onChange={e=>setFirmPicker(p=>({...p,checked:{...p.checked,[item.id]:e.target.checked}}))} />
                  <span style={{fontSize:"0.7rem",color:C.text,flex:1}}>{item.name}</span>
                  <span style={{fontSize:"0.58rem",color:C.textDim}}>{item.planCount}P</span>
                </label>
              ))}
            </div>
            <div style={{display:"flex",gap:6,marginTop:2}}>
              <Btn color={C.accent} onClick={applyFirmPicker} style={{flex:1,fontSize:"0.7rem",padding:"5px"}}>追加</Btn>
              <Btn color={C.textDim} onClick={()=>setFirmPicker(null)} style={{padding:"5px 12px",fontSize:"0.7rem"}}>キャンセル</Btn>
            </div>
          </div>
        </div>
      )}
      {showPromptManager&&<PromptManagerPage onClose={()=>setShowPromptManager(false)} />}
      <ConsolidateModal show={!!consolidateKeepId} onClose={()=>setConsolidateKeepId(null)} firms={firms} tabDataMap={tabDataMap} initialKeepId={consolidateKeepId} onApply={applyConsolidate} />

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"6px 10px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontWeight:700,color:C.accent,fontFamily:font,fontSize:"0.85rem"}}>Page Maker</span>
        {/* スロット↔用語 トグルスイッチ */}
        <div onClick={()=>setRightMode(rightMode==="slots"?"glossary":"slots")}
          title={rightMode==="slots"?"用語辞典に切替":"スロットに切替"}
          style={{width:36,height:20,borderRadius:10,background:rightMode==="glossary"?C.purple:C.accent,
            position:"relative",cursor:"pointer",flexShrink:0,transition:"background 0.2s"}}>
          <div style={{position:"absolute",top:2,left:rightMode==="glossary"?18:2,
            width:16,height:16,borderRadius:8,background:"#fff",
            transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}} />
        </div>
        {/* パネル表示トグル（左/中央/右） */}
        {(()=>{
          const ON="#ffffff";
          const OFF="#4a5568";
          const PanelIcon=({target})=>{
            const cell={flex:1,margin:"0 1px",borderRadius:1};
            return(
              <div style={{display:"flex",alignItems:"stretch",width:18,height:14,padding:1,gap:0}}>
                <div style={{...cell,background:target==="left"?ON:OFF}}/>
                <div style={{...cell,background:target==="center"?ON:OFF}}/>
                <div style={{...cell,background:target==="right"?ON:OFF}}/>
              </div>
            );
          };
          const btn=(key,label)=>{
            const on=panelVis[key];
            return(
              <div key={key} onClick={()=>togglePanel(key)} title={`${label} (${on?"表示中":"非表示"})`}
                style={{cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",
                  width:24,height:20,borderRadius:3,
                  background:on?"#2a3a4d":"transparent",
                  border:`1px solid ${on?ON:OFF}`,
                  opacity:on?1:0.55,userSelect:"none"}}>
                <PanelIcon target={key}/>
              </div>
            );
          };
          return(
            <div style={{display:"flex",gap:3,alignItems:"center"}}>
              {btn("left","Firmリスト")}
              {btn("center","貼付・取込")}
              {btn("right","スロット")}
            </div>
          );
        })()}
        <div style={{flex:1}} />
        {/* プロンプト管理 */}
        <Btn color={C.purple} onClick={()=>setShowPromptManager(true)} style={{fontSize:"0.6rem"}} title="プロンプト管理ページ">📝 プロンプト</Btn>
        {/* 保存ドロップダウン */}
        <div style={{display:"flex",gap:1,alignItems:"center"}}>
          <div style={{position:"relative"}}>
            {showDataMenu==="save"&&<div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setShowDataMenu(false)}/>}
            <Btn color={C.green} onClick={()=>setShowDataMenu(v=>v==="save"?false:"save")} style={{fontSize:"0.6rem"}} title={saveFileName||"ファイル未選択"}>保存 ▾</Btn>
            {showDataMenu==="save"&&(
              <div style={{position:"absolute",top:"calc(100% + 3px)",right:0,zIndex:200,background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:4,display:"flex",flexDirection:"column",gap:2,minWidth:100,boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
                <Btn color={C.green} onClick={()=>{exportFirms([activeTabId]);setShowDataMenu(false)}} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}} title="アクティブなFirmだけpfdb.jsonへ差し込む（他社は一切変更しない）">この1社</Btn>
                <div style={{borderTop:`1px solid ${C.border}`,margin:"2px 0"}}/>
                <Btn color={C.green} onClick={()=>{exportAll();setShowDataMenu(false)}} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}} title="差分反映マージで pfdb.json へ保存（同一ファイル上書き・未読込ファームは温存）">全保存</Btn>
              </div>
            )}
          </div>
          {saveFileName&&<Btn color="#ef4444" onClick={clearSaveFile} style={{fontSize:"0.6rem",padding:"1px 5px"}} title={`固定解除: ${saveFileName}`}>×</Btn>}
        </div>
        {/* 読込ドロップダウン */}
        <div style={{position:"relative"}}>
          {showDataMenu==="load"&&<div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setShowDataMenu(false)}/>}
          <Btn color={C.blue} onClick={()=>setShowDataMenu(v=>v==="load"?false:"load")} style={{fontSize:"0.6rem"}}>読込 ▾</Btn>
          {showDataMenu==="load"&&(
            <div style={{position:"absolute",top:"calc(100% + 3px)",right:0,zIndex:200,background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:4,display:"flex",flexDirection:"column",gap:2,minWidth:100,boxShadow:"0 4px 12px rgba(0,0,0,0.5)"}}>
              <Btn color={C.blue} onClick={()=>{importAll();setShowDataMenu(false)}} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}}>全件</Btn>
              <Btn color={C.blue} onClick={()=>{openFirmPicker();setShowDataMenu(false)}} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}} title="pfdb.jsonからFirmを選んでセッションにマージ">選択読込</Btn>
              <div style={{borderTop:`1px solid ${C.border}`,margin:"2px 0"}}/>
              <Btn color={C.blue} onClick={()=>{setShowDataMenu(false);document.dispatchEvent(new CustomEvent("pfd-csv-open"))}} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}}>追加 CSV</Btn>
              <Btn color={C.blue} onClick={()=>{setShowMerge(true);setShowDataMenu(false)}} style={{fontSize:"0.62rem",width:"100%",justifyContent:"flex-start"}}>追加 JSON</Btn>
            </div>
          )}
        </div>
        {/* Hugo出力 */}
        <div style={{position:"relative",display:"flex",gap:1}}>
          <Btn color={C.yellow} onClick={async()=>{if(!hugoDir)await selectHugoDir();else exportHugo();}} style={{fontSize:"0.6rem",borderRadius:"4px 0 0 4px"}} title={hugoDirName||"フォルダ未選択"}>🚀 Hugo</Btn>
          <Btn color={C.yellow} onClick={selectHugoDir} style={{fontSize:"0.6rem",padding:"1px 5px",borderRadius:hugoDirName?"0":"0 4px 4px 0",borderLeft:`1px solid rgba(0,0,0,0.3)`}} title="出力フォルダを再選択">▾</Btn>
          {hugoDirName&&<Btn color="#ef4444" onClick={clearHugoDir} style={{fontSize:"0.6rem",padding:"1px 5px",borderRadius:"0 4px 4px 0",borderLeft:`1px solid rgba(0,0,0,0.3)`}} title={`固定解除: ${hugoDirName}`}>×</Btn>}
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* 縦タブ（Firmリスト） */}
        {panelVis.left&&<>
          <VerticalTabs firms={firms} activeId={activeTabId} onSelect={setActiveTabId}
            onAddFirm={addFirm} onAddPlan={addPlan} onDelete={deleteTab} onRename={renameTab}
            width={vtabW} onBulkImport={bulkImport} onReorder={reorderFirms} tabDataMap={tabDataMap} glossaryTerms={glossaryTerms} onMergeFirm={openConsolidate} onDeleteMany={deleteMany} onTogglePin={togglePin}
            sections={sections} onAddSection={addSection} onRenameSection={renameSection} onDeleteSection={deleteSection} onToggleCompleted={toggleCompleted} onMoveFirmToSection={moveFirmToSection} onReorderSection={reorderSections}
            sessionName={sessionName} onSessionNameChange={setSessionName} onSaveSelected={exportFirms} />
          <ResizeHandle dir="x" onMouseDown={vtabDrag} />
        </>}

        {/* 左カラム: 貼り付け + 取り込み対象 */}
        {panelVis.center&&<>
          <div style={{width:panelVis.right?leftW:"100%",flex:panelVis.right?"none":1,flexShrink:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <PastePanel externalRef={pasteAreaRef} archives={td.archives}
              onSendToTarget={handleSendToTarget} onTranslateToTarget={handleTranslateToTarget}
              onFormatToTarget={handleFormat}
              onArchive={handleArchive} onDeleteArchive={handleDeleteArchive}
              height={pasteH} onOpenChild={openPasteWindow} onOpenQuickRef={openQuickRef}
              onTextPasted={handlePasteExpand} />
            <ResizeHandle dir="y" onMouseDown={pasteDrag} />
            <TargetPanel text={targetDisplay} onAutoAssign={handleAutoAssign}
              autoAssigning={autoAssigning} onTableParse={handleTableParse} translating={translating}
              onClear={()=>{writeFacetText(facetRef.current,"");selectedTextRef.current=""}} onAdd={handleAdd}
              activeSlot={activeSlotId?currentSlots.find(s=>s.id===activeSlotId)?.label:null}
              onSelectText={t=>{selectedTextRef.current=t}}
              activeType={activeType} onImportPlanTables={importPlanTables}
              onSendToPaste={handleSendToPaste} />
          </div>
          {panelVis.right&&<ResizeHandle dir="x" onMouseDown={leftDrag} />}
        </>}

        {/* 右カラム */}
        {panelVis.right&&(rightMode==="slots"?(
          <SlotPanel templateMode={td.templateMode} setTemplateMode={m=>setTabField("templateMode",m)}
            slotData={td.slotData} setSlotData={v=>setTabField("slotData",v)} currentSlots={currentSlots}
            availableTemplates={availableTemplates}
            showPriceMatrix={showPriceMatrix} setShowPriceMatrix={setShowPriceMatrix}
            onAIGenKoryaku={td.templateMode==="koryaku"?handleAIGenKoryaku:null} aiGenKoryaku={aiGenKoryaku}
            onAIGenTable={handleAIGenTable} aiGenTable={aiGenTable}
            locks={slotLocks} setLocks={setSlotLocks}
            activeSlotId={activeSlotId} setActiveSlotId={(slotId)=>{
              setActiveSlotId(slotId);
              // 取込エリアでテキスト選択済みなら、スロットclick だけで自動格納（⇨ ボタン省略）
              const live=window.getSelection()?.toString()?.trim();
              const sel=live||(selectedTextRef.current||"").trim();
              if(sel&&slotId){
                setTabField("slotData",prev=>{
                  const locked=isSlotLocked(slotLocks,prev,slotId);
                  if(locked)return prev;
                  return{...prev,[slotId]:[...(prev[slotId]||[]).filter(f=>!f.merged),{text:sel}]};
                });
                selectedTextRef.current="";
                if(slotId==="planList"&&activeType==="firm"){
                  setTimeout(()=>syncPlansFromList(sel),100);
                }
              }
            }}
            onSyncPlans={syncPlansFromList}
            planNames={(firms.find(f=>f.id===activeTabId)||{plans:[]}).plans.map(p=>p.name)}
            parentFirmSlotData={(()=>{const pf=firms.find(f=>(f.plans||[]).some(p=>p.id===activeTabId));return pf?(tabDataMap[pf.id]?.slotData||{}):null;})()}
            parentPlanNames={(()=>{const pf=firms.find(f=>(f.plans||[]).some(p=>p.id===activeTabId));return pf?pf.plans.map(p=>p.name):[];})()}
            activePlanName={(()=>{const pf=firms.find(f=>(f.plans||[]).some(p=>p.id===activeTabId));const pl=pf?.plans.find(p=>p.id===activeTabId);return pl?.name||"";})()}
            activeType={activeType}
            parentFirmId={(()=>{const pf=firms.find(f=>(f.plans||[]).some(p=>p.id===activeTabId));return pf?.id||null;})()}
            firstPlanId={(firms.find(f=>f.id===activeTabId)?.plans||[])[0]?.id||null}
            activePlanId={activeType==="plan"?activeTabId:null}
            copyTargets={(()=>{const pf=firms.find(f=>(f.plans||[]).some(p=>p.id===activeTabId));return pf?(pf.plans||[]).filter(p=>p.id!==activeTabId).map(p=>({id:p.id,name:p.name})):[];})()}
            allPlans={(()=>{const pf=firms.find(f=>(f.plans||[]).some(p=>p.id===activeTabId));return pf?(pf.plans||[]).map(p=>({id:p.id,name:p.name,slotData:(tabDataMap[p.id]?.slotData||{})})):[];})()}
            onUpdatePlanSlot={updatePlanSlot}
            onCopyRuleSlot={copyRuleSlotToPlans}
            onNavigateTab={navigateTab} />
        ):(
          <GlossaryPanel terms={glossaryTerms} setTerms={setGlossaryTerms} generating={glossaryGenerating} />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
