<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prop Firm Database</title>
<!--
  ============================================================================
  Firm Dashboard  —  Prop Firm 制作の管制塔（1社編集は page-maker 側）
  ----------------------------------------------------------------------------
  設計方針（重要）:
   1. config 駆動 … STATUS_DEFS / LAMP_DEFS / LINK_DEFS / COLUMNS / THRESHOLDS /
      FEATURE_INDEX を編集するだけで挙動が変わる。本体ロジック(render系)は無改修。
   2. 機能ID(FD-xx) … 各機能に固定ID。コメント・会話で「FD-06が…」と一意に指せる。
      画面右上「📖 機能目次」は FEATURE_INDEX から自動生成（手書き二重管理しない）。
   3. データ源 … localhost:8765 の agent.py 経由。
      GET /api/firms  … 一覧＋生計測値
      GET/POST /api/progress … 進捗の読み書き(data/progress.json)
  ============================================================================
-->
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --border:#2a2f3a;
    --text:#e6e8ec; --dim:#8b93a3;
    --gray:#6b7280; --orange:#f0915a; --yellow:#f4c152; --blue:#5aa9ff;
    --green:#3ecf8e; --purple:#a78bfa; --purpleD:#7c5cff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Segoe UI",-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    font-size:14px;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 24px 60px}
  a{color:inherit}

  header{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  header h1{font-size:1.25rem;margin:0;font-weight:700;letter-spacing:.02em}
  .spacer{flex:1}
  .btn-ghost{background:var(--panel2);border:1px solid var(--border);color:var(--dim);
    border-radius:8px;padding:7px 12px;font-size:.76rem;cursor:pointer;font-weight:600}
  .btn-ghost:hover{color:var(--purple);border-color:var(--purple)}
  .sub{color:var(--dim);font-size:.78rem;margin:0 0 18px}

  .summary{display:grid;gap:10px;margin-bottom:18px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;text-align:center;cursor:pointer}
  .card:hover{border-color:var(--purpleD)}
  .card.active{outline:2px solid var(--purpleD)}
  .card .n{font-size:1.5rem;font-weight:700}
  .card .l{font-size:.66rem;color:var(--dim);margin-top:2px}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .toolbar input[type=text]{flex:1;min-width:200px;background:var(--panel2);
    border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.85rem}
  .toolbar input::placeholder{color:var(--dim)}

  .tbl{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .row{display:grid;gap:12px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
  .row.head{background:var(--panel2);color:var(--dim);font-size:.66rem;
    letter-spacing:.05em;text-transform:uppercase;font-weight:700}
  .row:last-child{border-bottom:none}
  .row:not(.head):hover{background:var(--panel2)}
  .fname{font-weight:600}
  .fslug{color:var(--dim);font-size:.7rem;font-family:Consolas,monospace}
  .center{text-align:center}
  .dim{color:var(--dim)}

  .lamps{display:flex;gap:6px}
  .lamp{display:flex;flex-direction:column;align-items:center;gap:3px}
  .dot{width:13px;height:13px;border-radius:50%;background:#262b36;border:1px solid #333a47;transition:.2s}
  .dot.on{border-color:transparent}
  .lamp .t{font-size:.56rem;color:var(--dim)}

  select.status{appearance:none;border:1px solid var(--border);border-radius:20px;
    padding:4px 26px 4px 12px;font-size:.72rem;font-weight:700;cursor:pointer;
    background-color:var(--panel2);
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%238b93a3' stroke-width='1.5' fill='none'/></svg>");
    background-repeat:no-repeat;background-position:right 9px center}

  .links{display:flex;gap:6px;flex-wrap:wrap}
  .links a{font-size:.66rem;color:var(--dim);text-decoration:none;
    border:1px solid var(--border);border-radius:6px;padding:2px 8px}
  .links a:hover{color:var(--purple);border-color:var(--purple)}
  .links a.off{opacity:.32;pointer-events:none}
  .site{text-decoration:none;font-size:.95rem}
  .site.off{opacity:.28;cursor:default}

  .edit{background:var(--purpleD);color:#fff;border:none;border-radius:8px;
    padding:6px 0;font-size:.72rem;font-weight:700;cursor:pointer;width:100%}
  .edit:hover{background:var(--purple)}

  .legend{display:flex;gap:18px;margin-top:10px;font-size:.72rem;color:var(--dim);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend .d{width:11px;height:11px;border-radius:50%}

  .state{padding:40px;text-align:center;color:var(--dim);font-size:.85rem}
  .state.err{color:var(--orange)}

  /* 機能目次 モーダル（FD-09） */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
    align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;
    max-width:760px;width:100%;padding:22px 26px}
  .modal h2{margin:0 0 4px;font-size:1.05rem}
  .modal .mh{color:var(--dim);font-size:.76rem;margin-bottom:16px}
  .modal .close{float:right;cursor:pointer;color:var(--dim);font-size:1.2rem;line-height:1}
  .toc-group{margin-bottom:16px}
  .toc-group h3{font-size:.78rem;color:var(--purple);margin:0 0 6px;
    border-bottom:1px solid var(--border);padding-bottom:4px;letter-spacing:.03em}
  .toc-item{display:grid;grid-template-columns:64px 1fr 34px;gap:10px;padding:4px 0;font-size:.8rem;align-items:start}
  .toc-item .id{font-family:Consolas,monospace;color:var(--blue);font-weight:700}
  .toc-item .nm b{font-weight:600}
  .toc-item .nm span{color:var(--dim);font-size:.74rem}
  .toc-copy{background:var(--panel2);border:1px solid var(--border);color:var(--dim);
    border-radius:6px;padding:2px 0;font-size:.72rem;cursor:pointer;width:30px;justify-self:end}
  .toc-copy:hover{color:var(--purple);border-color:var(--purple)}
  .toc-copy.done{color:var(--green);border-color:var(--green)}
  .toc-tools{display:flex;gap:8px;margin-bottom:14px}
  .toc-tools button{background:var(--panel2);border:1px solid var(--border);color:var(--dim);
    border-radius:7px;padding:5px 11px;font-size:.74rem;cursor:pointer;font-weight:600}
  .toc-tools button:hover{color:var(--purple);border-color:var(--purple)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📊 Prop Firm Database</h1>
    <span style="color:var(--dim);font-size:.7rem;font-family:Consolas,monospace">PFDB</span>
    <div class="spacer"></div>
    <button class="btn-ghost" id="btnReload">↻ 再読込</button>
    <button class="btn-ghost" id="btnToc">📖 機能目次</button>
  </header>
  <p class="sub">data/firms/*.json を俯瞰 ／ 進捗 ／ Firm・Plan・攻略の3ランプ ／ 1社編集への入口</p>

  <div class="summary" id="summary"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="🔍 ファーム名・slug で検索…">
  </div>

  <div class="tbl" id="tbl">
    <div class="state" id="state">読み込み中…</div>
  </div>

  <div class="legend" id="legend"></div>
</div>

<!-- 機能目次（FEATURE_INDEX から自動生成） -->
<div class="overlay" id="overlay">
  <div class="modal">
    <span class="close" id="tocClose">✕</span>
    <h2>📖 機能目次</h2>
    <div class="mh">各機能には固定ID(FD-xx)。コメントや相談で「FD-06が…」と一意に指せます。この目次は設定から自動生成。</div>
    <div id="tocBody"></div>
  </div>
</div>

<script>
"use strict";
/* ===========================================================================
   設定ブロック（ここだけ触れば拡張できる）
   =========================================================================== */

// 色トークン（CSS変数名と一致）
const COLORS = {gray:"--gray",orange:"--orange",yellow:"--yellow",blue:"--blue",
  green:"--green",purple:"--purple"};
const cssVar = (c)=>`var(${COLORS[c]||"--dim"})`;

// FD: ステータス（ライフサイクル）。増減はこの配列に1行。先頭=既定(未着手)。
const STATUS_DEFS = [
  {id:"todo",   label:"未着手",       color:"gray"},
  {id:"gather", label:"データ収集",   color:"orange"},
  {id:"input",  label:"入力中",       color:"yellow"},
  {id:"review", label:"レビュー待ち", color:"blue"},
  {id:"done",   label:"公開済み",     color:"green"},
];
const DEFAULT_STATUS = STATUS_DEFS[0].id;
const statusById = (id)=>STATUS_DEFS.find(s=>s.id===id) || STATUS_DEFS[0];

// FD-06: 点灯しきい値。判定はサーバーの生計測値をここで解釈（しきい値集約）。
const THRESHOLDS = {firmFilled:5, planCount:1, stratBytes:500};

// FD-06: ランプ定義。lit(f)=点灯条件。増設(ウィジェット/クーポン等)はここに1行。
const LAMP_DEFS = [
  {id:"firm",  label:"Firm", color:"purple", lit:f=>f.firmFilled >= THRESHOLDS.firmFilled,
    desc:"data/firms/{slug}.json が十分入力済み"},
  {id:"plan",  label:"Plan", color:"blue",   lit:f=>f.planCount  >= THRESHOLDS.planCount,
    desc:"data/plans/ にプラン投入済み"},
  {id:"strat", label:"攻略", color:"green",  lit:f=>f.stratBytes >= THRESHOLDS.stratBytes,
    desc:"content/firms/{slug}/_index.md に攻略記事あり"},
];

// FD-07: ファイルリンク定義。href(slug)=リンク先 / on(f)=有効判定。
const LINK_DEFS = [
  {id:"json",    label:"json",    href:s=>`/data/firms/${s}.json`,        on:()=>true},
  {id:"content", label:"content", href:s=>`/content/firms/${s}/`,          on:f=>f.stratBytes>0},
  {id:"plans",   label:"plans",   href:s=>`/data/plans/`,                  on:f=>f.planCount>0},
];

// FD-08: 編集起動。将来 page-maker改(1社専用機) に差し替える時はここ1行。
const EDIT_URL = (slug)=>`/01_tools/core/page-maker-v12.html?firm=${encodeURIComponent(slug)}`;

// FD-04: テーブル列。render(f,ctx)で各セル生成。列の増減・並べ替えはこの配列。
const COLUMNS = [
  {key:"idx",   label:"#",            width:"26px",  align:"center", render:(f,c)=>c.i+1},
  {key:"name",  label:"ファーム",      width:"1fr",
    render:f=>`<div class="fname">${esc(f.name)}</div><div class="fslug">${esc(f.slug)}</div>`},
  {key:"plans", label:"プラン",        width:"60px",  align:"center",
    render:f=>`<span class="dim">${f.planCount}</span>`},
  {key:"site",  label:"公式",          width:"44px",  align:"center",  // FD-10
    render:f=> f.url
      ? `<a class="site" href="${esc(f.url)}" target="_blank" rel="noopener" title="${esc(f.url)}">🌐</a>`
      : `<span class="site off" title="公式URL未登録">🌐</span>`},
  {key:"lamps", label:"進捗（F/P/攻）", width:"118px", render:f=>renderLamps(f)},
  {key:"status",label:"ステータス",     width:"140px", render:f=>renderStatus(f)},
  {key:"links", label:"ファイル",       width:"152px", render:f=>renderLinks(f)},
  {key:"edit",  label:"操作",          width:"84px",  align:"center",
    render:f=>`<button class="edit" data-edit="${esc(f.slug)}">✏️ 編集</button>`},
];

// FD-09: 目次の📋コピー文言。チャット/コメントに貼って機能を一意に指すための形式。
// 文言を変えたい時はこの1関数だけ編集。
const TOOL_TAG = "firm-dashboard.html";
const TOC_COPY_TEMPLATE = (it)=>`[${it.id}] ${it.name}（${TOOL_TAG}）— ${it.desc}`;

// FD-09: 機能目次（共通言語）。カテゴリ→機能の構造。新機能はここに追記。
const FEATURE_INDEX = [
  {cat:"全体", items:[
    {id:"FD-01", name:"サマリーカード", desc:"全件＋ステータス別件数。クリックで絞り込み"},
    {id:"FD-02", name:"検索",          desc:"ファーム名・slug で絞り込み"},
    {id:"FD-09", name:"機能目次",      desc:"この一覧（FEATURE_INDEXから自動生成）"},
  ]},
  {cat:"一覧", items:[
    {id:"FD-04", name:"ファーム一覧",   desc:"data/firms/*.json 由来の行を表示"},
    {id:"FD-06", name:"3ランプ進捗",    desc:"Firm/Plan/攻略 を計測値から自動点灯"},
    {id:"FD-07", name:"ファイルリンク", desc:"json / content / plans への入口"},
    {id:"FD-10", name:"公式サイト",     desc:"各社の公式URLをワンクリックで開く"},
  ]},
  {cat:"操作", items:[
    {id:"FD-05", name:"ステータス変更", desc:"5段階。data/progress.json へ保存"},
    {id:"FD-08", name:"編集起動",       desc:"page-maker改 を1社ロードで起動"},
  ]},
];

const API = "";  // 同一オリジン(localhost:8765)前提。別ホスト化する時はここ。

/* ===========================================================================
   本体ロジック（基本ここは触らず、上の設定を編集する）
   =========================================================================== */
const $  = (s)=>document.querySelector(s);
const esc = (s)=>String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

let FIRMS = [];        // /api/firms の結果
let PROGRESS = {};     // slug -> {status,note,updated}
let activeFilter = null;
let searchText = "";

const gridCols = ()=>COLUMNS.map(c=>c.width).join(" ");
const statusOf = (slug)=> (PROGRESS[slug] && PROGRESS[slug].status) || DEFAULT_STATUS;

async function load(){
  setState("読み込み中…");
  try{
    const [fr, pr] = await Promise.all([
      fetch(API+"/api/firms").then(r=>r.json()),
      fetch(API+"/api/progress").then(r=>r.json()),
    ]);
    FIRMS = fr.firms || [];
    PROGRESS = (pr && pr.firms) || {};
    renderAll();
  }catch(e){
    setState("⚠ データ取得に失敗。ランチャー(agent.py)が起動した状態で "+
      "http://localhost:8765/01_tools/core/firm-dashboard.html から開いてください。\n("+e.message+")", true);
  }
}

function setState(msg, isErr){
  $("#tbl").innerHTML = `<div class="state${isErr?" err":""}">${esc(msg)}</div>`;
}

function visibleFirms(){
  return FIRMS.filter(f=>{
    if(activeFilter && statusOf(f.slug)!==activeFilter) return false;
    if(searchText){
      const q=searchText.toLowerCase();
      if(!f.name.toLowerCase().includes(q) && !f.slug.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function renderAll(){ renderSummary(); renderTable(); renderLegend(); }

// FD-01
function renderSummary(){
  const counts = {};
  STATUS_DEFS.forEach(s=>counts[s.id]=0);
  FIRMS.forEach(f=>{ counts[statusOf(f.slug)]=(counts[statusOf(f.slug)]||0)+1; });
  const cards = [
    `<div class="card ${activeFilter===null?"active":""}" data-filter="" style="grid-column:auto">
       <div class="n">${FIRMS.length}</div><div class="l">全ファーム</div></div>`,
    ...STATUS_DEFS.map(s=>`
      <div class="card ${activeFilter===s.id?"active":""}" data-filter="${s.id}">
        <div class="n" style="color:${cssVar(s.color)}">${counts[s.id]||0}</div>
        <div class="l">${esc(s.label)}</div></div>`)
  ].join("");
  const el=$("#summary");
  el.style.gridTemplateColumns=`repeat(${STATUS_DEFS.length+1},1fr)`;
  el.innerHTML=cards;
  el.querySelectorAll(".card").forEach(c=>c.onclick=()=>{
    const f=c.getAttribute("data-filter");
    activeFilter = f==="" ? null : f;
    renderAll();
  });
}

// FD-04
function renderTable(){
  const list=visibleFirms();
  const head=`<div class="row head" style="grid-template-columns:${gridCols()}">`+
    COLUMNS.map(c=>`<div class="${c.align==='center'?'center':''}">${esc(c.label)}</div>`).join("")+`</div>`;
  if(!list.length){ $("#tbl").innerHTML=head+`<div class="state">該当なし</div>`; return; }
  const rows=list.map((f,i)=>{
    const ctx={i};
    return `<div class="row" style="grid-template-columns:${gridCols()}">`+
      COLUMNS.map(c=>`<div class="${c.align==='center'?'center':''}">${c.render(f,ctx)}</div>`).join("")+
    `</div>`;
  }).join("");
  $("#tbl").innerHTML=head+rows;
  bindRowEvents();
}

// FD-06
function renderLamps(f){
  return `<div class="lamps">`+LAMP_DEFS.map(L=>{
    const on=L.lit(f);
    const style=on?`background:${cssVar(L.color)};box-shadow:0 0 7px ${cssVar(L.color)}`:"";
    return `<div class="lamp" title="${esc(L.label)}: ${esc(L.desc)}（${on?'OK':'未'}）">
      <div class="dot ${on?'on':''}" style="${style}"></div><div class="t">${esc(L.label)}</div></div>`;
  }).join("")+`</div>`;
}

// FD-05
function renderStatus(f){
  const cur=statusOf(f.slug), s=statusById(cur);
  const opts=STATUS_DEFS.map(o=>`<option value="${o.id}" ${o.id===cur?"selected":""}>${esc(o.label)}</option>`).join("");
  return `<select class="status" data-slug="${esc(f.slug)}"
    style="color:${cssVar(s.color)};border-color:${cssVar(s.color)}">${opts}</select>`;
}

// FD-07
function renderLinks(f){
  return `<div class="links">`+LINK_DEFS.map(L=>{
    const on=L.on(f);
    return `<a class="${on?'':'off'}" href="${esc(L.href(f.slug))}" target="_blank" rel="noopener">${esc(L.label)}</a>`;
  }).join("")+`</div>`;
}

function bindRowEvents(){
  $("#tbl").querySelectorAll("select.status").forEach(sel=>{
    sel.onchange=()=>saveStatus(sel.getAttribute("data-slug"), sel.value);
  });
  $("#tbl").querySelectorAll("button[data-edit]").forEach(b=>{
    b.onclick=()=>openEditor(b.getAttribute("data-edit"));
  });
}

// FD-05 保存
async function saveStatus(slug, status){
  PROGRESS[slug]={...(PROGRESS[slug]||{}), status};  // 楽観更新
  renderSummary();
  const sel=$("#tbl").querySelector(`select.status[data-slug="${CSS.escape(slug)}"]`);
  if(sel){ const c=cssVar(statusById(status).color); sel.style.color=c; sel.style.borderColor=c; }
  try{
    const r=await fetch(API+"/api/progress",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({slug,status})}).then(x=>x.json());
    if(r&&r.entry) PROGRESS[slug]=r.entry;
  }catch(e){ alert("進捗の保存に失敗: "+e.message); }
}

// FD-08
function openEditor(slug){ window.open(EDIT_URL(slug), "_blank", "noopener"); }

// 凡例
function renderLegend(){
  $("#legend").innerHTML=LAMP_DEFS.map(L=>
    `<span><span class="d" style="background:${cssVar(L.color)}"></span>${esc(L.label)} = ${esc(L.desc)}</span>`
  ).join("");
}

// FD-09 機能目次（自動生成）＋ 機能ごとの📋コピー
function renderToc(){
  const tools=`<div class="toc-tools">
    <button id="tocCopyAll">📋 全機能をコピー</button></div>`;
  const body=FEATURE_INDEX.map(g=>`
    <div class="toc-group">
      <h3>${esc(g.cat)}</h3>
      ${g.items.map(it=>`<div class="toc-item">
        <div class="id">${esc(it.id)}</div>
        <div class="nm"><b>${esc(it.name)}</b><br><span>${esc(it.desc)}</span></div>
        <button class="toc-copy" data-copy="${esc(it.id)}" title="この機能の参照をコピー（チャットに貼れます）">📋</button>
      </div>`).join("")}
    </div>`).join("");
  $("#tocBody").innerHTML=tools+body;
  // 機能ごと
  $("#tocBody").querySelectorAll(".toc-copy").forEach(btn=>{
    btn.onclick=()=>{
      const it=findFeature(btn.getAttribute("data-copy"));
      if(it) copyText(TOC_COPY_TEMPLATE(it), btn);
    };
  });
  // 全部
  $("#tocCopyAll").onclick=(e)=>{
    const all=FEATURE_INDEX.flatMap(g=>g.items.map(TOC_COPY_TEMPLATE)).join("\n");
    copyText(all, e.target);
  };
}

function findFeature(id){
  for(const g of FEATURE_INDEX){ const it=g.items.find(x=>x.id===id); if(it) return it; }
  return null;
}

async function copyText(text, btn){
  try{ await navigator.clipboard.writeText(text); }
  catch(e){ // 古い環境向けフォールバック
    const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta);
    ta.select(); try{document.execCommand("copy");}catch(_){} ta.remove();
  }
  if(btn){ const o=btn.textContent; btn.textContent="✓"; btn.classList.add("done");
    setTimeout(()=>{btn.textContent=o; btn.classList.remove("done");},900); }
}

// イベント
$("#search").oninput=(e)=>{ searchText=e.target.value.trim(); renderTable(); };
$("#btnReload").onclick=load;
$("#btnToc").onclick=()=>{ renderToc(); $("#overlay").classList.add("show"); };
$("#tocClose").onclick=()=>$("#overlay").classList.remove("show");
$("#overlay").onclick=(e)=>{ if(e.target.id==="overlay") $("#overlay").classList.remove("show"); };

load();
</script>
</body>
