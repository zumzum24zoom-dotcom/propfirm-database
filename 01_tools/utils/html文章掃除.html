<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PFM AI-Ready Cleaner</title>
    <style>
        body { background: #0a0e17; color: #c8d6e5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid #00d4aa; padding-bottom: 10px; }
        h2 { color: #00d4aa; margin: 0; }
        .badge { background: #3b82f6; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        
        textarea { 
            width: 100%; height: 250px; background: #111827; color: #e2e8f0; 
            border: 1px solid #1e2d3d; border-radius: 8px; padding: 15px; box-sizing: border-box;
            font-family: 'Consolas', monospace; font-size: 0.9rem; transition: border 0.3s;
        }
        textarea:focus { border-color: #00d4aa; outline: none; }

        .controls { margin: 20px 0; display: flex; gap: 12px; align-items: center; }
        button { 
            background: #00d4aa; color: #0a0e17; border: none; padding: 12px 24px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: transform 0.1s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .btn-copy { background: #3b82f6; color: white; }

        .stats-bar { background: #1a2332; padding: 10px 15px; border-radius: 6px; font-size: 0.85rem; display: flex; gap: 20px; }
        .stat-item { color: #94a3b8; }
        .stat-value { color: #00d4aa; font-weight: bold; }

        h3 { color: #94a3b8; font-size: 1rem; margin-top: 25px; }
        .output-area { 
            background: #0d1117; padding: 20px; border-radius: 8px; 
            white-space: pre-wrap; border: 1px solid #2a3a4d; font-size: 0.9rem;
            color: #e2e8f0; max-height: 500px; overflow-y: auto;
        }
        .highlight { color: #f0b90b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>PFM AI-Ready Cleaner</h2>
            <span class="badge">WebSync metadata 除去対応版</span>
        </div>

        <textarea id="input" placeholder="PFMからコピーした生のテキストを貼り付けてください..."></textarea>
        
        <div class="controls">
            <button onclick="processText()">✨ 爆速クレンジング</button>
            <button class="btn-copy" onclick="copyResult()">📋 AI用にコピー</button>
            <div id="stats" class="stats-bar" style="display: none;">
                <div class="stat-item">元サイズ: <span id="before" class="stat-value">-</span></div>
                <div class="stat-item">洗浄後: <span id="after" class="stat-value">-</span></div>
                <div class="stat-item">削減率: <span id="percent" class="stat-value">-</span></div>
            </div>
        </div>

        <h3>プレビュー（洗浄済み・構造化テキスト）</h3>
        <div id="output" class="output-area">ここに結果が表示されます</div>
    </div>

    <script>
        function processText() {
            const input = document.getElementById('input').value;
            if (!input) return;

            let text = input;

            // 1. 指定された不要文字列の削除
            const blacklist = [
                /WebSync metadata/gi, // ← 追加
                /Show More/gi,
                /Show Less/gi,
                /Copy Code/gi,
                /Apply Now/gi,
                /Visit Site/gi,
                /Read Review/gi,
                /Trusted by Traders/gi,
                /Coupon Code/gi,
                /Click to Copy/gi,
                /Share/gi,
                /Compare/gi,
                /★+/g,               // 星マーク
                /\d\.?\d? out of 5 stars/gi, // 評価テキスト
                /No code needed/gi
            ];
            blacklist.forEach(regex => text = text.replace(regex, ''));

            // 2. 行単位の処理
            const lines = text.split('\n');
            const processedLines = [];
            const keywords = ["Firm Rules", "Payout Policy", "Consistency Rules", "Drawdown", "Objectives", "Trading Rules", "Instruments", "Leverage"];

            lines.forEach(rawLine => {
                const line = rawLine.trim();

                // 無駄な行のスキップ（URL、空行連続、メタデータ消し跡）
                if (line === "") {
                    if (processedLines.length > 0 && processedLines[processedLines.length-1] !== "") {
                        processedLines.push(""); 
                    }
                    return;
                }
                if (/^https?:\/\/.*$/i.test(line)) return;
                if (line.length < 2 && !/\d/.test(line)) return; // 1文字だけのゴミ

                // 重複排除（同じ内容が連続したら消す）
                if (line === processedLines[processedLines.length-1]) return;

                // 3. AI用構造化：重要見出しを強調
                const isHeader = keywords.some(k => line.toLowerCase().includes(k.toLowerCase()) && line.length < 30);
                if (isHeader) {
                    processedLines.push(`\n[SECTION: ${line.toUpperCase()}]`);
                } else if (line.startsWith('*')) {
                    processedLines.push(line); // 箇条書きは維持
                } else {
                    processedLines.push(line);
                }
            });

            const result = processedLines.join('\n').trim();
            document.getElementById('output').textContent = result;
            
            // 統計表示
            document.getElementById('stats').style.display = 'flex';
            document.getElementById('before').textContent = input.length;
            document.getElementById('after').textContent = result.length;
            const diff = input.length - result.length;
            document.getElementById('percent').textContent = Math.round((diff / input.length) * 100) + '%';
        }

        function copyResult() {
            const output = document.getElementById('output').textContent;
            if (output === "ここに結果が表示されます") return;
            
            navigator.clipboard.writeText(output).then(() => {
                const btn = document.querySelector('.btn-copy');
                const originalText = btn.textContent;
                btn.textContent = "✅ コピー完了！";
                btn.style.background = "#22c55e";
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = "#3b82f6";
                }, 1500);
            });
        }
    </script>
</body>
</html>
