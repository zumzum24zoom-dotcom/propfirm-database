    <PvSection title="ルール早見表">
      <div style={{overflow:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",fontFamily:PV.font}}>
          <thead><tr>
            <th style={th}>項目</th><th style={th}>C</th><th style={th}>F</th><th style={th}>差分</th>
          </tr></thead>
          <tbody>
            {stepsVal&&(<tr><td style={{...td,color:PV.accent}}>Steps</td><td style={{...td,color:PV.yellow,fontWeight:700}}>{stepsVal}</td><td style={{...td,color:PV.textDim}}>—</td><td style={{...td,color:PV.textDim}}>—</td></tr>)}
            {rdSlots.map(s=>{
              const v=g(s.id);if(!v)return null;
              const p=parseRd(v);
              return <tr key={s.id}>
                <td style={{...td,color:PV.textMid,fontFamily:PV.fontJa}}>{s.label}</td>
                <td style={{...td,color:cellColor(p.c)}}>{p.c||"—"}</td>
                <td style={{...td,color:cellColor(p.f)}}>{p.f||"—"}</td>
                <td style={{...td,color:diffColor(p.diff),fontWeight:p.diff==="EASE"||p.diff==="TRAP"?700:400}}>{p.diff||"—"}</td>
              </tr>;
            })}
            {!rdSlots.some(s=>g(s.id))&&<tr><td colSpan={4} style={{...td,color:PV.textDim,textAlign:"center"}}>※ 早見表タブまたはPlanタブのrd_*を入力してください</td></tr>}
          </tbody>
        </table>
      </div>
    </PvSection>
    <PvSection title="ルール詳細">
      {rdSlots.map(s=>{
        const v=g(s.id);if(!v)return null;
        const p=parseRd(v);if(!p.note)return null;
        return <div key={s.id} style={{marginBottom:14,paddingBottom:10,borderBottom:`1px dashed ${PV.border}`}}>
          <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:5,flexWrap:"wrap"}}>
            <span style={{fontSize:"0.78rem",color:PV.accent,fontWeight:700,fontFamily:PV.fontJa}}>{s.label}</span>
            <span style={{fontSize:"0.62rem",color:PV.textDim,fontFamily:PV.font}}>
              C: <span style={{color:cellColor(p.c)}}>{p.c||"—"}</span>
              {" / "}F: <span style={{color:cellColor(p.f)}}>{p.f||"—"}</span>
              {p.diff&&p.diff!=="ー"&&<> {" / "}<span style={{color:diffColor(p.diff),fontWeight:700}}>{p.diff}</span></>}
            </span>
          </div>
          <div style={{fontSize:"0.72rem",color:PV.text,fontFamily:PV.fontJa,whiteSpace:"pre-wrap",lineHeight:1.7}}>{p.note}</div>
        </div>;
      })}
      {!rdSlots.some(s=>{const v=g(s.id);return v&&parseRd(v).note;})&&<p style={{color:PV.textDim,fontSize:"0.7rem"}}>※ 詳細未入力</p>}
    </PvSection>
  </div>;
}
function KoryakuPreview({slotData}){
  const g=id=>{const fr=slotData[id];if(!fr?.length)return"";const m=fr.find(f=>f.merged);return m?m.text:fr.map(f=>f.text).join("\n");};
  const k=[{id:"k_dd",label:"断面① Drawdown",color:PV.red},{id:"k_rules",label:"断面② 取引ルール",color:PV.blue},{id:"k_payout",label:"断面③ 出金までの流れ",color:PV.green}];
  return <div style={{padding:14,background:PV.bg,color:PV.text,fontFamily:PV.fontJa,minHeight:"100%"}}>
    <header style={{marginBottom:20,paddingBottom:12,borderBottom:`2px solid ${PV.purple}`}}>
      <h1 style={{fontSize:"1.3rem",color:PV.purple,fontFamily:PV.font,fontWeight:700,margin:0,letterSpacing:"0.02em"}}>攻略記事（3断面）</h1>
    </header>
    {k.map(({id,label,color})=>{
      const v=g(id);
      return <section key={id} style={{marginBottom:24}}>
        <h2 style={{fontSize:"0.9rem",color,fontFamily:PV.font,fontWeight:700,margin:"0 0 10px",letterSpacing:"0.05em",borderLeft:`4px solid ${color}`,paddingLeft:10}}>{label}</h2>
        <div style={{padding:"10px 14px",background:PV.surface,border:`1px solid ${PV.border}`,borderRadius:4,fontSize:"0.72rem",color:PV.text,fontFamily:PV.fontJa,whiteSpace:"pre-wrap",lineHeight:1.7}}>
          {v||<span style={{color:PV.textDim}}>※ 攻略タブの{label}を入力してください</span>}
        </div>
      </section>;
    })}
  </div>;
}

function SlotPanel({templateMode,setTemplateMode,slotData,setSlotData,currentSlots,availableTemplates,onAIGenKoryaku,aiGenKoryaku,onAIGenTable,aiGenTable,locks,setLocks,activeSlotId,setActiveSlotId,onSyncPlans,planNames,parentFirmSlotData,parentPlanNames,activePlanName,activeType,parentFirmId,firstPlanId,onNavigateTab}) {
  const [mergingSlot,setMergingSlot]=useState(null);
  const [editModal,setEditModal]=useState(null);
  const [showRuleTable,setShowRuleTable]=useState(false);
  const [showPriceMatrix,setShowPriceMatrix]=useState(false);
  const [showPreview,setShowPreview]=useState(false);

  const sections=useMemo(()=>{
    const m={};currentSlots.forEach(s=>{if(!m[s.section])m[s.section]=[];m[s.section].push(s)});return Object.entries(m);
  },[currentSlots]);

  const isLocked=(id)=>isSlotLocked(locks,slotData,id);
  const toggleLock=(id)=>setLocks(p=>({...p,[id]:!isSlotLocked(p,slotData,id)})); // 実効ロック状態を反転（自動ロックも解除可）

  const handleDelete=useCallback((slotId,idx)=>{
    if(isLocked(slotId))return;
    setSlotData(prev=>{const frags=prev[slotId]||[];return{...prev,[slotId]:frags.filter((_,i)=>i!==idx)}});
  },[setSlotData,locks]);

  const handleEditSave=(newText)=>{
    if(!editModal)return;
    const{slotId,idx}=editModal;
    if(!newText.trim()){
      // 空保存→削除
      setSlotData(prev=>{
        const frags=[...(prev[slotId]||[])];
        if(idx==="merged")return{...prev,[slotId]:frags.filter(f=>!f.merged)};
        return{...prev,[slotId]:frags.filter((_,i)=>i!==idx)};
      });
      return;
    }
    setSlotData(prev=>{
      const frags=[...(prev[slotId]||[])];
      if(idx==="merged"){const mi=frags.findIndex(f=>f.merged);if(mi>=0)frags[mi]={...frags[mi],text:newText}}
      else if(frags[idx])frags[idx]={...frags[idx],text:newText};
      return{...prev,[slotId]:frags};
    });
    // planList保存時にPlanタブ自動生成
    if(slotId==="planList"&&onSyncPlans)onSyncPlans(newText);
  };

  const handleMerge=useCallback(async slotId=>{
    if(isLocked(slotId))return;
    const frags=slotData[slotId];if(!frags||frags.length<2)return;
    setMergingSlot(slotId);
    try {
      const slot=currentSlots.find(s=>s.id===slotId);
      const texts=frags.filter(f=>!f.merged).map(f=>f.text);
      const data=await callAPI({model:MODEL,max_tokens:2000,
        system:`プロップファーム情報ライター。「${slot?.label||slotId}」の断片を1つに整形。重複統合・数値保持。整形結果のみ出力。`,
        messages:[{role:"user",content:texts.map((t,i)=>`【${i+1}】\n${t}`).join("\n\n")}]});
      setSlotData(prev=>({...prev,[slotId]:[...frags.filter(f=>!f.merged),{text:exText(data),merged:true}]}));
    } catch(e){alert("整形エラー")}
    setMergingSlot(null);
  },[slotData,currentSlots,setSlotData,locks]);

  // (削除: Notion出力) generateNotionBody は不要
  const generateNotionBody=useCallback((selectedIds=[])=>{
    const g=id=>{const fr=slotData[id];if(!fr?.length)return"";const m=fr.find(f=>f.merged);return m?m.text:fr.map(f=>f.text).join("\n")};
    const isSelected=id=>selectedIds.length===0||selectedIds.includes(id); // 空配列なら全出力
    const L=[];
    
    if(templateMode==="dbp01"){
      // DBP_01: Firm情報
      if(isSelected("firmPitch")&&g("firmPitch"))L.push("## ファームピッチ","",g("firmPitch"),"");
      if(isSelected("rewardProgram")&&g("rewardProgram"))L.push("## リワードプログラム","",g("rewardProgram"),"");
      if(isSelected("scaleUp")&&g("scaleUp"))L.push("## スケールアップ","",g("scaleUp"),"");
      
      L.push("## 取引環境","");
      if(isSelected("broker")&&g("broker"))L.push("### ブローカー","",g("broker"),"");
      if(isSelected("platform")&&g("platform"))L.push("### プラットフォーム","",g("platform"),"");
      if(isSelected("serverTime")&&g("serverTime"))L.push("### Server Time","",g("serverTime"),"");
      if(isSelected("ddReset")&&g("ddReset"))L.push("### DD Reset","",g("ddReset"),"");
      if(isSelected("leverage")&&g("leverage"))L.push("### レバレッジ","",g("leverage"),"");
      if(isSelected("commission")&&g("commission"))L.push("### 手数料","",g("commission"),"");
      
      L.push("## 入出金","");
      if(isSelected("paymentMethods")&&g("paymentMethods"))L.push("### 入金方法","",g("paymentMethods"),"");
      if(isSelected("payoutMethods")&&g("payoutMethods"))L.push("### 出金方法","",g("payoutMethods"),"");
      if(isSelected("payoutPolicy")&&g("payoutPolicy"))L.push("### 出金ポリシー","",g("payoutPolicy"),"");
      if(isSelected("profitSplit")&&g("profitSplit"))L.push("### Profit Split","",g("profitSplit"),"");
      if(isSelected("profitSplitNote")&&g("profitSplitNote"))L.push("",g("profitSplitNote"),"");
      
      if(isSelected("planComparison")&&g("planComparison"))L.push("## プラン比較","",g("planComparison"),"");
      
    } else if(templateMode==="dbp02"){
      // DBP_02: Plan情報
      
      // ルール詳細テーブル（Markdownテーブル形式）
      L.push("### ルール詳細","");
      L.push("| 項目 | Challenge | Funded |");
      L.push("|------|-----------|--------|");
      L.push("| 説明 | Funded列が — の項目はChallengeと同じルールが適用されます | — |");
      
      SLOT_DEFS.dbp02.filter(s=>s.section==="詳細"&&isSelected(s.id)).forEach(s=>{
        const v=g(s.id);
        if(v){
          // Challenge|Funded|差分|詳細 形式をパース（詳細は残り全部）
          const vStr=typeof v==="string"?v:String(v);
          const parts=vStr.split("|");
          const cVal=(parts[0]||"").trim();
          const fVal=(parts[1]||"").trim();
          const detail=parts.slice(3).join("|").trim();

          // Markdownテーブル行を生成
          L.push(`| ${s.label} | ${cVal||"—"} | ${fVal||"—"} |`);

          // 詳細本文があれば追加行として出力
          if(detail){
            L.push(`| | ${detail} | |`);
          }
        }
      });
      
      L.push(""); // 空行
      
    } else if(templateMode==="koryaku"){
      // 攻略記事
      if(isSelected("k_dd")&&g("k_dd"))L.push("## 断面① Drawdown","",g("k_dd"),"");
      if(isSelected("k_rules")&&g("k_rules"))L.push("## 断面② 取引ルール","",g("k_rules"),"");
      if(isSelected("k_payout")&&g("k_payout"))L.push("## 断面③ 出金までの流れ","",g("k_payout"),"");
    }
    
    return L.filter(l=>l!==undefined).join("\n");
  },[templateMode,slotData]);

  const [showReinvestigateModal,setShowReinvestigateModal]=useState(false);
  useEffect(()=>{const h=()=>setShowReinvestigateModal(true);document.addEventListener("pfd-reinvestigate",h);return()=>document.removeEventListener("pfd-reinvestigate",h)},[]);
  const [selectedSlotsForReinvestigate,setSelectedSlotsForReinvestigate]=useState([]);

  const filled=currentSlots.filter(s=>slotData[s.id]?.length>0).length;
  const reset=()=>{setShowPriceMatrix(false);setShowRuleTable(false);setShowPreview(false);};
  // タブ種別に応じてクロスタブ遷移するヘルパ
  // - Firm系ボタン（Firm/価格/攻略）を Plan タブで押した → 親Firmへ移動
  // - Plan系ボタン（Plan/早見表）を Firm タブで押した → 配下Planへ移動（先頭プラン）
  const goFirm=mode=>{reset();if(activeType==="plan"&&parentFirmId&&onNavigateTab){onNavigateTab(parentFirmId,mode);}else{setTemplateMode(mode);}};
  const goPlan=()=>{reset();if(activeType==="firm"&&firstPlanId&&onNavigateTab){onNavigateTab(firstPlanId,"dbp02");}else{setTemplateMode("dbp02");}};
  const navBtns=[
    {label:`Firm(${SLOT_DEFS.dbp01.filter(s=>slotData[s.id]?.length>0).length}/${SLOT_DEFS.dbp01.length})`,active:activeType==="firm"&&templateMode==="dbp01"&&!showPriceMatrix&&!showPreview,color:C.accent,onClick:()=>goFirm("dbp01")},
    {label:"価格",active:activeType==="firm"&&templateMode==="dbp01"&&showPriceMatrix,color:C.yellow,onClick:()=>{if(activeType==="plan"&&parentFirmId&&onNavigateTab){onNavigateTab(parentFirmId,"dbp01");}else{setTemplateMode("dbp01");}reset();setShowPriceMatrix(true);}},
    {label:`攻略(${SLOT_DEFS.koryaku.filter(s=>slotData[s.id]?.length>0).length}/${SLOT_DEFS.koryaku.length})`,active:activeType==="firm"&&templateMode==="koryaku"&&!showPreview,color:C.accent,onClick:()=>goFirm("koryaku")},
    {label:`Plan(${SLOT_DEFS.dbp02.filter(s=>slotData[s.id]?.length>0).length}/${SLOT_DEFS.dbp02.length})`,active:activeType==="plan"&&!showRuleTable&&!showPreview,color:C.accent,onClick:goPlan},
    {label:"早見表",active:activeType==="plan"&&showRuleTable,color:C.yellow,onClick:()=>{goPlan();setShowRuleTable(true);}},
    {label:"👁プレビュー",active:showPreview,color:C.purple,onClick:()=>{reset();setShowPreview(true);}},
  ];

  // 再調査プロンプト生成
  const generateReinvestigatePrompt=useCallback((mode)=>{
    let targetSlots=[];
    if(mode==="auto"){
      // 自動: 空スロットを検出
      targetSlots=currentSlots.filter(s=>!slotData[s.id]||slotData[s.id].length===0);
    }else{
      // 手動: 選択されたスロット
      targetSlots=currentSlots.filter(s=>selectedSlotsForReinvestigate.includes(s.id));
    }
    if(!targetSlots.length){
      alert(mode==="auto"?"全スロット入力済みです":"スロットを選択してください");
      return;
    }
    
    // 参照URLを取得
    const g=id=>{const v=slotData[id];return(v||[]).map(x=>x.text||x).join(", ")||"記載なし"};
    const urlOfficial=g("fm_url_official");
    const urlRules=g("fm_url_rules");
    
    const slotList=targetSlots.map(s=>`- ${s.id}: ${s.label}`).join("\n");
    
    const prompt=`以下のスロットについて、公式ルールページから情報を再調査してください。

【調査対象スロット】
${slotList}

【参照URL】
- 公式サイト: ${urlOfficial}
- ルールページ: ${urlRules}

【指示】
各スロットについて、正確な定義・条件・計算方法を抽出してください。`;
    
    navigator.clipboard.writeText(prompt);
    alert(`再調査プロンプトをクリップボードにコピーしました（${targetSlots.length}件）`);
    setShowReinvestigateModal(false);
    setSelectedSlotsForReinvestigate([]);
  },[currentSlots,slotData,selectedSlotsForReinvestigate]);

  return (
    <div style={{flex:1,overflow:"auto",padding:10,display:"flex",flexDirection:"column"}}>
      <EditModal show={!!editModal} text={editModal?.text} label={editModal?.label}
        onSave={handleEditSave} onClose={()=>setEditModal(null)} />
      <ReinvestigateModal show={showReinvestigateModal} onClose={()=>{setShowReinvestigateModal(false);setSelectedSlotsForReinvestigate([])}}
        currentSlots={currentSlots} slotData={slotData}
        selectedSlots={selectedSlotsForReinvestigate} setSelectedSlots={setSelectedSlotsForReinvestigate}
        onGenerate={generateReinvestigatePrompt} />
      {/* ヘッダー: テンプレ切替 + 充填率 + ⋮メニュー + × */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:4}}>
        <div style={{display:"flex",gap:2,alignItems:"center"}}>
          {navBtns.map(({label,active,color,onClick})=>(
            <button key={label} onClick={onClick} style={{
              padding:"2px 8px",fontSize:"0.65rem",fontWeight:700,cursor:"pointer",borderRadius:3,whiteSpace:"nowrap",
              background:active?color:"transparent",color:active?C.bg:C.textDim,border:`1px solid ${active?color:C.border}`
            }}>{label}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span onClick={()=>{if(confirm("全スロットクリア？"))setSlotData({})}} style={{cursor:"pointer",color:C.red,fontSize:"0.7rem",marginLeft:4}}>×</span>
        </div>
      </div>

      {/* プレビュー / ルールテーブル / 価格マトリクス / セクション */}
      {showPreview
        ?(templateMode==="dbp01"
          ?<FirmPreview slotData={slotData} planNames={planNames}/>
          :templateMode==="dbp02"
          ?<PlanPreview slotData={slotData} planName={activePlanName} parentFirmSlotData={parentFirmSlotData} parentPlanNames={parentPlanNames}/>
          :<KoryakuPreview slotData={slotData}/>)
        :templateMode==="dbp02"&&showRuleTable
        ?<RuleTableEditor slotData={slotData} setSlotData={setSlotData} locks={locks} setLocks={setLocks} />
        :templateMode==="dbp01"&&showPriceMatrix
        ?<PriceMatrixEditor slotData={slotData} setSlotData={setSlotData} locks={locks} setLocks={setLocks} planNames={planNames} />
        :sections.map(([sec,slots])=>{
        const fc=slots.filter(s=>slotData[s.id]?.length>0).length;
        const allSectionLocked=slots.every(s=>isLocked(s.id));
        return (
          <div key={sec} style={{marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
              <span onClick={()=>{const next={...locks};slots.forEach(s=>{next[s.id]=!allSectionLocked});setLocks(next)}}
                style={{cursor:"pointer",fontSize:"0.6rem",color:allSectionLocked?C.yellow:C.textDim}} title={allSectionLocked?"全解除":"全ロック"}>{allSectionLocked?"🔒":"🔓"}</span>
              <span style={{fontSize:"0.72rem",fontWeight:700,color:SEC_COLORS[sec]||C.text}}>
                {sec} <span style={{fontSize:"0.58rem",color:C.textDim}}>{fc}/{slots.length}</span>
              </span>
            </div>

            {slots.map(slot=>{
              const frags=slotData[slot.id]||[];
              const merged=frags.find(f=>f.merged);
              const locked=isLocked(slot.id);
              const isActive=activeSlotId===slot.id;
              const isAiTarget=(templateMode==="dbp01"&&slot.id==="planComparison")||(templateMode==="koryaku");
              return (
                <div key={slot.id}
                  onMouseDown={e=>{if(e.target.tagName!=="INPUT"&&e.target.tagName!=="TEXTAREA")e.preventDefault()}}
                  onClick={()=>setActiveSlotId(slot.id)}
                  style={{
                  background:isActive?C.accentDim:C.surface,
                  border:`1px solid ${isActive?C.accent:(locked?C.yellow+"40":C.border)}`,
                  borderRadius:4,padding:"5px 8px",marginBottom:2,opacity:locked?0.8:1,cursor:"pointer"
                }}>
                  <div style={{display:"flex",alignItems:"center",gap:3}}>
                    {/* 左: 🔒 ✎ 整形 */}
                    <span onClick={e=>{e.stopPropagation();toggleLock(slot.id)}} style={{cursor:"pointer",fontSize:"0.55rem",lineHeight:1}}>{locked?"🔒":"🔓"}</span>
                    {!locked&&frags.length>0&&<span onClick={e=>{e.stopPropagation();setEditModal({slotId:slot.id,idx:merged?"merged":0,text:merged?merged.text:frags[0]?.text||"",label:slot.label})}} style={{cursor:"pointer",fontSize:"0.55rem",color:C.textDim,lineHeight:1}}>✎</span>}
                    {!locked&&frags.length>1&&!merged&&<span onClick={e=>{e.stopPropagation();handleMerge(slot.id)}} style={{cursor:"pointer",fontSize:"0.5rem",color:C.purple,lineHeight:1}}>{mergingSlot===slot.id?"…":"整"}</span>}

                    {/* スロット名 */}
                    <span style={{fontSize:"0.7rem",fontWeight:700,color:frags.length?C.accent:C.textDim}}>{slot.label}</span>
                    {slot.hint&&<span style={{fontSize:"0.48rem",color:C.textDim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{slot.hint}</span>}

                    {/* 右: AI作成 + Planタブ生成 + × */}
                    <div style={{flex:slot.hint?0:1}} />
                    {slot.id==="planList"&&!locked&&frags.length>0&&(
                      <span onClick={e=>{e.stopPropagation();const text=merged?merged.text:frags.map(f=>f.text).join(", ");syncPlansFromList(text)}} style={{cursor:"pointer",fontSize:"0.5rem",color:C.green,border:`1px solid ${C.green}`,borderRadius:2,padding:"0 3px"}}>Planタブ生成</span>
                    )}
                    {isAiTarget&&!locked&&(
                      (templateMode==="koryaku"&&onAIGenKoryaku)?(
                        <span onClick={e=>{e.stopPropagation();onAIGenKoryaku()}} style={{cursor:aiGenKoryaku?"wait":"pointer",fontSize:"0.5rem",color:C.purple,border:`1px solid ${C.purple}`,borderRadius:2,padding:"0 3px"}}>{aiGenKoryaku?"…":"作成"}</span>
                      ):onAIGenTable&&slot.id==="planComparison"?(
                        <span onClick={e=>{e.stopPropagation();onAIGenTable(templateMode)}} style={{cursor:aiGenTable?"wait":"pointer",fontSize:"0.5rem",color:C.blue,border:`1px solid ${C.blue}`,borderRadius:2,padding:"0 3px"}}>{aiGenTable?"…":"作成"}</span>
                      ):null
                    )}
                    {!locked&&frags.length>0&&<span onClick={e=>{e.stopPropagation();if(confirm(`${slot.label}をクリア？`))setSlotData(prev=>({...prev,[slot.id]:[]}))}} style={{color:C.red,fontSize:"0.55rem",cursor:"pointer"}}>×</span>}
                  </div>

                  {merged?(
                    <div onClick={e=>{e.stopPropagation();!locked&&setEditModal({slotId:slot.id,idx:"merged",text:merged.text,label:slot.label})}}
                      style={{fontSize:"0.68rem",color:C.textBright,fontFamily:font,whiteSpace:"pre-wrap",background:C.surfaceAlt,borderRadius:3,padding:4,marginTop:3,border:`1px solid ${C.purple}40`,cursor:locked?"default":"pointer",maxHeight:70,overflow:"auto"}}>{merged.text}</div>
                  ):frags.map((f,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:4,marginTop:2}}>
                      <div onClick={e=>{e.stopPropagation();!locked&&setEditModal({slotId:slot.id,idx:i,text:f.text,label:slot.label})}}
                        style={{flex:1,fontSize:"0.65rem",color:C.text,fontFamily:font,whiteSpace:"pre-wrap",background:C.surfaceAlt,borderRadius:3,padding:"2px 5px",borderLeft:`2px solid ${C.accent}40`,cursor:locked?"default":"pointer",maxHeight:50,overflow:"auto"}}>{f.text}</div>
                      {!locked&&<span onClick={e=>{e.stopPropagation();handleDelete(slot.id,i)}} style={{color:C.red,fontSize:"0.5rem",cursor:"pointer",flexShrink:0,padding:"2px"}}>×</span>}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// 用語辞典パネル
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
function GlossaryPanel({terms,setTerms,generating}) {
  const [filter,setFilter]=useState("all"); // all | label | notation | custom
  const [editIdx,setEditIdx]=useState(-1);  // 編集中の実インデックス（-1=なし）
  const [draft,setDraft]=useState(null);
  const exportCSV=()=>{
    const esc=s=>`"${(s||"").replace(/"/g,'""')}"`;
    return "key,type,用語名,カテゴリ,定義,3行説明,豆知識\n"+terms.map(t=>[esc(t.key),esc(t.type),esc(t.term),esc(t.category),esc(t.definition),esc(t.explanation),esc(t.trivia)].join(",")).join("\n");
  };
  const seedCount=terms.filter(t=>t.key).length;
  const fTerms=terms.map((t,i)=>({t,i})).filter(({t})=>{
    if(filter==="all")return true;
    if(filter==="custom")return !t.key;
    return t.type===filter;
  });
  const FBTN=(val,lbl)=>(
    <button onClick={()=>setFilter(val)} style={{background:filter===val?C.purple:"transparent",color:filter===val?C.bg:C.textDim,border:`1px solid ${filter===val?C.purple:C.border}`,borderRadius:3,padding:"1px 6px",fontSize:"0.6rem",fontWeight:700,cursor:"pointer"}}>{lbl}</button>
  );
  const startEdit=(i)=>{setEditIdx(i);setDraft({...terms[i]})};
  const cancelEdit=()=>{setEditIdx(-1);setDraft(null)};
  const saveEdit=()=>{
    if(!draft.term||!draft.term.trim()){alert("用語名は必須です");return}
    setTerms(p=>p.map((t,j)=>j===editIdx?{...draft}:t));
    setEditIdx(-1);setDraft(null);
  };
  const addNew=()=>{
    setTerms(p=>[{term:"",type:"notation",category:"",definition:"",explanation:"",trivia:""},...p]);
    setFilter("all");setEditIdx(0);setDraft({term:"",type:"notation",category:"",definition:"",explanation:"",trivia:""});
  };
  const fld=(label,key,ml)=>(
    <div style={{marginBottom:4}}>
      <div style={{fontSize:"0.56rem",color:C.textDim,marginBottom:1}}>{label}</div>
      {ml?
        <textarea value={draft[key]||""} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))} rows={2} style={{width:"100%",background:C.bg,color:C.textBright,border:`1px solid ${C.border}`,borderRadius:3,fontSize:"0.66rem",padding:"3px 5px",resize:"vertical",fontFamily:"inherit"}} />
        :
        <input value={draft[key]||""} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))} style={{width:"100%",background:C.bg,color:C.textBright,border:`1px solid ${C.border}`,borderRadius:3,fontSize:"0.66rem",padding:"3px 5px"}} />
      }
    </div>
  );
  return (
    <div style={{flex:1,overflow:"auto",padding:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:"0.78rem",fontWeight:700,color:C.purple}}>用語辞典 <span style={{fontSize:"0.6rem",color:C.textDim,fontWeight:400}}>正本{seedCount}</span></span>
        <div style={{display:"flex",gap:3}}>
          <Btn color={C.accent} onClick={addNew} style={{fontSize:"0.6rem"}}>＋追加</Btn>
          <Btn color={C.purple} onClick={()=>exportJSON(terms,"glossary.json")} style={{fontSize:"0.6rem"}}>保存</Btn>
          <Btn color={C.purple} onClick={()=>importJSON(d=>{if(Array.isArray(d))setTerms(p=>{const keys=new Set(p.map(x=>x.key).filter(Boolean));return [...p,...d.filter(x=>!(x.key&&keys.has(x.key)))]})})} style={{fontSize:"0.6rem"}}>読込</Btn>
          {terms.length>0&&<CopyBtn text={exportCSV()} label={`CSV(${terms.length})`} color={C.purple} />}
        </div>
      </div>
      <div style={{display:"flex",gap:3,marginBottom:6}}>
        {FBTN("all","全")}{FBTN("label","label")}{FBTN("notation","notation")}{FBTN("custom","手動")}
      </div>
      {generating&&<div style={{fontSize:"0.72rem",color:C.yellow,marginBottom:4}}>生成中...</div>}
      {fTerms.map(({t,i})=>(
        editIdx===i?
        <div key={i} style={{background:C.surfaceAlt||C.surface,border:`1px solid ${C.accent}`,borderRadius:4,padding:"8px",marginBottom:3}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
            {t.key&&<span style={{fontSize:"0.56rem",color:C.bg,background:C.accent,padding:"1px 5px",borderRadius:3,fontWeight:700}}>{t.key}</span>}
            <select value={draft.type||"notation"} onChange={e=>setDraft(d=>({...d,type:e.target.value}))} style={{background:C.bg,color:C.textBright,border:`1px solid ${C.border}`,borderRadius:3,fontSize:"0.6rem",padding:"1px 3px"}}>
              <option value="label">label</option>
              <option value="notation">notation</option>
            </select>
          </div>
          {fld("用語名（正規表記）","term")}
          {fld("カテゴリ","category")}
          {fld("定義（意味）","definition",true)}
          {fld("説明","explanation",true)}
          {fld("豆知識","trivia")}
          <div style={{display:"flex",gap:4,marginTop:4}}>
            <Btn color={C.accent} onClick={saveEdit} style={{fontSize:"0.62rem"}}>保存</Btn>
            <Btn color={C.textDim} onClick={cancelEdit} style={{fontSize:"0.62rem"}}>キャンセル</Btn>
          </div>
        </div>
        :
        <div key={i} style={{background:C.surface,border:`1px solid ${t.key?C.border:C.yellow+"55"}`,borderRadius:4,padding:"6px 8px",marginBottom:3}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:"0.78rem",fontWeight:700,color:C.accent,display:"flex",alignItems:"center",flexWrap:"wrap",gap:4}}>
              {t.key&&<span style={{fontSize:"0.56rem",color:C.bg,background:C.accent,padding:"1px 5px",borderRadius:3,fontWeight:700}}>{t.key}</span>}
              {t.type&&<span style={{fontSize:"0.54rem",color:t.type==="notation"?C.green:C.blue,border:`1px solid ${t.type==="notation"?C.green:C.blue}`,padding:"0 4px",borderRadius:3}}>{t.type}</span>}
              <span>{t.term}</span>
              {t.category&&<span style={{fontSize:"0.58rem",color:C.purple,background:`${C.purple}22`,padding:"1px 5px",borderRadius:3}}>{t.category}</span>}
            </span>
            <span style={{display:"flex",gap:6,alignItems:"center"}}>
              <span onClick={()=>startEdit(i)} style={{color:C.blue,fontSize:"0.6rem",cursor:"pointer"}}>編集</span>
              <span onClick={()=>{if(t.key){if(!confirm(`正本キー ${t.key}「${t.term}」を削除しますか？`))return}setTerms(p=>p.filter((_,j)=>j!==i))}} style={{color:C.red,fontSize:"0.62rem",cursor:"pointer"}}>×</span>
            </span>
          </div>
          {t.definition&&<div style={{fontSize:"0.68rem",color:C.textBright,marginTop:2}}>{t.definition}</div>}
          {t.explanation&&<div style={{fontSize:"0.65rem",color:C.text,marginTop:1,whiteSpace:"pre-wrap"}}>{t.explanation}</div>}
          {t.trivia&&<div style={{fontSize:"0.62rem",color:C.textDim,marginTop:1,fontStyle:"italic"}}>💡 {t.trivia}</div>}
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// バックアップ／復元モーダル
// ═══════════════════════════════════════════════════
function BackupModal({show,onClose,getCurrentData,onRestore}) {
  const [backups,setBackups]=useState([]);
  const [label,setLabel]=useState("");
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ if(show){ setBackups(loadBackups()); setLabel(""); } },[show]);
  if(!show)return null;

  const summary=(data)=>{
    const fc=(data?.firms||[]).length;
    const pc=(data?.firms||[]).reduce((a,f)=>a+((f.plans||[]).length),0);
    const gc=(data?.glossaryTerms||[]).length;
    return `Firm ${fc} / Plan ${pc} / 用語 ${gc}`;
  };

  const handleBackup=(auto)=>{
    setBusy(true);
    const data=getCurrentData();
    const list=loadBackups();
    const snap=makeBackupSnapshot(auto?"(復元前 自動退避)":(label.trim()||""),data,auto);
    let next=[snap,...list];
    if(next.length>BACKUP_MAX)next=next.slice(0,BACKUP_MAX);
    if(saveBackups(next)){ setBackups(next); setLabel(""); }
    setBusy(false);
    return snap;
  };

  const handleRestore=(bk)=>{
    if(!window.confirm(`このバックアップで現在の状態を置き換えます。\n\n${bk.label||"(無題)"}\n${fmtBackupTime(bk.ts)}\n${summary(bk.data)}\n\n※復元の直前に、いまの状態を自動で退避バックアップとして保存します。\n復元しますか？`))return;
    // 復元直前に現在状態を自動退避
    handleBackup(true);
    onRestore(bk.data);
    onClose();
  };

  const handleDelete=(id)=>{
    if(!window.confirm("このバックアップを削除しますか？"))return;
    const next=loadBackups().filter(b=>b.id!==id);
    saveBackups(next); setBackups(next);
  };

  const handleDownload=(bk)=>{
    exportJSON(bk.data,`pfm-backup-${fmtBackupTime(bk.ts).replace(/[ :]/g,"-")}.json`);
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:560,maxWidth:"92vw",maxHeight:"86vh",overflow:"auto",background:C.surface,border:`1px solid ${C.accent}`,borderRadius:8,padding:"14px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontWeight:700,color:C.accent,fontSize:"0.9rem"}}>💾 バックアップ / 復元</span>
          <span style={{fontSize:"0.6rem",color:C.textDim}}>ブラウザ内に保存（最大{BACKUP_MAX}件）</span>
          <div style={{flex:1}} />
          <span onClick={onClose} style={{cursor:"pointer",color:C.red,fontSize:"1rem",lineHeight:1}}>×</span>
        </div>

        {/* 新規バックアップ */}
        <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center"}}>
          <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="メモ（任意）例: 用語整理後"
            onKeyDown={e=>{if(e.key==="Enter")handleBackup(false)}}
            style={{flex:1,background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"4px 8px",fontSize:"0.72rem",outline:"none"}} />
          <Btn color={C.green} disabled={busy} onClick={()=>handleBackup(false)} style={{fontSize:"0.7rem",padding:"4px 12px"}}>＋ 今すぐバックアップ</Btn>
        </div>

        {/* 一覧 */}
        {backups.length===0?(
          <div style={{color:C.textDim,fontSize:"0.72rem",textAlign:"center",padding:"24px 0"}}>バックアップはまだありません</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {backups.map(bk=>(
              <div key={bk.id} style={{display:"flex",alignItems:"center",gap:8,background:C.surfaceAlt,border:`1px solid ${bk.auto?C.yellow:C.border}`,borderRadius:5,padding:"6px 8px"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.74rem",color:C.textBright,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {bk.auto&&<span style={{color:C.yellow,fontSize:"0.62rem",marginRight:4}}>[自動]</span>}
                    {bk.label||<span style={{color:C.textDim,fontWeight:400}}>(無題)</span>}
                  </div>
                  <div style={{fontSize:"0.62rem",color:C.textDim}}>{fmtBackupTime(bk.ts)}　{summary(bk.data)}</div>
                </div>
                <Btn color={C.accent} onClick={()=>handleRestore(bk)} style={{fontSize:"0.64rem"}}>↩️ 復元</Btn>
                <Btn color={C.blue} onClick={()=>handleDownload(bk)} style={{fontSize:"0.64rem"}} title="JSONファイルとして書き出し">⬇</Btn>
                <Btn color={C.red} onClick={()=>handleDelete(bk.id)} style={{fontSize:"0.64rem"}}>🗑</Btn>
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:12,fontSize:"0.6rem",color:C.textDim,lineHeight:1.6,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
          ・「復元」は現在のデータを<b>置き換え</b>ます（直前の状態は自動で退避保存されるので元に戻せます）。<br/>
          ・データはこのブラウザの localStorage に保存されます。別端末・キャッシュ削除では消えるため、重要時は⬇でJSONも保存してください。
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// マージ取込モーダル（2台のデータ統合）
// ═══════════════════════════════════════════════════
function MergeModal({show,onClose,getCurrentData,onApplyMerge}) {
  const [incoming,setIncoming]=useState(null);   // 読み込んだファイル
  const [plan,setPlan]=useState(null);           // planMerge結果
  const [choices,setChoices]=useState({});       // {firmName: 'file'|'keep'|'both'}

  useEffect(()=>{ if(!show){ setIncoming(null); setPlan(null); setChoices({}); } },[show]);
  if(!show)return null;

  const summary=(data)=>{
    const fc=(data?.firms||[]).length;
    const pc=(data?.firms||[]).reduce((a,f)=>a+((f.plans||[]).length),0);
    const gc=(data?.glossaryTerms||[]).length;
    return `Firm ${fc} / Plan ${pc} / 用語 ${gc}`;
  };
  const planCount=f=>(f?.plans||[]).length;

  const pickFile=()=>{
    importJSON(d=>{
      if(!d||!Array.isArray(d.firms)){alert("このファイルにはfirmsデータがありません");return}
      const base=getCurrentData();
      const p=planMerge(base,d);
      setIncoming(d);
      setPlan(p);
      // 衝突の初期選択は「両方残す」（最も安全）
      const init={};
      p.conflicts.forEach(c=>{init[c.name]="both"});
      setChoices(init);
    });
  };

  const apply=()=>{
    if(!plan)return;
    onApplyMerge(incoming, plan, choices);
    onClose();
  };

  const base=getCurrentData();

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:620,maxWidth:"94vw",maxHeight:"88vh",overflow:"auto",background:C.surface,border:`1px solid ${C.blue}`,borderRadius:8,padding:"14px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontWeight:700,color:C.blue,fontSize:"0.9rem"}}>🔀 マージ取込（2台のデータ統合）</span>
          <div style={{flex:1}} />
          <span onClick={onClose} style={{cursor:"pointer",color:C.red,fontSize:"1rem",lineHeight:1}}>×</span>
        </div>

        {!plan?(
          <div>
            <div style={{fontSize:"0.72rem",color:C.text,lineHeight:1.7,marginBottom:12}}>
              もう一方のPCで「全保存」して書き出したJSONファイルを選んでください。<br/>
              現在のデータ（<b style={{color:C.accent}}>{summary(base)}</b>）に<b>足し合わせ</b>ます。上書きではありません。
            </div>
            <Btn color={C.blue} onClick={pickFile} style={{fontSize:"0.74rem",padding:"5px 14px"}}>📂 JSONファイルを選ぶ</Btn>
          </div>
        ):(
          <div>
            {/* 自動追加分 */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:C.green,marginBottom:4}}>そのまま追加：{plan.autoAdd.length} 件</div>
              {plan.autoAdd.length===0?(
                <div style={{fontSize:"0.66rem",color:C.textDim}}>（重複しない新規Firmはありません）</div>
              ):(
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {plan.autoAdd.map(f=>(
                    <span key={f.id} style={{fontSize:"0.66rem",color:C.text,background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:3,padding:"2px 6px"}}>{f.name}（Plan {planCount(f)}）</span>
                  ))}
                </div>
              )}
            </div>

            {/* 衝突 */}
            <div style={{marginBottom:8}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:C.yellow,marginBottom:4}}>同名Firmの衝突：{plan.conflicts.length} 件</div>
              {plan.conflicts.length===0?(
                <div style={{fontSize:"0.66rem",color:C.textDim}}>（衝突はありません）</div>
              ):(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {plan.conflicts.map(c=>(
                    <div key={c.name} style={{background:C.surfaceAlt,border:`1px solid ${C.yellow}`,borderRadius:5,padding:"7px 9px"}}>
                      <div style={{fontSize:"0.74rem",fontWeight:700,color:C.textBright,marginBottom:5}}>{c.name}</div>
                      <div style={{fontSize:"0.62rem",color:C.textDim,marginBottom:6}}>
                        こちら: Plan {planCount(c.base)} ／ ファイル: Plan {planCount(c.incoming)}
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {[["both","両方残す（別Firmで複製）",C.green],["file","ファイルで上書き",C.blue],["keep","こちらを残す（スキップ）",C.textDim]].map(([val,labelTxt,col])=>(
                          <button key={val} onClick={()=>setChoices(p=>({...p,[c.name]:val}))}
                            style={{background:choices[c.name]===val?col:"transparent",color:choices[c.name]===val?C.bg:col,border:`1px solid ${col}`,borderRadius:3,padding:"3px 8px",fontSize:"0.64rem",fontWeight:700,cursor:"pointer"}}>
                            {labelTxt}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div style={{fontSize:"0.66rem",color:C.text,marginBottom:10}}>
              用語辞典：新規 {plan.glossaryAdd.length} 件を追加（既存keyは保持）
            </div>

            <div style={{display:"flex",gap:6,justifyContent:"flex-end",borderTop:`1px solid ${C.border}`,paddingTop:10}}>
              <Btn color={C.textDim} onClick={()=>{setPlan(null);setIncoming(null);setChoices({})}} style={{fontSize:"0.7rem"}}>← 戻る</Btn>
              <Btn color={C.blue} onClick={apply} style={{fontSize:"0.72rem",padding:"4px 14px"}}>この内容でマージ実行</Btn>
            </div>
            <div style={{marginTop:8,fontSize:"0.6rem",color:C.textDim,lineHeight:1.6}}>
              ※ 実行直前に現在の状態を自動バックアップします（💾から復元可能）。
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// Firm統合モーダル（同名2箱を1つに寄せる）
// ═══════════════════════════════════════════════════
function ConsolidateModal({show,onClose,firms,tabDataMap,initialKeepId,onApply}) {
  const [keepId,setKeepId]=useState(initialKeepId||"");
  const [absorbId,setAbsorbId]=useState("");
  const [plan,setPlan]=useState(null);
  const [resolve,setResolve]=useState({}); // {conflictKey: 'keep'|'absorb'}

  useEffect(()=>{ if(show){ setKeepId(initialKeepId||""); setAbsorbId(""); setPlan(null); setResolve({}); } },[show,initialKeepId]);
  if(!show)return null;

  const keepFirm=firms.find(f=>f.id===keepId);
  // 吸収候補は「残す側」と同名の別Firm、なければ全Firm（残す側以外）
  const sameName=keepFirm?firms.filter(f=>f.id!==keepId&&f.name.replace(/\s*\(\d+\)\s*$/,"")===keepFirm.name.replace(/\s*\(\d+\)\s*$/,"")):[];
  const others=firms.filter(f=>f.id!==keepId);
  const absorbCandidates=sameName.length?sameName:others;

  const ckey=c=>`${c.scope}|${c.planName}|${c.slotKey}`;

  const buildPlan=()=>{
    const kf=firms.find(f=>f.id===keepId), af=firms.find(f=>f.id===absorbId);
    if(!kf||!af){alert("残す側・吸収側の両方を選んでください");return}
    if(kf.id===af.id){alert("同じFirmは選べません");return}
    const p=planFirmConsolidation(kf,af,tabDataMap);
    setPlan(p);
    const init={}; p.conflicts.forEach(c=>{init[ckey(c)]="keep"}); setResolve(init);
  };

  const apply=()=>{
    onApply(keepId,absorbId,plan,resolve);
    onClose();
  };

  const slotLabel=k=>k; // slotKeyそのまま表示（短い英字キー）

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:640,maxWidth:"94vw",maxHeight:"88vh",overflow:"auto",background:C.surface,border:`1px solid ${C.purple}`,borderRadius:8,padding:"14px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontWeight:700,color:C.purple,fontSize:"0.9rem"}}>⤵ Firm統合（2箱を1つに）</span>
          <div style={{flex:1}} />
          <span onClick={onClose} style={{cursor:"pointer",color:C.red,fontSize:"1rem",lineHeight:1}}>×</span>
        </div>

        {/* 選択 */}
        <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:"0.62rem",color:C.green,marginBottom:3,fontWeight:700}}>残す（こちらに寄せる）</div>
            <select value={keepId} onChange={e=>{setKeepId(e.target.value);setPlan(null)}} style={{width:"100%",background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"4px 6px",fontSize:"0.72rem"}}>
              <option value="">選択...</option>
              {firms.map(f=><option key={f.id} value={f.id}>{f.name}（Plan {(f.plans||[]).length}）</option>)}
            </select>
          </div>
          <div style={{fontSize:"0.8rem",color:C.textDim,paddingBottom:5}}>◀</div>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:"0.62rem",color:C.red,marginBottom:3,fontWeight:700}}>吸収して削除する</div>
            <select value={absorbId} onChange={e=>{setAbsorbId(e.target.value);setPlan(null)}} disabled={!keepId} style={{width:"100%",background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"4px 6px",fontSize:"0.72rem"}}>
              <option value="">選択...</option>
              {absorbCandidates.map(f=><option key={f.id} value={f.id}>{f.name}（Plan {(f.plans||[]).length}）</option>)}
            </select>
          </div>
          <Btn color={C.purple} onClick={buildPlan} disabled={!keepId||!absorbId} style={{fontSize:"0.7rem",padding:"5px 12px"}}>突合する</Btn>
        </div>

        {plan&&(
          <div>
            {/* Plan処理サマリ */}
            <div style={{marginBottom:8,fontSize:"0.68rem",color:C.text}}>
              <span style={{color:C.green,fontWeight:700}}>移動するPlan：</span>
              {plan.planActions.filter(a=>a.type==="move").length===0?"なし":
                plan.planActions.filter(a=>a.type==="move").map(a=>a.absorbPlan.name).join("、")}
            </div>
            <div style={{marginBottom:10,fontSize:"0.68rem",color:C.text}}>
              <span style={{color:C.yellow,fontWeight:700}}>同名Planを合成：</span>
              {plan.planActions.filter(a=>a.type==="merge").length===0?"なし":
                plan.planActions.filter(a=>a.type==="merge").map(a=>a.absorbPlan.name).join("、")}
            </div>

            {/* 競合 */}
            <div style={{fontSize:"0.72rem",fontWeight:700,color:C.yellow,marginBottom:5}}>値の競合：{plan.conflicts.length} 件</div>
            {plan.conflicts.length===0?(
              <div style={{fontSize:"0.66rem",color:C.textDim,marginBottom:8}}>競合なし。空欄は吸収側の値で補完されます。</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                {plan.conflicts.map(c=>{
                  const key=ckey(c);
                  return (
                    <div key={key} style={{background:C.surfaceAlt,border:`1px solid ${C.yellow}`,borderRadius:5,padding:"7px 9px"}}>
                      <div style={{fontSize:"0.64rem",color:C.textDim,marginBottom:5}}>
                        {c.scope==="firm"?"Firm本体":`Plan「${c.planName}」`} ／ 項目: <b style={{color:C.textBright}}>{slotLabel(c.slotKey)}</b>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setResolve(p=>({...p,[key]:"keep"}))} style={{flex:1,textAlign:"left",background:resolve[key]==="keep"?C.green:"transparent",color:resolve[key]==="keep"?C.bg:C.text,border:`1px solid ${C.green}`,borderRadius:3,padding:"4px 7px",fontSize:"0.64rem",cursor:"pointer"}}>
                          <div style={{fontWeight:700,fontSize:"0.6rem",marginBottom:2}}>残す側</div>
                          <div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.keepText}</div>
                        </button>
                        <button onClick={()=>setResolve(p=>({...p,[key]:"absorb"}))} style={{flex:1,textAlign:"left",background:resolve[key]==="absorb"?C.blue:"transparent",color:resolve[key]==="absorb"?C.bg:C.text,border:`1px solid ${C.blue}`,borderRadius:3,padding:"4px 7px",fontSize:"0.64rem",cursor:"pointer"}}>
                          <div style={{fontWeight:700,fontSize:"0.6rem",marginBottom:2}}>吸収側</div>
                          <div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.absorbText}</div>
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{display:"flex",gap:6,justifyContent:"flex-end",borderTop:`1px solid ${C.border}`,paddingTop:10}}>
              <Btn color={C.textDim} onClick={()=>setPlan(null)} style={{fontSize:"0.7rem"}}>← 選び直す</Btn>
              <Btn color={C.purple} onClick={apply} style={{fontSize:"0.72rem",padding:"4px 14px"}}>統合を実行</Btn>
            </div>
            <div style={{marginTop:8,fontSize:"0.6rem",color:C.textDim,lineHeight:1.6}}>
              ※ 吸収側Firmは統合後に削除されます。実行直前に自動バックアップを取ります（💾から復元可）。<br/>
              ※ アーカイブ（保管テキスト）は重複を除いて両方ぶんを残します。
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════
function App() {
  // セクション
  const [sections,setSections]=useState([]);
  const [sessionName,setSessionName]=useState("");

  // 縦タブ（Firm→Plan階層）
  const [firms,setFirms]=useState([]);
  const [activeTabId,setActiveTabId]=useState("");
  const nextId=useRef(2);

  // アクティブがFirmかPlanか判定
  const activeType=useMemo(()=>{
    for(const f of firms){if(f.id===activeTabId)return"firm";for(const p of(f.plans||[]))if(p.id===activeTabId)return"plan"}return"firm";
  },[firms,activeTabId]);

  // 各タブのデータ { [tabId]: { archives:[], targetText:"", slotData:{} } }
  // templateModeはactiveTypeで自動決定（firm→dbp01/koryaku, plan→dbp02）
  const [tabDataMap,setTabDataMap]=useState({});

  // UI state
  const [rightMode,setRightMode]=useState("slots"); // slots | glossary
  const [translating,setTranslating]=useState(false);
  const [autoAssigning,setAutoAssigning]=useState(false);
  const [aiGenKoryaku,setAiGenKoryaku]=useState(false);
  const [slotLocks,setSlotLocks]=useState({}); // 明示ロックのみ保持。名前スロットは値が入った時点で自動ロック（isSlotLocked）
  const [showBackup,setShowBackup]=useState(false);
  const [showMerge,setShowMerge]=useState(false);
  const [showDataMenu,setShowDataMenu]=useState(false); // false | "save" | "load"
  const [toastMsg,setToastMsg]=useState("");
  const showToast=useCallback((msg)=>{setToastMsg(msg);setTimeout(()=>setToastMsg(""),2500)},[]);
  const [couponModal,setCouponModal]=useState({show:false,config:null,slug:""});
  const [consolidateKeepId,setConsolidateKeepId]=useState(null);
  const [activeSlotId,setActiveSlotId]=useState(null); // 選択中スロット
  const pasteAreaRef=useRef(null);
  const selectedTextRef=useRef("");

  // ── 自動保存（ドラフト）用 ──
  const DRAFT_KEY="pfm-intake-draft";
  const dirtyRef=useRef(false);          // ファイル出力後に変更があるか（離脱警告用）
  const draftBaselineRef=useRef(null);   // 直近ドラフトのシリアライズ値（実変更検出用）
  const draftRestoredRef=useRef(false);  // 起動時復元の二重実行防止
  const loadedIdsRef=useRef(new Set());  // 読込台帳：読込/前回保存時点のファーム+プランID（差分反映保存の基準）

  // 用語辞典（グローバル）— 正本65キーで初期化
  const [glossaryTerms,setGlossaryTerms]=useState(()=>GLOSSARY_SEED.map(t=>({...t})));
  const [glossaryGenerating,setGlossaryGenerating]=useState(false);

  const getTabData=useCallback(id=>tabDataMap[id]||{archives:[],targetText:"",slotData:{},templateMode:activeType==="plan"?"dbp02":"dbp01"},[tabDataMap,activeType]);
  const setTabField=useCallback((field,value)=>{
    setTabDataMap(prev=>{
      const cur=prev[activeTabId]||{archives:[],targetText:"",slotData:{},templateMode:activeType==="plan"?"dbp02":"dbp01"};
      return {...prev,[activeTabId]:{...cur,[field]:typeof value==="function"?value(cur[field]):value}};
    });
  },[activeTabId,activeType]);

  // 任意タブへのナビゲーション（クロスタブ遷移）
  // SlotPanel の Firm/価格/攻略/Plan/早見表 ボタンが現在のタブ種別に合わない場合に親Firm or 配下Planへ移動
  const navigateTab=useCallback((tabId,mode)=>{
    if(mode){
      setTabDataMap(prev=>{
        const cur=prev[tabId]||{archives:[],targetText:"",slotData:{},templateMode:mode};
        return {...prev,[tabId]:{...cur,templateMode:mode}};
      });
    }
    setActiveTabId(tabId);
  },[]);

  // handleAdd（選択中スロット用）
  const handleAdd=useCallback(()=>{
    if(!activeSlotId){alert("格納先スロットを選択してください");return}
    // 現在の生の選択を優先。スロットclick等で解除済みなら記憶した選択(selectedTextRef)を使う
    const live=window.getSelection()?.toString()?.trim();
    const sel=live||(selectedTextRef.current||"").trim();
    if(!sel){alert("取込エリアでテキストを選択してから ⇨ を押してください");return}
    setTabField("slotData",prev=>{
      const locked=isSlotLocked(slotLocks,prev,activeSlotId);
      if(locked)return prev;
      return{...prev,[activeSlotId]:[...(prev[activeSlotId]||[]).filter(f=>!f.merged),{text:sel}]};
    });
    selectedTextRef.current=""; // 連続誤格納防止：使ったら記憶をクリア
    // planList追加時にPlanタブ自動生成
    if(activeSlotId==="planList"&&activeType==="firm"){
      setTimeout(()=>syncPlansFromList(sel),100);
    }
  },[activeSlotId,setTabField,slotLocks,activeType,syncPlansFromList]);

  const td=getTabData(activeTabId);
  // Firm選択時はdbp01/koryaku、Plan選択時はdbp02のみ
  const availableTemplates=activeType==="firm"?[["dbp01","01"],["koryaku","攻略"]]:[["dbp02","02"]];
  // templateModeが不一致の場合補正
  useEffect(()=>{
    if(activeType==="plan"&&td.templateMode!=="dbp02")setTabField("templateMode","dbp02");
    if(activeType==="firm"&&td.templateMode==="dbp02")setTabField("templateMode","dbp01");
  },[activeTabId,activeType]);

  // firmNameスロット → Firmタブ名の自動同期
  useEffect(()=>{
    if(activeType!=="firm")return;
    const firmNameFrags=td.slotData?.firmName;
    if(!firmNameFrags||firmNameFrags.length===0)return;
    const merged=firmNameFrags.find(f=>f.merged);
    const newName=(merged?merged.text:firmNameFrags[0]?.text||"").trim();
    if(!newName)return;
    setFirms(prev=>prev.map(f=>f.id===activeTabId?{...f,name:newName}:f));
  },[activeTabId,activeType,td.slotData?.firmName]);

  // リサイズ
  const [vtabW,vtabDrag]=useResize(150,"x",80,300);
  const [leftW,leftDrag]=useResize(450,"x",250,800);
  const [pasteH,pasteDrag,setPasteH]=useResize(220,"y",100,580);

  const currentSlots=SLOT_DEFS[td.templateMode]||[];

  // postMessage受信
  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==="pfm-intake-paste"&&e.data.text&&pasteAreaRef.current){
        const ta=pasteAreaRef.current;
        const urlTag=e.data.url?` [${e.data.url}]`:"";
        ta.value+=(ta.value?"\n\n":"")+e.data.text+urlTag;
      }
      if(e.data?.type==="pfm-intake-ocr-image") handleOCRFromChild(e.data.base64,e.data.mediaType);
      // 早見表データ返信
      if(e.data?.type==="pfm-intake-get-quickref"&&e.source){
        const result=[];
        firms.forEach(firm=>{
          const firmSd=(tabDataMap[firm.id]||{}).slotData||{};
          const fgv=id=>{const fr=firmSd[id];if(!fr?.length)return"";const m=fr.find(f=>f.merged);return m?m.text:fr.map(f=>f.text).join("\n")};
          const price=fgv("priceTable");
          (firm.plans||[]).forEach(plan=>{
            const pd=tabDataMap[plan.id]||{};
            const sd=pd.slotData||{};
            const gv=id=>{const fr=sd[id];if(!fr?.length)return"";const m=fr.find(f=>f.merged);return m?m.text:fr.map(f=>f.text).join("\n")};
            const items=SLOT_DEFS.dbp02.filter(s=>s.section==="詳細").map(s=>({label:s.label,value:gv(s.id)}));
            result.push({firm:firm.name,plan:plan.name,fullName:firm.name+" - "+plan.name,items,priceTable:price});
          });
        });
        e.source.postMessage({type:"pfm-intake-quickref-data",plans:result},"*");
      }
    };
    window.addEventListener("message",h);return()=>window.removeEventListener("message",h);
  },[firms,tabDataMap]);

  const handleOCRFromChild=useCallback(async(b64,mt)=>{
    try{const data=await callAPI({model:MODEL,max_tokens:4000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt||"image/png",data:b64}},{type:"text",text:"画像テキスト抽出。テーブルはMarkdown。抽出のみ出力。"}]}]});if(pasteAreaRef.current)pasteAreaRef.current.value+=(pasteAreaRef.current.value?"\n\n--- OCR ---\n":"")+exText(data)}catch(e){if(pasteAreaRef.current)pasteAreaRef.current.value+="\nOCRエラー: "+e.message}
  },[]);

  // coupon-config.json に追記（Hugo出力先フォルダ経由）
  const saveCouponConfig=useCallback(async(slug,entry)=>{
    try{
      let dir=hugoDir;
      if(!dir){
        dir=await window.showDirectoryPicker({mode:"readwrite"});
        setHugoDir(dir);setHugoDirName(dir.name);
      }
      let existing={};
      try{
        const dataDir=await dir.getDirectoryHandle("data",{create:false});
        const cfgHandle=await dataDir.getFileHandle("coupon-config.json",{create:false});
        existing=JSON.parse(await (await cfgHandle.getFile()).text());
      }catch(e){}
      if(!existing[slug])existing[slug]={};
      existing[slug].coupon=entry;
      await writeHugoFile(dir,["data","coupon-config.json"],JSON.stringify(existing,null,2));
      setCouponModal(p=>({...p,show:false}));
      showToast(`✓ ${slug} — ${entry.lastCode||"セレクター"} を保存`);
    }catch(e){if(e.name!=="AbortError")showToast("✗ 保存エラー: "+e.message);}
  },[hugoDir,showToast]);

  // 貼り付けエリア展開（テキスト貼り付け時）
  const handlePasteExpand=useCallback(()=>setPasteH(520),[setPasteH]);
  // 取り込みエリア展開（反映・翻訳時）
  const handleTargetFocus=useCallback(()=>setPasteH(100),[setPasteH]);

  // 貼り付け→取り込み対象（そのまま）
  const handleSendToTarget=useCallback(text=>{setTabField("targetText",text);setPasteH(100)},[setTabField,setPasteH]);

  // 貼り付け→翻訳→取り込み対象
  const handleTranslateToTarget=useCallback(async text=>{
    setTranslating(true); setTabField("targetText","翻訳中..."); setPasteH(100);
    try{const data=await callAPI({model:MODEL,max_tokens:2000,system:"プロップファーム翻訳者。EN→JP。用語正確。テーブル保持。数値保持。翻訳のみ出力。",messages:[{role:"user",content:text}]});setTabField("targetText",exText(data))}
    catch(e){setTabField("targetText","翻訳エラー: "+e.message)}
    setTranslating(false);
  },[setTabField]);

  // 保管
  const handleArchive=useCallback(text=>{setTabField("archives",prev=>[...prev,text])},[setTabField]);
  const handleDeleteArchive=useCallback(idx=>{setTabField("archives",prev=>prev.filter((_,i)=>i!==idx))},[setTabField]);

  // Planタブ自動生成（planListから）
  const syncPlansFromList=useCallback((text)=>{
    if(!text||activeType!=="firm")return;
    
    // textが配列の場合は最初の要素を取得
    if(Array.isArray(text)){
      text=text[0];
    }
    
    // textが文字列でない場合は終了
    if(typeof text!=="string"||!text.trim())return;
    
    const names=text.split(/[、,\/／\n]/).map(s=>s.trim()).filter(Boolean);
    if(!names.length)return;
    const firm=firms.find(f=>f.id===activeTabId);
    if(!firm)return;
    
    // Firm名プレフィックスを除去してPlan名を抽出
    const prefix=firm.name+" - ";
    const planNames=names.map(n=>{
      // "FTMO - 100K Challenge" → "100K Challenge"
      if(n.startsWith(prefix)){
        return n.substring(prefix.length).trim();
      }
      // 既にPlan名のみの場合はそのまま
      return n;
    });
    
    const existingNames=(firm.plans||[]).map(p=>p.name);
    const newNames=planNames.filter(n=>!existingNames.includes(n));
    if(!newNames.length)return;
    const newPlans=newNames.map(n=>{
      const id="p"+String(nextId.current++);
      const fullName=firm.name+" - "+n;
      return{id,name:n,fullName};
    });
    setFirms(p=>p.map(f=>f.id===activeTabId?{...f,plans:[...(f.plans||[]),...newPlans.map(({id,name})=>({id,name}))]}:f));
    setTabDataMap(p=>{
      const next={...p};
      newPlans.forEach(pl=>{next[pl.id]={archives:[],targetText:"",slotData:{challengeName:[{text:pl.fullName}]},templateMode:"dbp02"}});
      return next;
    });
  },[firms,activeTabId,activeType]);

  // 自動振り分け
  const handleAutoAssign=useCallback(async text=>{
    if(!text)return;setAutoAssigning(true);
    try{
      // 現在のタブ名を取得
      let currentName="";
      let contextInfo="";
      if(activeType==="firm"){
        const firm=firms.find(f=>f.id===activeTabId);
        currentName=firm?.name||"";
        contextInfo=`対象Firm: ${currentName}\nこのFirmの情報のみ抽出してください。他のFirmやプランの情報が混在している場合は除外。`;
      } else {
        const parentFirm=firms.find(f=>(f.plans||[]).some(pl=>pl.id===activeTabId));
        const plan=parentFirm?.plans?.find(pl=>pl.id===activeTabId);
        currentName=plan?.name||"";
        const firmName=parentFirm?.name||"";
        contextInfo=`対象Firm: ${firmName}\n対象Plan: ${currentName}（${firmName} - ${currentName}）\nこのプランの情報のみ抽出してください。他のプランの情報が混在している場合は除外。複数プランの比較表から該当プランの列だけ抽出。`;
      }
      // MASTER_DEFS から definition を併用し、各スロットに「何が入るべきか」を明示
      const _defByIdAA = {};
      [...MASTER_DEFS.dbp01, ...MASTER_DEFS.dbp02].forEach(d=>{_defByIdAA[d.id]=d.definition||""; if(d.extra) _defByIdAA[d.extra.id||d.id+"_b"]=d.extra.definition||""});
      const _typeOf = id => {
        if(id==="planList") return "プラン名リスト（カンマ区切り）";
        if(NUM_IDS.has(id)) return "数値型（数値+単位。%/日/$等）";
        if(LOSSTYPE_IDS.has(id)) return `DD計算基準タイプ（${ddTypesStr(glossaryTerms)}）`;
        if(id==="rd_prohibited") return "禁止行為（C列=名称列挙 / 詳細列=各禁止行為を「名称：説明」形式で全件記載）";
        if(id&&id.startsWith("rd_")) return "ルール（C|F|差分|詳細 形式）";
        return "自由テキスト";
      };
      const slotList=currentSlots.map(s=>{
        const def=_defByIdAA[s.id]||"";
        return `"${s.id}": [${s.section}] ${s.label}\n   型: ${_typeOf(s.id)}\n   ヒント: ${s.hint||"—"}${def?"\n   定義: "+def:""}`;
      }).join("\n");
      const data=await callAPI({model:MODEL,max_tokens:4000,
        system:`あなたはプロップファーム情報の分類エンジンです。入力テキストから「${currentName}」に関する情報のみを抽出し、用語辞典の表記に従って各スロットに振り分けてください。

${contextInfo}

${glossaryRulesBlock(glossaryTerms)}

■ スロット一覧（"id" / 型 / ヒント / 定義）
${slotList}

■ 入力テキストの形式
入力はタブ区切りテーブル、パイプ区切りテーブル、箇条書き、自由テキストのいずれかです。
テーブルの場合、項目名列の値をスロットの「ラベル」または「定義」とマッチングして抽出してください。
「項目 Challenge Funded 差分」のヘッダー行がある場合はそれに従って値を抽出。

■ 格納ルール（全スロット共通）
1. 入力テキストに該当情報がある項目のみ格納する。情報がない項目はJSONキーごと省略（「記載なし」キーを作らない）
2. 他のプラン・Firmの情報は絶対に混入させない
3. 日本語に翻訳してから格納（用語辞典の表記に準拠）
4. 数値・%・$はそのまま保持。数値型スロットには必ず単位を付与

  const handleTableParse=useCallback(text=>{

    const parseRow=line=>{const c=line.split("|").map(c=>c.trim());if(c[0]==="")c.shift();if(c[c.length-1]==="")c.pop();return c;};
    const allLines=text.split("\n").map(l=>l.trim()).filter(l=>l);
    const tableLines=allLines.filter(l=>l.startsWith("|"));

    // ── 行区切りフォーマット（|なし）: 「Steps\n2\nー\nー\n詳細」形式 ──
    if(!tableLines.length){
      const hasPKey=allLines.some(l=>/^P\d+[a-z]*[:.：.]/.test(l)||l==="Steps");
      if(!hasPKey){alert("表形式（|区切り）が見つかりませんでした");return;}

      const updates={};let stored=0;const skipped=[];
      let i=0;
      while(i<allLines.length){
        const line=allLines[i];
        // アイテム行の判定: "Steps" or "P01: 利益目標" 形式
        const isItem=line==="Steps"||/^P\d+[a-z]*[:.：]/.test(line);
        if(!isItem){i++;continue;}
        const label=line==="Steps"?"Steps":stripP(line.includes(":")?line.split(":").slice(1).join(":").trim():line);
        const C=(allLines[i+1]||"—").trim();
        const F=(allLines[i+2]||"—").trim();
        const diff=(allLines[i+3]||"—").trim();
        const detail=(allLines[i+4]||"").trim();
        const id=ltId[label];
        if(!id){skipped.push(label);i+=5;continue;}
        if(slotLocks[id]){i+=5;continue;}
        if(id==="steps"){
          updates[id]=C;
        } else if(label==="最低取引日数（出金）"&&updates["rd_minDays"]){
          const prev=updates["rd_minDays"].split("|");

          updates["rd_minDays"]=`${prev[0]||"—"}|${F}|${diff}|${prevDetail&&detail?prevDetail+" / "+detail:prevDetail||detail}`;
        } else {
          updates[id]=`${C}|${F}|${diff}|${detail}`;
        }
        stored++;i+=5;
      }
      if(!stored){alert("P01: 〜 形式の行が見つかりませんでした");return;}
      let locked=0;
      setTabField("slotData",prev=>{
        const next={...prev};
        for(const[id,val]of Object.entries(updates)){
          if(slotLocks[id]){locked++;continue;}
          next[id]=[...(prev[id]||[]),{text:val}];
        }
        return next;
      });
      alert(`表取込（行区切り）: ${stored}項目を格納`+(locked?`（ロック${locked}件スキップ）`:"")+(skipped.length?`\n未照合: ${skipped.join(", ")}`:""));
      return;
    }

    // 埋込形式: プラン比較テーブル内の「下半分: 口座サイズ × 価格表」マーカー以降
    const extractPriceRows=()=>{
      let planCols=null,startIdx=-1;
      const stdIdx=tableLines.findIndex(l=>{const h=parseRow(l);return h[0]==="口座サイズ"||h[0]==="口座サイズ（USD）";});
      if(stdIdx>=0){

      } else {

        const markerIdx=tableLines.findIndex(l=>/口座サイズ\s*[×x]\s*価格表/.test(l.replace(/\*/g,"")));
        if(markerIdx<0)return null;
        let hi=-1;
        for(let i=markerIdx;i>=0;i--){const h=parseRow(tableLines[i]);if(h[0]&&h[0].replace(/\*/g,"").trim()==="項目"){hi=i;break;}}
        if(hi<0)return null;
        planCols=parseRow(tableLines[hi]).slice(1);
        startIdx=markerIdx+1;
      }
      const rows=[];
      for(let i=startIdx;i<tableLines.length;i++){
        const cells=parseRow(tableLines[i]);
        if(!cells.length)continue;
        const size=cells[0].replace(/\*/g,"").trim();

        const id=F_KEY_MAP[fkey];

        const val=(cells[2]||cells[1]||"").trim(); // 3列目（内容）優先、2列目フォールバック
        if(!val||val==="記載なし"||val==="—")return; // 空・記載なしはスキップ
        updates[id]=val;stored++;
      });
      const priceOK=priceTable&&!slotLocks["priceTable"];
      if(!stored&&!priceOK){alert("F01〜F22 形式の行が見つかりませんでした");return;}
      let locked=0;
      setTabField("slotData",prev=>{
        const next={...prev};
        for(const[id,val]of Object.entries(updates)){
          if(slotLocks[id]){locked++;continue;}
          next[id]=[...(prev[id]||[]),{text:val}]; // 追記（置換ではなく）
        }
        if(priceOK)next.priceTable=[{text:JSON.stringify({rows:priceTable.rows,planCols:priceTable.planCols})}];
        return next;
      });
      alert(`Firm取込: ${stored}項目を格納`+(priceOK?` ／ 価格テーブル: ${priceTable.rows.length}行×${priceTable.planCols.length}プラン`:"")+(locked?`（ロック${locked}件スキップ）`:"")+(skipped.length?`\n未対応キー: ${skipped.join(", ")}`:""));
      return;
    }
    // 通常の rd_* 取込（「項目|C|F|差分|詳細」形式）
    const labelToId={};
    SLOT_DEFS.dbp02.filter(s=>s.section==="詳細").forEach(s=>{labelToId[s.label]=s.id;});
    labelToId["Steps"]="steps";

    labelToId["最低取引日数"]="rd_minDays";
    labelToId["最低取引日数（合格）"]="rd_minDays";
    labelToId["最低取引日数（出金）"]="rd_minDays";
    // P-key プレフィックスを除去: "P01. 利益目標" / "P01: 利益目標" → "利益目標"
    const stripPKey=s=>s.replace(/^P\d+[a-z]*[:：.．]\s*/,"").trim();
    const updates={};let stored=0;const skipped=[];

        const prev=updates["rd_minDays"].split("|");
        const newF=(cells[2]||"—").trim();
        const newDiff=(cells[3]||"—").trim();
        const newDetail=cells.slice(4).join("|").trim();
        const prevDetail=prev.slice(3).join("|").trim();
