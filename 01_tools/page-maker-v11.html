async function callAPI(body) {
  for (let attempt = 0; attempt <= 3; attempt++) {
    const resp = await fetch(LLM_PROXY, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify(body),
    });
    if (resp.status === 429) { await new Promise(r => setTimeout(r, 5000*(attempt+1))); continue; }
    if (!resp.ok) {
      let detail="";
      try{ const j=await resp.json(); detail=j?.error?.message||j?.error||JSON.stringify(j); }catch(_){ try{detail=await resp.text();}catch(__){} }
      throw new Error(`HTTP ${resp.status}${detail?" — "+detail:""}`);
    }
    return await resp.json();
  }
}
function exText(r) { return (r.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(""); }

function exportJSON(data,fn) {
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"})); a.download=fn; a.click();
}
function importJSON(cb) {
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.style.position="fixed"; inp.style.opacity="0"; inp.style.top="-100px";
  document.body.appendChild(inp);
  inp.onchange=e=>{
    const f=e.target.files?.[0];
    document.body.removeChild(inp);
    if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{cb(JSON.parse(r.result))}catch(err){alert("JSONパースエラー: "+err.message)}};
    r.onerror=()=>alert("ファイル読み込みエラー");
    r.readAsText(f);
  };
  inp.click();
}

// ─── Hugo出力ヘルパー ────────────────────────────────────────────
function slugify(str){
  return(str||"").toLowerCase().replace(/\s+/g,"-").replace(/[^\w\-]/g,"").replace(/--+/g,"-").replace(/^-+|-+$/g,"");
}
function getSlotText(sd,key){
  const arr=sd?.[key];
  if(!arr||arr.length===0)return"";
  const m=arr.find(f=>f.merged);
  return(m?m.text:arr.map(f=>f.text||"").join("\n")).trim();
}
async function writeHugoFile(dirHandle,pathParts,content){
  let cur=dirHandle;
  for(let i=0;i<pathParts.length-1;i++)cur=await cur.getDirectoryHandle(pathParts[i],{create:true});
  const fh=await cur.getFileHandle(pathParts[pathParts.length-1],{create:true});
  const w=await fh.createWritable();await w.write(content);await w.close();
}

// マージ（2台のデータ統合）
// ═══════════════════════════════════════════════════
// 現在のIDの最大採番値を求める（f12/p34 → 34）
function maxNumId(firms){
  let mx=0;
  (firms||[]).forEach(f=>{
    const fn=parseInt(String(f.id).replace(/\D/g,""))||0; if(fn>mx)mx=fn;
    (f.plans||[]).forEach(p=>{const pn=parseInt(String(p.id).replace(/\D/g,""))||0; if(pn>mx)mx=pn});
  });
  return mx;
}
// incoming(ファイル側)のFirmを、base(現在)と突き合わせて衝突計画を作る
// 返り値: { autoAdd:[firm...], conflicts:[{name, base:{firm}, incoming:{firm}}], glossaryAdd:[term...] }
function planMerge(base, incoming){
  const baseFirms=base.firms||[];
  const baseByName=new Map(baseFirms.map(f=>[f.name,f]));
  const autoAdd=[]; const conflicts=[];
  (incoming.firms||[]).forEach(inf=>{
    const hit=baseByName.get(inf.name);
    if(!hit){ autoAdd.push(inf); }
    else { conflicts.push({name:inf.name, base:hit, incoming:inf}); }
  });
  // 用語辞典: key重複は除外して追加分のみ
  const baseKeys=new Set((base.glossaryTerms||[]).map(t=>t.key).filter(Boolean));
  const glossaryAdd=(incoming.glossaryTerms||[]).filter(t=>t.key&&!baseKeys.has(t.key));
  return {autoAdd, conflicts, glossaryAdd};
}
// incoming側Firmを取り込む際、ID衝突を避けて採番し直し、tabDataもキー付け替えして返す
// 返り値: { firm:{新ID,plans...}, tabEntries:{newId:tabData,...}, nextCounter }
function reidFirm(inf, incomingTabMap, startCounter){
  let c=startCounter;
  const newFid="f"+String(c++);
  const tabEntries={};
  const oldFid=inf.id;
  const newPlans=(inf.plans||[]).map(p=>{
    const newPid="p"+String(c++);
    const oldTab=incomingTabMap[p.id];
    if(oldTab)tabEntries[newPid]=JSON.parse(JSON.stringify(oldTab));
    return {id:newPid,name:p.name};
  });
  const oldFirmTab=incomingTabMap[oldFid];
  if(oldFirmTab)tabEntries[newFid]=JSON.parse(JSON.stringify(oldFirmTab));
  const firm={id:newFid,name:inf.name,plans:newPlans};
  if(inf.pinned)firm.pinned=true;
  return {firm, tabEntries, nextCounter:c};
}

// Firm統合（同名2箱を1つに寄せる）
// ═══════════════════════════════════════════════════
// slotDataを項目単位でマージ。
//  - 片方だけ値あり → 値ある方を採用
//  - 両方値ありで内容同じ → そのまま
//  - 両方値ありで内容違う → conflictとして記録（既定keep=残す側）
// 返り値: {merged, conflicts:[{scope,planName,slotKey,keepText,absorbText}]}
function slotTextOf(arr){
  if(!Array.isArray(arr))return "";
  return arr.map(x=>(x&&x.text!=null)?String(x.text):"").join("").trim();
}
function mergeSlotData(keepSD, absorbSD, scope, planName){
  const merged={...(keepSD||{})};
  const conflicts=[];
  // 名称系（Firm名/Challenge名）は常に残す側を優先し、競合に出さない
  const NAME_KEYS=new Set(["firmName","challengeName"]);
  const allKeys=new Set([...Object.keys(keepSD||{}),...Object.keys(absorbSD||{})]);
  allKeys.forEach(k=>{
    const kt=slotTextOf(keepSD?.[k]);
    const at=slotTextOf(absorbSD?.[k]);
    if(!kt&&at){ merged[k]=absorbSD[k]; }            // 残す側が空 → 吸収側で埋める
    else if(kt&&at&&kt!==at){                         // 両方あって違う
      if(NAME_KEYS.has(k))return;                     // 名称系は残す側のまま（競合扱いしない）
      conflicts.push({scope,planName,slotKey:k,keepText:kt,absorbText:at,keepVal:keepSD[k],absorbVal:absorbSD[k]});
    }
    // それ以外（残す側のみ／同一）は残す側のまま
  });
  return {merged,conflicts};
}
// keepFirm に absorbFirm を吸収する計画を作る（実適用は別関数）
// Planは名前で突合。重複しないPlanはkeepへ移動、同名Planはslot/archiveをマージ。
function planFirmConsolidation(keepFirm, absorbFirm, tabDataMap){
  const conflicts=[];
  // Firm本体スロット
  const keepFirmSD=tabDataMap[keepFirm.id]?.slotData||{};
  const absorbFirmSD=tabDataMap[absorbFirm.id]?.slotData||{};
  const firmMerge=mergeSlotData(keepFirmSD,absorbFirmSD,"firm",keepFirm.name);
  conflicts.push(...firmMerge.conflicts);

  const keepPlansByName=new Map((keepFirm.plans||[]).map(p=>[p.name,p]));
  const planActions=[]; // {type:'merge'|'move', keepPlan?, absorbPlan, slotConflicts?}
  (absorbFirm.plans||[]).forEach(ap=>{
    const kp=keepPlansByName.get(ap.name);
    if(kp){
      const kSD=tabDataMap[kp.id]?.slotData||{};
      const aSD=tabDataMap[ap.id]?.slotData||{};
      const m=mergeSlotData(kSD,aSD,"plan",ap.name);
      conflicts.push(...m.conflicts);
      planActions.push({type:"merge",keepPlan:kp,absorbPlan:ap});
    }else{
      planActions.push({type:"move",absorbPlan:ap});
    }
  });
  return {conflicts,planActions,firmMerge};
}

function getPlanNames(firmId, firms, tabDataMap) {
  const firm = firms.find(f => f.id === firmId);
  
  // A. 既存Planタブから取得
  if (firm?.plans?.length > 0) {
    return firm.plans.map(p => p.name).filter(Boolean);
  }
  
  // B. planListスロットから取得
  const firmData = tabDataMap[firmId];
  const planListSlot = firmData?.slotData?.planList;
  if (planListSlot?.length > 0) {
    const merged = planListSlot.find(f => f.merged);
    let text = merged ? merged.text : planListSlot[0]?.text || "";
    
    // textが配列の場合は最初の要素を取得
    if (Array.isArray(text)) {
      text = text[0] || "";
    }
    
    // textが文字列であることを確認
    if (typeof text === 'string' && text) {
      return text.split(/[,、\n]/).map(s => s.trim()).filter(Boolean);
    }
  }
  
  // C. 未登録
  return null;
}

function getFirmName(firmId, tabDataMap) {
  const firmData = tabDataMap[firmId];
  const firmNameSlot = firmData?.slotData?.firmName;
  if (firmNameSlot?.length > 0) {
    const merged = firmNameSlot.find(f => f.merged);
    return merged ? merged.text : firmNameSlot[0]?.text || "";
  }
  return "";
}

function generateResearchPrompt(firmId, firms, tabDataMap, glossaryTerms) {
  const firmName = getFirmName(firmId, tabDataMap) || "[ファーム名]";
  const planNames = getPlanNames(firmId, firms, tabDataMap);

  let prompt = `チェック対象ファーム: ${firmName}\n\n`;

  if (planNames && planNames.length > 0) {
    prompt += `【対象プラン一覧】\n`;
    planNames.forEach(name => {
      prompt += `- ${name}\n`;
    });
    prompt += `\n`;
  }

  const firmLines = glossaryItemLines(glossaryTerms, "Firm項目");
  const planLines = glossaryItemLines(glossaryTerms, "Plan項目");

  prompt += `--- Firm情報 ---
${firmLines}

--- Plan情報${planNames ? "・上記全プラン分" : ""} ---
${planLines}

上記の項目を公式サイトから収集してください。`;

  return prompt;
}

function generateKoryakuPrompt(firmId, firms, tabDataMap, SLOT_DEFS, glossaryTerms) {
  const firmName = getFirmName(firmId, tabDataMap) || "[ファーム名]";
  const planNames = getPlanNames(firmId, firms, tabDataMap);

      if (!planData) return;

        const slotData = planData.slotData?.[slot.id];

        const merged = slotData.find(f => f.merged);

// 用語辞典 参照ヘルパ（プロンプト生成が辞典を単一情報源として参照）
// 辞典を直せばプロンプトの表記ルールも自動で変わる
// ═══════════════════════════════════════════════════
function glossaryRulesBlock(glossaryTerms) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  const byKey = {};
  T.forEach(t => { if (t.key) byKey[t.key] = t; });
  const term = k => (byKey[k]?.term) || "";
  const catTerms = cat => T.filter(t => t.category === cat).map(t => t.term);

  const dd = catTerms("DD計算基準").join(" / ");
  const phase = `${term("PHASE_C")} / ${term("PHASE_F")}`;
  const diff = catTerms("早見表差分").filter((v,i,a)=>a.indexOf(v)===i).join(" / ");
  const freq = catTerms("出金頻度").join(" / ");

  return `【用語辞典（厳守・正本）】
この辞典の表記を唯一の正本とする。出力は必ず下記の表記に統一すること。

■ フェーズ名称（統一変換）
- ${phase} のみを使用。Evaluation／Assessment／Phase／Step／Master／Live／Funded Account／Real Account 等の表記は全て ${term("PHASE_C")}／${term("PHASE_F")} に変換する。

■ DD計算基準（この6表記のみ）
- ${dd}
- 括弧は全角（）。リセット時刻・計算詳細は補足注記に記載しテーブルの基準列には書かない。

■ 不在表記（厳密に区別）
- ${term("ABS_NONE")}: ソースに「なし」と明記されている（条件が存在しないと断定できる）
- ${term("ABS_NA")}: 該当項目自体が構造上適用されない（全角ハイフン）
- ${term("ABS_UNKNOWN")}: 一次ソースに記述がない。絵文字は付けない。「${term("ABS_NA")}」と混同しない。

■ 最低取引日数の表記（全角括弧）
- 合格要件: ${term("P02")}
- 出金要件: ${term("P02b")}

■ 早見表の差分判定
- ${diff}（EASE=Funded側が緩い／TRAP=Funded側が厳しい）

■ 出金頻度
- ${freq}
`;
}

// 辞典のlabelから項目リスト行を動的生成（カテゴリ指定）
function glossaryItemLines(glossaryTerms, category) {
  const T = Array.isArray(glossaryTerms) && glossaryTerms.length ? glossaryTerms : GLOSSARY_SEED;
  return T.filter(t => t.category === category && t.key)
    .map(t => `${t.key}. ${t.term}${t.definition ? " — " + t.definition : ""}`)
    .join("\n");
}

function Btn({children,onClick,color,bg,disabled,title,style:sx}) {
  return <button onClick={onClick} disabled={disabled} title={title} style={{
    background:bg||"transparent",color:color||C.accent,border:`1px solid ${color||C.accent}`,
    borderRadius:3,padding:"2px 8px",fontSize:"0.68rem",fontWeight:700,cursor:disabled?"wait":"pointer",opacity:disabled?0.5:1,...sx
  }}>{children}</button>;
}
function CopyBtn({text,label,color,getText,style:sx}) {
  const [ok,set]=useState(false);
  const handleCopy=()=>{
    const t=getText?getText():text;
    if(!t){alert(label+" : データなし");return;}
    try{navigator.clipboard.writeText(t).then(()=>{set(true);setTimeout(()=>set(false),1500)}).catch(()=>{
      // fallback
      const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);set(true);setTimeout(()=>set(false),1500);
    })}catch(e){
      const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);set(true);setTimeout(()=>set(false),1500);
    }
  };
  return <Btn color={color} onClick={handleCopy} style={sx}>{ok?"✓":label||"Copy"}</Btn>;
}

// ── リサイズハンドル ──
function useResize(initial,dir,min,max) {
  const [size,setSize]=useState(initial);
  const dragging=useRef(false);
  const startPos=useRef(0);
  const startSize=useRef(0);

  const onMouseDown=useCallback(e=>{
    e.preventDefault();
    dragging.current=true;
    startPos.current=dir==="x"?e.clientX:e.clientY;
    startSize.current=size;
    const onMove=ev=>{
      if(!dragging.current)return;
      const delta=(dir==="x"?ev.clientX:ev.clientY)-startPos.current;
      setSize(Math.max(min,Math.min(max,startSize.current+delta)));
    };
    const onUp=()=>{dragging.current=false;document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp)};
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  },[size,dir,min,max]);

  return [size,onMouseDown,setSize];
}

function ResizeHandle({dir,onMouseDown}) {
  const isH=dir==="x";
  return (
    <div onMouseDown={onMouseDown} style={{
      [isH?"width":"height"]:6,[isH?"height":"width"]:"100%",
      cursor:isH?"col-resize":"row-resize",background:"transparent",
      flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
      zIndex:10,
    }}>
      <div style={{[isH?"width":"height"]:2,[isH?"height":"width"]:"30%",background:C.borderLight,borderRadius:1}} />
    </div>
  );
}

// ═══════════════════════════════════════════════════
// 縦タブ（Firm→Plan階層）
// ═══════════════════════════════════════════════════
function VerticalTabs({firms,activeId,onSelect,onAddFirm,onAddPlan,onDelete,onRename,width,onBulkImport,onReorder,tabDataMap,glossaryTerms,onMergeFirm,onDeleteMany,onTogglePin}) {
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState("");
  const [collapsed,setCollapsed]=useState({});
  const [showImport,setShowImport]=useState(false);
  const [csvText,setCsvText]=useState("");
  const [dragId,setDragId]=useState(null);
  const [checked,setChecked]=useState({}); // {firmId:true}
  const [copied,setCopied]=useState(false);

  const checkedIds=firms.filter(f=>checked[f.id]).map(f=>f.id);
  const checkedCount=checkedIds.length;
  const allChecked=firms.length>0&&checkedCount===firms.length;
  const toggleAll=()=>{
    if(allChecked)setChecked({});
    else{const n={};firms.forEach(f=>{n[f.id]=true});setChecked(n);}
  };
  const clearChecks=()=>setChecked({});

  // ピン済みを上に、非ピンを下に（各グループ内は配列順を保持）
  const orderedFirms=[...firms.filter(f=>f.pinned),...firms.filter(f=>!f.pinned)];
  const lastPinnedId=(()=>{const ps=firms.filter(f=>f.pinned);return ps.length?ps[ps.length-1].id:null;})();

  // 選択Firmを階層テキストでコピー
  const copyChecked=()=>{
    const targets=firms.filter(f=>checked[f.id]);
    if(!targets.length)return;
    const text=targets.map(f=>{
      const head=getFirmName(f.id,tabDataMap)||f.name||"（未命名）";
      const planNames=getPlanNames(f.id,firms,tabDataMap)||(f.plans||[]).map(p=>p.name);
      const plans=(planNames||[]).filter(Boolean).map(n=>`  - ${n}`);
      return plans.length?`${head}\n${plans.join("\n")}`:head;
    }).join("\n\n");
    const done=()=>{setCopied(true);setTimeout(()=>setCopied(false),1500)};
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{
        const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
      });
    }else{
      const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
    }
  };

  // 選択Firmをまとめて削除
  const deleteChecked=()=>{
    if(!checkedCount)return;
    if(!window.confirm(`${checkedCount} 件のFirmを削除しますか？（含まれるPlan・データも削除されます）`))return;
    onDeleteMany&&onDeleteMany(checkedIds);
    setChecked({});
  };

  // 選択Firmの全Planを対象にDBP_02出力プロンプトを生成
  const [planCopied,setPlanCopied]=useState(false);
  const copyPlanOutput=()=>{
    const targets=firms.filter(f=>checked[f.id]);
    if(!targets.length)return"";
    const planItems=glossaryItemLines(glossaryTerms,"Plan項目");
    const blocks=targets.map(f=>{
      const firmName=getFirmName(f.id,tabDataMap)||f.name||"（未命名）";
      const planNames=getPlanNames(f.id,firms,tabDataMap)||(f.plans||[]).map(p=>p.name);
      const plans=(planNames||[]).filter(Boolean);
      const planLine=plans.length?plans.map(n=>`- ${n}`).join("\n"):"（プラン未登録 — 公式サイトから全プランを収集すること）";
      return`【対象ファーム】${firmName}\n【対象プラン】\n${planLine}`;
    }).join("\n\n");
    const text=`${blocks}\n\n${glossaryRulesBlock(glossaryTerms)}\n\nNotebookLMソース定義のDBP_02セクションに従い、上記の各プランについて以下を出力してください:\n\n--- Plan項目 ---\n${planItems}\n\n- テーブル1: ルール早見表（Challenge / Funded / 差分の3列。差分はEASE/TRAP/ー）\n- テーブル2: ルール詳細リスト（P01〜P18は各200字以内の補足、P19=禁止行為は2列テーブル）\n\n各テーブルには見出し・説明文・本体・補足注記（必要時）を含めること。プランごとに上記2テーブルを出力すること。`;
    const done=()=>{setPlanCopied(true);setTimeout(()=>setPlanCopied(false),1500)};
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>{
        const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
      });
    }else{
      const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done();
    }
  };

  const handleImport=()=>{
    const lines=csvText.trim().split("\n").filter(l=>l.trim());
    if(!lines.length)return;
    const data=lines.map(line=>{
      const parts=line.split(",").map(s=>s.trim().replace(/^"|"$/g,""));
      return{firmName:parts[0]||"",plans:parts.slice(1).filter(Boolean)};
    });
    onBulkImport(data);
    setCsvText("");setShowImport(false);
  };

  const renderEdit=(id)=>(
    <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
      onBlur={()=>{onRename(id,editName);setEditId(null)}}
      onKeyDown={e=>{if(e.key==="Enter"){onRename(id,editName);setEditId(null)}}}
      onClick={e=>e.stopPropagation()}
      style={{width:"100%",background:C.bg,color:C.textBright,border:`1px solid ${C.accent}`,borderRadius:3,padding:"1px 4px",fontSize:"0.72rem",fontFamily:font,outline:"none"}} />
  );

  return (
    <div style={{width,flexShrink:0,background:C.surface,overflow:"auto",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"8px 6px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:3}}>
        <span style={{fontSize:"0.72rem",fontWeight:700,color:C.accent}}>Firms</span>
        <div style={{display:"flex",gap:2}}>
          <Btn color={C.blue} onClick={()=>setShowImport(!showImport)} style={{padding:"1px 5px",fontSize:"0.6rem"}}>CSV</Btn>
          <Btn color={C.accent} onClick={onAddFirm} style={{padding:"1px 6px",fontSize:"0.75rem"}}>＋</Btn>
        </div>
      </div>
      {/* 選択操作バー */}
      {firms.length>0&&(
        <div style={{padding:"4px 6px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6,background:checkedCount?C.surfaceAlt:"transparent"}}>
          <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:"0.62rem",color:C.textDim}}>
            <input type="checkbox" checked={allChecked} onChange={toggleAll} style={{cursor:"pointer",accentColor:C.accent}} />
            {checkedCount?`${checkedCount} 件選択`:"全選択"}
          </label>
          <div style={{flex:1}} />
          {checkedCount>0&&(
            <React.Fragment>
              <Btn color={C.accent} onClick={copyChecked} style={{padding:"1px 7px",fontSize:"0.6rem"}}>{copied?"✓":"コピー"}</Btn>
              <Btn color={C.blue} onClick={copyPlanOutput} style={{padding:"1px 7px",fontSize:"0.6rem"}}>{planCopied?"✓":"📄 Plan出力"}</Btn>
              <Btn color={C.red} onClick={deleteChecked} style={{padding:"1px 7px",fontSize:"0.6rem"}}>削除</Btn>
            </React.Fragment>
          )}
        </div>
      )}
      {/* プロンプト生成ボタン（Firm選択時のみ表示） */}
      {activeId && firms.some(f => f.id === activeId) && (
        <div style={{padding:"6px",borderBottom:`1px solid ${C.border}`,background:C.surfaceAlt,display:"flex",gap:3,flexWrap:"wrap"}}>
          <CopyBtn 
            getText={() => generateResearchPrompt(activeId, firms, tabDataMap, glossaryTerms)}
            label="📋 リサーチ"
            color={C.purple}
            style={{flex:1,fontSize:"0.6rem",padding:"3px 6px"}}
          />
          <CopyBtn 
            getText={() => {
              if(!firms||firms.length===0)return"";
              const firm = firms.find(f => f.id === activeId);
              if(!firm)return"";
              const firmName = getFirmName(activeId, tabDataMap) || firm.name || "[ファーム名]";
              const planNames = getPlanNames(activeId, firms, tabDataMap) || [];
              const planBlock = planNames.length>0
                ? `【対象プラン一覧】\n${planNames.map(p=>`- ${p}`).join("\n")}`
                : `【対象プラン一覧】\n（プラン未登録 — 公式サイトから全プランを収集すること）`;
              const firmItems = glossaryItemLines(glossaryTerms, "Firm項目");
              return`【対象ファーム】${firmName}\n\n${planBlock}\n\n${glossaryRulesBlock(glossaryTerms)}\n\nNotebookLMソース定義のDBP_01セクションに従い、以下を出力してください:\n\n--- Firm情報 ---\n${firmItems}\n\n- テーブル1: 価格テーブル（各プランの口座サイズ別価格）\n- テーブル2: Firm基本情報\n- テーブル3: レバレッジ\n- テーブル4: 手数料\n- テーブル5: プラン比較テーブル\n\n各項目・各テーブルには見出し・説明文・本体・補足注記（必要時）を含めること。価格テーブルの実体はFirm単位で保持し、各プラン記事はこれを参照する。`;
            }}
            label="📤 出力"
            color={C.blue}
            style={{flex:1,fontSize:"0.6rem",padding:"3px 6px"}}
          />
          <CopyBtn 
            getText={() => generateKoryakuPrompt(activeId, firms, tabDataMap, SLOT_DEFS, glossaryTerms)}
            label="📝 攻略"
            color={C.green}
            style={{flex:1,fontSize:"0.6rem",padding:"3px 6px"}}
          />
        </div>
      )}
      {showImport&&(
        <div style={{padding:"6px",borderBottom:`1px solid ${C.border}`,background:C.surfaceAlt}}>
          <textarea value={csvText} onChange={e=>setCsvText(e.target.value)}
            placeholder={"Firm名,Plan名,Plan名,...\nFirm名,Plan名\n..."}
            style={{width:"100%",height:50,background:C.bg,color:C.text,border:`1px solid ${C.blue}`,borderRadius:3,padding:4,fontSize:"0.65rem",fontFamily:font,resize:"vertical",outline:"none"}} />
          <Btn color={C.blue} onClick={handleImport} style={{marginTop:3,fontSize:"0.62rem"}}>一括登録</Btn>
        </div>
      )}
      {orderedFirms.map((firm)=>(
        <div key={firm.id}>
          {/* ピン境界線 */}
          {firm.id===lastPinnedId&&(
            <div style={{height:0,borderBottom:`2px solid ${C.yellow}44`}} />
          )}
          {/* Firm行 */}
          <div onClick={()=>onSelect(firm.id)}
            onDragOver={e=>{e.preventDefault()}}
            onDrop={e=>{e.preventDefault();if(dragId!==null&&dragId!==firm.id){onReorder(dragId,firm.id);setDragId(null)}}}
            style={{
            padding:"6px 8px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,
            background:activeId===firm.id?C.accentDim:(dragId===firm.id?C.borderLight:(firm.pinned?`${C.yellow}11`:"transparent")),
            borderLeft:activeId===firm.id?`3px solid ${C.accent}`:(firm.pinned?`3px solid ${C.yellow}66`:"3px solid transparent"),
          }}>
            {editId===firm.id?renderEdit(firm.id):(
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <input type="checkbox" checked={!!checked[firm.id]} onClick={e=>e.stopPropagation()}
                  onChange={e=>{e.stopPropagation();setChecked(p=>({...p,[firm.id]:e.target.checked}))}}
                  style={{cursor:"pointer",flexShrink:0,accentColor:C.accent}} />
                <span draggable onDragStart={e=>{e.stopPropagation();setDragId(firm.id)}} onClick={e=>e.stopPropagation()}
                  style={{fontSize:"0.7rem",color:C.textDim,cursor:"grab",flexShrink:0,userSelect:"none"}}>≡</span>
                <span onClick={e=>{e.stopPropagation();setCollapsed(p=>({...p,[firm.id]:!p[firm.id]}))}}
                  style={{fontSize:"0.6rem",color:C.textDim,cursor:"pointer",flexShrink:0}}>
                  {collapsed[firm.id]?"▶":"▼"}
                </span>
                <span onDoubleClick={e=>{e.stopPropagation();setEditId(firm.id);setEditName(firm.name)}} style={{
                  fontSize:"0.75rem",fontWeight:activeId===firm.id?700:400,
                  color:activeId===firm.id?C.accent:C.text,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,
                }}>{firm.name||"（未命名）"}</span>
                <span onClick={e=>{e.stopPropagation();onTogglePin&&onTogglePin(firm.id)}} title={firm.pinned?"ピンを外す":"上に固定"}
                  style={{fontSize:"0.66rem",cursor:"pointer",flexShrink:0,opacity:firm.pinned?1:0.35}}>📌</span>
                <span onClick={e=>{e.stopPropagation();onAddPlan(firm.id)}} title="プラン追加"
                  style={{color:C.blue,fontSize:"0.68rem",cursor:"pointer",flexShrink:0}}>＋</span>
                <span onClick={e=>{e.stopPropagation();onMergeFirm&&onMergeFirm(firm.id)}} title="他のFirmをこのFirmに統合"
                  style={{color:C.purple,fontSize:"0.66rem",cursor:"pointer",flexShrink:0}}>⤵</span>
                <span onClick={e=>{e.stopPropagation();onDelete(firm.id)}}
                  style={{color:C.red,fontSize:"0.62rem",cursor:"pointer",flexShrink:0}}>×</span>
              </div>
            )}
          </div>
          {/* Plan行 */}
          {!collapsed[firm.id]&&firm.plans?.map(plan=>(
            <div key={plan.id} onClick={()=>onSelect(plan.id)} style={{
              padding:"4px 8px 4px 24px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,
              background:activeId===plan.id?`${C.blue}22`:"transparent",
              borderLeft:activeId===plan.id?`3px solid ${C.blue}`:"3px solid transparent",
            }}>
              {editId===plan.id?renderEdit(plan.id):(
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:"0.58rem",color:C.blue,flexShrink:0}}>└</span>
                  <span onDoubleClick={e=>{e.stopPropagation();setEditId(plan.id);setEditName(plan.name)}} style={{
                    fontSize:"0.72rem",fontWeight:activeId===plan.id?700:400,
                    color:activeId===plan.id?C.blue:C.text,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,
                  }}>{plan.name||"（未命名）"}</span>
                  <span onClick={e=>{e.stopPropagation();onDelete(plan.id)}}
                    style={{color:C.red,fontSize:"0.62rem",cursor:"pointer",flexShrink:0}}>×</span>
                </div>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// 貼り付けエリア（入力＋保管）
// ═══════════════════════════════════════════════════
function PastePanel({onSendToTarget,onTranslateToTarget,onArchive,externalRef,archives,onDeleteArchive,height,onOpenChild,onOpenQuickRef}) {
  const taRef=useRef(null);
  const setRefs=useCallback(el=>{taRef.current=el;if(externalRef)externalRef.current=el},[externalRef]);
  const [dragOver,setDragOver]=useState(false);
  const [ocrStatus,setOcrStatus]=useState("");
  const [showArchives,setShowArchives]=useState(false);

  const handleImageOCR=useCallback(async file=>{
    if(!file||!file.type.startsWith("image/"))return;
    setOcrStatus("OCR中...");
    try {
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file)});
      const data=await callAPI({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"この画像内のテキストを全て抽出。テーブルはMarkdown形式。抽出テキストのみ出力。"}]}]});
      if(taRef.current){const ta=taRef.current;ta.value+=(ta.value?"\n\n--- OCR ---\n":"")+exText(data)}
      setOcrStatus("完了"); setTimeout(()=>setOcrStatus(""),2000);
    } catch(e){setOcrStatus("エラー: "+e.message)}
  },[]);

  const getSelected=()=>{const ta=taRef.current;if(!ta)return"";return ta.value.substring(ta.selectionStart,ta.selectionEnd).trim()||ta.value.trim()};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:4,height,flexShrink:0,borderBottom:`1px solid ${C.border}`,padding:"8px 10px",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span onClick={onOpenChild} style={{cursor:"pointer",fontSize:"0.82rem",color:C.accent}} title="小窓">❏</span>
          <span style={{fontSize:"0.78rem",fontWeight:700,color:C.accent}}>貼付エリア</span>
          <span onClick={onOpenQuickRef} style={{cursor:"pointer",fontSize:"0.82rem",color:C.blue}} title="早見表">▦</span>
          {ocrStatus&&<span style={{fontSize:"0.65rem",color:C.yellow}}>{ocrStatus}</span>}
        </div>
        <div style={{display:"flex",gap:3,alignItems:"center"}}>
          <button onMouseDown={e=>{e.preventDefault();const t=getSelected();if(t)onArchive(t)}} style={{background:"transparent",color:C.purple,border:`1px solid ${C.purple}`,borderRadius:3,padding:"2px 8px",fontSize:"0.68rem",fontWeight:700,cursor:"pointer"}}>保管</button>
          <button onMouseDown={e=>{e.preventDefault();const t=getSelected();if(t)onTranslateToTarget(t)}} style={{background:"transparent",color:C.blue,border:`1px solid ${C.blue}`,borderRadius:3,padding:"2px 8px",fontSize:"0.68rem",fontWeight:700,cursor:"pointer"}}>翻訳</button>
          <button onMouseDown={e=>{e.preventDefault();const t=getSelected();if(t)onSendToTarget(t)}} style={{background:"transparent",color:C.accent,border:`1px solid ${C.accent}`,borderRadius:3,padding:"2px 8px",fontSize:"0.68rem",fontWeight:700,cursor:"pointer"}}>反映</button>
          <Btn color={C.red} onClick={()=>{if(taRef.current)taRef.current.value=""}} style={{padding:"1px 5px"}}>×</Btn>
        </div>
      </div>
      <div style={{flex:1,position:"relative",border:`1px solid ${dragOver?C.accent:C.border}`,borderRadius:6,overflow:"hidden"}}
        onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer?.files?.[0];if(f?.type.startsWith("image/"))handleImageOCR(f)}}>
        <textarea ref={setRefs} onPaste={e=>{const items=e.clipboardData?.items;if(!items)return;for(const it of items){if(it.type.startsWith("image/")){e.preventDefault();handleImageOCR(it.getAsFile());return}}}}
          placeholder="テキスト貼り付け / 画像ドロップ・ペースト"
          style={{width:"100%",height:"100%",resize:"none",background:C.bg,color:C.text,border:"none",padding:8,fontSize:"0.8rem",fontFamily:font,lineHeight:1.6,outline:"none"}} />
        {dragOver&&<div style={{position:"absolute",inset:0,background:C.accentDim,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><span style={{color:C.accent,fontWeight:700}}>画像ドロップ → OCR</span></div>}
      </div>
      {archives.length>0&&(
        <div>
          <div onClick={()=>setShowArchives(!showArchives)} style={{cursor:"pointer",fontSize:"0.68rem",color:C.purple,userSelect:"none"}}>
            {showArchives?"▼":"▶"} 保管 ({archives.length})
          </div>

  const handleCopy=async()=>{
    try {
      // Clipboard APIを使ってタブ文字を確実に保持
      await navigator.clipboard.writeText(val);
      setCopied(true);
      setTimeout(()=>setCopied(false),1500);
    } catch(err) {
      // フォールバック: 従来の方法
      const ta=document.createElement("textarea");
      ta.value=val;
      ta.style.cssText="position:fixed;opacity:0;white-space:pre"; // white-space:preでタブを保持
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);

      setTimeout(()=>setCopied(false),1500);
    }

  if(!show)return null;

// ═══════════════════════════════════════════════════
// スロットパネル
// ═══════════════════════════════════════════════════
function SlotPanel({templateMode,setTemplateMode,slotData,setSlotData,currentSlots,availableTemplates,onAIGenKoryaku,aiGenKoryaku,onAIGenTable,aiGenTable,locks,setLocks,activeSlotId,setActiveSlotId,onSyncPlans}) {
  const [mergingSlot,setMergingSlot]=useState(null);
  const [editModal,setEditModal]=useState(null); // {slotId,idx,text,label}

  const sections=useMemo(()=>{
    const m={};currentSlots.forEach(s=>{if(!m[s.section])m[s.section]=[];m[s.section].push(s)});return Object.entries(m);
  },[currentSlots]);

  const isLocked=(id)=>!!locks[id];
  const toggleLock=(id)=>setLocks(p=>({...p,[id]:!p[id]}));

  const handleDelete=useCallback((slotId,idx)=>{
    if(isLocked(slotId))return;
    setSlotData(prev=>{const frags=prev[slotId]||[];return{...prev,[slotId]:frags.filter((_,i)=>i!==idx)}});
  },[setSlotData,locks]);

  const handleEditSave=(newText)=>{
    if(!editModal)return;
    const{slotId,idx}=editModal;
    if(!newText.trim()){
      // 空保存→削除
      setSlotData(prev=>{
        const frags=[...(prev[slotId]||[])];
        if(idx==="merged")return{...prev,[slotId]:frags.filter(f=>!f.merged)};
        return{...prev,[slotId]:frags.filter((_,i)=>i!==idx)};
      });
      return;
    }
    setSlotData(prev=>{
      const frags=[...(prev[slotId]||[])];
      if(idx==="merged"){const mi=frags.findIndex(f=>f.merged);if(mi>=0)frags[mi]={...frags[mi],text:newText}}
      else if(frags[idx])frags[idx]={...frags[idx],text:newText};
      return{...prev,[slotId]:frags};
    });
    // planList保存時にPlanタブ自動生成
    if(slotId==="planList"&&onSyncPlans)onSyncPlans(newText);
  };

  const handleMerge=useCallback(async slotId=>{
    if(isLocked(slotId))return;
    const frags=slotData[slotId];if(!frags||frags.length<2)return;
    setMergingSlot(slotId);
    try {
      const slot=currentSlots.find(s=>s.id===slotId);
      const texts=frags.filter(f=>!f.merged).map(f=>f.text);
      const data=await callAPI({model:"claude-sonnet-4-20250514",max_tokens:2000,
        system:`プロップファーム情報ライター。「${slot?.label||slotId}」の断片を1つに整形。重複統合・数値保持。整形結果のみ出力。`,
        messages:[{role:"user",content:texts.map((t,i)=>`【${i+1}】\n${t}`).join("\n\n")}]});
      setSlotData(prev=>({...prev,[slotId]:[...frags.filter(f=>!f.merged),{text:exText(data),merged:true}]}));
    } catch(e){alert("整形エラー")}
    setMergingSlot(null);
  },[slotData,currentSlots,setSlotData,locks]);

  const exportMD=useCallback(()=>{
    const g=id=>{const fr=slotData[id];if(!fr?.length)return"";const m=fr.find(f=>f.merged);return m?m.text:fr.map(f=>f.text).join("\n")};
    const L=[];
    if(templateMode==="dbp01"){
      L.push(`${g("firmName")}`,`${g("country")} | ${g("established")} | ${g("japanSupport")}`,"",g("officialUrl"),"",`カテゴリ: ${g("firmCategory")}`);
      L.push("","## 取引環境","",`ブローカー: ${g("broker")}`,`プラットフォーム: ${g("platform")}`);
      L.push("","### Server Time","",g("serverTime"),"","### DD Reset","",g("ddReset"));
      L.push("","### レバレッジ","",g("leverage"),"","### 手数料","",g("commission"));
      L.push("","## 入出金","",`入金方法: ${g("paymentMethods")}`,`出金方法: ${g("payoutMethods")}`,"",`出金ポリシー: ${g("payoutPolicy")}`);
      L.push("",`Profit Split: ${g("profitSplit")}`);if(g("profitSplitNote"))L.push(g("profitSplitNote"));
      L.push("","## プラン","",`スケールアップ: ${g("scaleUp")}`,"","### プラン比較テーブル","",g("planComparison"));
    } else if(templateMode==="dbp02"){
      L.push(`# ${g("challengeName")}`,"","## 価格テーブル","",g("priceTable"));
      L.push("","## ルール早見表","",g("ruleQuickRef"));
      L.push("","## ルール詳細","","|項目|Challenge|Funded|差分|補足|","|---|---|---|---|---|");
      L.push("|凡例|Funded列が—の項目はChallengeと同じルール|—|||");
      SLOT_DEFS.dbp02.filter(s=>s.section==="詳細").forEach(s=>{const v=g(s.id);if(v)L.push(`|${s.label}|${v}|`)});
    } else {
      L.push("## 断面① Drawdown","",g("k_dd"));
      L.push("","## 断面② 取引ルール","",g("k_rules"));
      L.push("","## 断面③ 出金までの流れ","",g("k_payout"));
    }
    return L.join("\n");
  },[templateMode,slotData]);

  // Notion出力用：構造化本文生成（選択項目対応）
  const generateNotionBody=useCallback((selectedIds=[])=>{
    const g=id=>{const fr=slotData[id];if(!fr?.length)return"";const m=fr.find(f=>f.merged);return m?m.text:fr.map(f=>f.text).join("\n")};
    const isSelected=id=>selectedIds.length===0||selectedIds.includes(id); // 空配列なら全出力
    const L=[];
    
    if(templateMode==="dbp01"){
      // DBP_01: Firm情報
      if(isSelected("firmPitch")&&g("firmPitch"))L.push("## ファームピッチ","",g("firmPitch"),"");
      if(isSelected("rewardProgram")&&g("rewardProgram"))L.push("## リワードプログラム","",g("rewardProgram"),"");
      if(isSelected("scaleUp")&&g("scaleUp"))L.push("## スケールアップ","",g("scaleUp"),"");
      
      L.push("## 取引環境","");
      if(isSelected("broker")&&g("broker"))L.push("### ブローカー","",g("broker"),"");
      if(isSelected("platform")&&g("platform"))L.push("### プラットフォーム","",g("platform"),"");
      if(isSelected("serverTime")&&g("serverTime"))L.push("### Server Time","",g("serverTime"),"");
      if(isSelected("ddReset")&&g("ddReset"))L.push("### DD Reset","",g("ddReset"),"");
      if(isSelected("leverage")&&g("leverage"))L.push("### レバレッジ","",g("leverage"),"");
      if(isSelected("commission")&&g("commission"))L.push("### 手数料","",g("commission"),"");
      
      L.push("## 入出金","");
      if(isSelected("paymentMethods")&&g("paymentMethods"))L.push("### 入金方法","",g("paymentMethods"),"");
      if(isSelected("payoutMethods")&&g("payoutMethods"))L.push("### 出金方法","",g("payoutMethods"),"");
      if(isSelected("payoutPolicy")&&g("payoutPolicy"))L.push("### 出金ポリシー","",g("payoutPolicy"),"");
      if(isSelected("profitSplit")&&g("profitSplit"))L.push("### Profit Split","",g("profitSplit"),"");
      if(isSelected("profitSplitNote")&&g("profitSplitNote"))L.push("",g("profitSplitNote"),"");
      
      if(isSelected("planComparison")&&g("planComparison"))L.push("## プラン比較","",g("planComparison"),"");
      
    } else if(templateMode==="dbp02"){
      // DBP_02: Plan情報
      
      // 価格テーブル
      if(isSelected("priceTable")&&g("priceTable")){
        L.push("### 価格テーブル","",g("priceTable"),"");
      }
      
      // ルール早見表
      if(isSelected("ruleQuickRef")&&g("ruleQuickRef")){
        L.push("### ルール早見表","",g("ruleQuickRef"),"");
      }
      
      // ルール詳細テーブル（Markdownテーブル形式）
      L.push("### ルール詳細","");
      L.push("| 項目 | Challenge | Funded |");
      L.push("|------|-----------|--------|");
      L.push("| 説明 | Funded列が — の項目はChallengeと同じルールが適用されます | — |");
      
      SLOT_DEFS.dbp02.filter(s=>s.section==="詳細"&&isSelected(s.id)).forEach(s=>{
        const v=g(s.id);
        if(v){
          // Challenge|Funded|差分|補足 形式をパース
          const vStr=typeof v==="string"?v:String(v);
          const parts=vStr.split("|");
          const cVal=(parts[0]||"").trim();
          const fVal=(parts[1]||"").trim();
          const note=(parts[3]||"").trim();
          
          // Markdownテーブル行を生成
          L.push(`| ${s.label} | ${cVal||"—"} | ${fVal||"—"} |`);
          
          // 補足テキストがあれば追加行として出力
          if(note){
            L.push(`| | ${note} | |`);
          }
        }
      });
      
      L.push(""); // 空行
      
    } else if(templateMode==="koryaku"){
      // 攻略記事
      if(isSelected("k_dd")&&g("k_dd"))L.push("## 断面① Drawdown","",g("k_dd"),"");
      if(isSelected("k_rules")&&g("k_rules"))L.push("## 断面② 取引ルール","",g("k_rules"),"");
      if(isSelected("k_payout")&&g("k_payout"))L.push("## 断面③ 出金までの流れ","",g("k_payout"),"");
    }
    
    return L.filter(l=>l!==undefined).join("\n");
  },[templateMode,slotData]);

  const [showNotionPreview,setShowNotionPreview]=useState(false);
  const [notionBodyText,setNotionBodyText]=useState("");
  const [showNotionItemSelect,setShowNotionItemSelect]=useState(false);
  const [showReinvestigateModal,setShowReinvestigateModal]=useState(false);
  const [selectedSlotsForReinvestigate,setSelectedSlotsForReinvestigate]=useState([]);

  const filled=currentSlots.filter(s=>slotData[s.id]?.length>0).length;

  // 再調査プロンプト生成
  const generateReinvestigatePrompt=useCallback((mode)=>{
    let targetSlots=[];
    if(mode==="auto"){
      // 自動: 空スロットを検出
      targetSlots=currentSlots.filter(s=>!slotData[s.id]||slotData[s.id].length===0);
    }else{
      // 手動: 選択されたスロット
      targetSlots=currentSlots.filter(s=>selectedSlotsForReinvestigate.includes(s.id));
    }
    if(!targetSlots.length){
      alert(mode==="auto"?"全スロット入力済みです":"スロットを選択してください");
      return;
    }
    
    // 参照URLを取得
    const g=id=>{const v=slotData[id];return(v||[]).map(x=>x.text||x).join(", ")||"記載なし"};
    const urlOfficial=g("fm_url_official");
    const urlRules=g("fm_url_rules");
    
    const slotList=targetSlots.map(s=>`- ${s.id}: ${s.label}`).join("\n");
    
    const prompt=`以下のスロットについて、公式ルールページから情報を再調査してください。

【調査対象スロット】
${slotList}

【参照URL】
- 公式サイト: ${urlOfficial}
- ルールページ: ${urlRules}

【指示】
各スロットについて、正確な定義・条件・計算方法を抽出してください。`;
    
    navigator.clipboard.writeText(prompt);
    alert(`再調査プロンプトをクリップボードにコピーしました（${targetSlots.length}件）`);
    setShowReinvestigateModal(false);
    setSelectedSlotsForReinvestigate([]);
  },[currentSlots,slotData,selectedSlotsForReinvestigate]);

  // AI作成対象スロットID
  const aiSlotIds={dbp01:"planComparison",dbp02:"priceTable"};
  const aiSlotId2="ruleQuickRef";

  return (
    <div style={{flex:1,overflow:"auto",padding:10,display:"flex",flexDirection:"column"}}>
      <EditModal show={!!editModal} text={editModal?.text} label={editModal?.label}
        onSave={handleEditSave} onClose={()=>setEditModal(null)} />
      <NotionPreviewModal show={showNotionPreview} text={notionBodyText} onClose={()=>setShowNotionPreview(false)} />
      <ReinvestigateModal show={showReinvestigateModal} onClose={()=>{setShowReinvestigateModal(false);setSelectedSlotsForReinvestigate([])}}
        currentSlots={currentSlots} slotData={slotData}
        selectedSlots={selectedSlotsForReinvestigate} setSelectedSlots={setSelectedSlotsForReinvestigate}
        onGenerate={generateReinvestigatePrompt} />
      <NotionItemSelectModal show={showNotionItemSelect} onClose={()=>setShowNotionItemSelect(false)}
        templateMode={templateMode} currentSlots={currentSlots} slotData={slotData}
        onGenerate={(selectedIds)=>{
          const body=generateNotionBody(selectedIds);
          setNotionBodyText(body);
          setShowNotionItemSelect(false);
          setShowNotionPreview(true);
        }} />

      {/* ヘッダー: テンプレ切替 + 充填率 + ⋮メニュー + × */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:4}}>
        <div style={{display:"flex",gap:2,alignItems:"center"}}>
          {availableTemplates.map(([m,l])=>(
            <button key={m} onClick={()=>setTemplateMode(m)} style={{
              background:templateMode===m?C.accent:"transparent",color:templateMode===m?C.bg:C.textDim,
              border:`1px solid ${templateMode===m?C.accent:C.border}`,borderRadius:3,padding:"2px 8px",fontSize:"0.68rem",fontWeight:700,cursor:"pointer"
            }}>{l}</button>
          ))}
          <span style={{fontSize:"0.62rem",color:filled===currentSlots.length?C.green:C.textDim,marginLeft:4}}>{filled}/{currentSlots.length}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <button onClick={()=>setShowReinvestigateModal(true)} style={{padding:"3px 8px",fontSize:"0.65rem",background:C.blue,color:C.bg,border:"none",borderRadius:4,cursor:"pointer",fontWeight:700}}>📋 再調査</button>
          <button onClick={()=>{const body=generateNotionBody([]);setNotionBodyText(body);setShowNotionPreview(true)}} style={{padding:"3px 8px",fontSize:"0.65rem",background:C.accent,color:C.bg,border:"none",borderRadius:4,cursor:"pointer",fontWeight:700}}>📋 プレビュー</button>
          <button onClick={()=>setShowNotionItemSelect(true)} style={{padding:"3px 8px",fontSize:"0.65rem",background:C.accent,color:C.bg,border:"none",borderRadius:4,cursor:"pointer",fontWeight:700}}>📋 選択</button>
          <span onClick={()=>{if(confirm("全スロットクリア？"))setSlotData({})}} style={{cursor:"pointer",color:C.red,fontSize:"0.7rem",marginLeft:4}}>×</span>
        </div>
      </div>

      {/* セクション */}
      {sections.map(([sec,slots])=>{
        const fc=slots.filter(s=>slotData[s.id]?.length>0).length;
        const allSectionLocked=slots.every(s=>locks[s.id]);
        return (
          <div key={sec} style={{marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
              <span onClick={()=>{const next={...locks};slots.forEach(s=>{next[s.id]=!allSectionLocked});setLocks(next)}}
                style={{cursor:"pointer",fontSize:"0.6rem",color:allSectionLocked?C.yellow:C.textDim}} title={allSectionLocked?"全解除":"全ロック"}>{allSectionLocked?"🔒":"🔓"}</span>
              <span style={{fontSize:"0.72rem",fontWeight:700,color:SEC_COLORS[sec]||C.text}}>
                {sec} <span style={{fontSize:"0.58rem",color:C.textDim}}>{fc}/{slots.length}</span>
              </span>
            </div>

            {slots.map(slot=>{
              const frags=slotData[slot.id]||[];
              const merged=frags.find(f=>f.merged);
              const locked=isLocked(slot.id);
              const isActive=activeSlotId===slot.id;
              const isAiTarget=(templateMode==="dbp01"&&slot.id==="planComparison")||(templateMode==="dbp02"&&(slot.id==="priceTable"||slot.id==="ruleQuickRef"))||(templateMode==="koryaku");
              return (
                <div key={slot.id} onClick={()=>setActiveSlotId(slot.id)} style={{
                  background:isActive?C.accentDim:C.surface,
                  border:`1px solid ${isActive?C.accent:(locked?C.yellow+"40":C.border)}`,
                  borderRadius:4,padding:"5px 8px",marginBottom:2,opacity:locked?0.8:1,cursor:"pointer"
                }}>
                  <div style={{display:"flex",alignItems:"center",gap:3}}>
                    {/* 左: 🔒 ✎ 整形 */}
                    <span onClick={e=>{e.stopPropagation();toggleLock(slot.id)}} style={{cursor:"pointer",fontSize:"0.55rem",lineHeight:1}}>{locked?"🔒":"🔓"}</span>
                    {!locked&&frags.length>0&&<span onClick={e=>{e.stopPropagation();setEditModal({slotId:slot.id,idx:merged?"merged":0,text:merged?merged.text:frags[0]?.text||"",label:slot.label})}} style={{cursor:"pointer",fontSize:"0.55rem",color:C.textDim,lineHeight:1}}>✎</span>}
                    {!locked&&frags.length>1&&!merged&&<span onClick={e=>{e.stopPropagation();handleMerge(slot.id)}} style={{cursor:"pointer",fontSize:"0.5rem",color:C.purple,lineHeight:1}}>{mergingSlot===slot.id?"…":"整"}</span>}

                    {/* スロット名 */}
                    <span style={{fontSize:"0.7rem",fontWeight:700,color:frags.length?C.accent:C.textDim}}>{slot.label}</span>
                    {slot.hint&&<span style={{fontSize:"0.48rem",color:C.textDim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{slot.hint}</span>}

                    {/* 右: AI作成 + Planタブ生成 + × */}
                    <div style={{flex:slot.hint?0:1}} />
                    {slot.id==="planList"&&!locked&&frags.length>0&&(
                      <span onClick={e=>{e.stopPropagation();const text=merged?merged.text:frags.map(f=>f.text).join(", ");syncPlansFromList(text)}} style={{cursor:"pointer",fontSize:"0.5rem",color:C.green,border:`1px solid ${C.green}`,borderRadius:2,padding:"0 3px"}}>Planタブ生成</span>
                    )}
                    {isAiTarget&&!locked&&(
                      (templateMode==="koryaku"&&onAIGenKoryaku)?(
                        <span onClick={e=>{e.stopPropagation();onAIGenKoryaku()}} style={{cursor:aiGenKoryaku?"wait":"pointer",fontSize:"0.5rem",color:C.purple,border:`1px solid ${C.purple}`,borderRadius:2,padding:"0 3px"}}>{aiGenKoryaku?"…":"作成"}</span>
                      ):onAIGenTable&&(slot.id==="planComparison"||slot.id==="priceTable"||slot.id==="ruleQuickRef")?(
                        <span onClick={e=>{e.stopPropagation();onAIGenTable(templateMode)}} style={{cursor:aiGenTable?"wait":"pointer",fontSize:"0.5rem",color:C.blue,border:`1px solid ${C.blue}`,borderRadius:2,padding:"0 3px"}}>{aiGenTable?"…":"作成"}</span>
                      ):null
                    )}
                    {!locked&&frags.length>0&&<span onClick={e=>{e.stopPropagation();if(confirm(`${slot.label}をクリア？`))setSlotData(prev=>({...prev,[slot.id]:[]}))}} style={{color:C.red,fontSize:"0.55rem",cursor:"pointer"}}>×</span>}
                  </div>

                  {merged?(
                    <div onClick={e=>{e.stopPropagation();!locked&&setEditModal({slotId:slot.id,idx:"merged",text:merged.text,label:slot.label})}}
                      style={{fontSize:"0.68rem",color:C.textBright,fontFamily:font,whiteSpace:"pre-wrap",background:C.surfaceAlt,borderRadius:3,padding:4,marginTop:3,border:`1px solid ${C.purple}40`,cursor:locked?"default":"pointer",maxHeight:70,overflow:"auto"}}>{merged.text}</div>
                  ):frags.map((f,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:4,marginTop:2}}>
                      <div onClick={e=>{e.stopPropagation();!locked&&setEditModal({slotId:slot.id,idx:i,text:f.text,label:slot.label})}}
                        style={{flex:1,fontSize:"0.65rem",color:C.text,fontFamily:font,whiteSpace:"pre-wrap",background:C.surfaceAlt,borderRadius:3,padding:"2px 5px",borderLeft:`2px solid ${C.accent}40`,cursor:locked?"default":"pointer",maxHeight:50,overflow:"auto"}}>{f.text}</div>
                      {!locked&&<span onClick={e=>{e.stopPropagation();handleDelete(slot.id,i)}} style={{color:C.red,fontSize:"0.5rem",cursor:"pointer",flexShrink:0,padding:"2px"}}>×</span>}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// 用語辞典パネル
// ═══════════════════════════════════════════════════
function GlossaryPanel({terms,setTerms,generating}) {
  const [filter,setFilter]=useState("all"); // all | label | notation | custom
  const [editIdx,setEditIdx]=useState(-1);  // 編集中の実インデックス（-1=なし）
  const [draft,setDraft]=useState(null);
  const exportCSV=()=>{
    const esc=s=>`"${(s||"").replace(/"/g,'""')}"`;
    return "key,type,用語名,カテゴリ,定義,3行説明,豆知識\n"+terms.map(t=>[esc(t.key),esc(t.type),esc(t.term),esc(t.category),esc(t.definition),esc(t.explanation),esc(t.trivia)].join(",")).join("\n");
  };
  const seedCount=terms.filter(t=>t.key).length;
  const fTerms=terms.map((t,i)=>({t,i})).filter(({t})=>{
    if(filter==="all")return true;
    if(filter==="custom")return !t.key;
    return t.type===filter;
  });
  const FBTN=(val,lbl)=>(
    <button onClick={()=>setFilter(val)} style={{background:filter===val?C.purple:"transparent",color:filter===val?C.bg:C.textDim,border:`1px solid ${filter===val?C.purple:C.border}`,borderRadius:3,padding:"1px 6px",fontSize:"0.6rem",fontWeight:700,cursor:"pointer"}}>{lbl}</button>
  );
  const startEdit=(i)=>{setEditIdx(i);setDraft({...terms[i]})};
  const cancelEdit=()=>{setEditIdx(-1);setDraft(null)};
  const saveEdit=()=>{
    if(!draft.term||!draft.term.trim()){alert("用語名は必須です");return}
    setTerms(p=>p.map((t,j)=>j===editIdx?{...draft}:t));
    setEditIdx(-1);setDraft(null);
  };
  const addNew=()=>{
    setTerms(p=>[{term:"",type:"notation",category:"",definition:"",explanation:"",trivia:""},...p]);
    setFilter("all");setEditIdx(0);setDraft({term:"",type:"notation",category:"",definition:"",explanation:"",trivia:""});
  };
  const fld=(label,key,ml)=>(
    <div style={{marginBottom:4}}>
      <div style={{fontSize:"0.56rem",color:C.textDim,marginBottom:1}}>{label}</div>
      {ml?
        <textarea value={draft[key]||""} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))} rows={2} style={{width:"100%",background:C.bg,color:C.textBright,border:`1px solid ${C.border}`,borderRadius:3,fontSize:"0.66rem",padding:"3px 5px",resize:"vertical",fontFamily:"inherit"}} />
        :
        <input value={draft[key]||""} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))} style={{width:"100%",background:C.bg,color:C.textBright,border:`1px solid ${C.border}`,borderRadius:3,fontSize:"0.66rem",padding:"3px 5px"}} />
      }
    </div>
  );
  return (
    <div style={{flex:1,overflow:"auto",padding:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:"0.78rem",fontWeight:700,color:C.purple}}>用語辞典 <span style={{fontSize:"0.6rem",color:C.textDim,fontWeight:400}}>正本{seedCount}</span></span>
        <div style={{display:"flex",gap:3}}>
          <Btn color={C.accent} onClick={addNew} style={{fontSize:"0.6rem"}}>＋追加</Btn>
          <Btn color={C.purple} onClick={()=>exportJSON(terms,"glossary.json")} style={{fontSize:"0.6rem"}}>保存</Btn>
          <Btn color={C.purple} onClick={()=>importJSON(d=>{if(Array.isArray(d))setTerms(p=>{const keys=new Set(p.map(x=>x.key).filter(Boolean));return [...p,...d.filter(x=>!(x.key&&keys.has(x.key)))]})})} style={{fontSize:"0.6rem"}}>読込</Btn>
          {terms.length>0&&<CopyBtn text={exportCSV()} label={`CSV(${terms.length})`} color={C.purple} />}
        </div>
      </div>
      <div style={{display:"flex",gap:3,marginBottom:6}}>
        {FBTN("all","全")}{FBTN("label","label")}{FBTN("notation","notation")}{FBTN("custom","手動")}
      </div>
      {generating&&<div style={{fontSize:"0.72rem",color:C.yellow,marginBottom:4}}>生成中...</div>}
      {fTerms.map(({t,i})=>(
        editIdx===i?
        <div key={i} style={{background:C.surfaceAlt||C.surface,border:`1px solid ${C.accent}`,borderRadius:4,padding:"8px",marginBottom:3}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}>
            {t.key&&<span style={{fontSize:"0.56rem",color:C.bg,background:C.accent,padding:"1px 5px",borderRadius:3,fontWeight:700}}>{t.key}</span>}
            <select value={draft.type||"notation"} onChange={e=>setDraft(d=>({...d,type:e.target.value}))} style={{background:C.bg,color:C.textBright,border:`1px solid ${C.border}`,borderRadius:3,fontSize:"0.6rem",padding:"1px 3px"}}>
              <option value="label">label</option>
              <option value="notation">notation</option>
            </select>
          </div>
          {fld("用語名（正規表記）","term")}
          {fld("カテゴリ","category")}
          {fld("定義（意味）","definition",true)}
          {fld("説明","explanation",true)}
          {fld("豆知識","trivia")}
          <div style={{display:"flex",gap:4,marginTop:4}}>
            <Btn color={C.accent} onClick={saveEdit} style={{fontSize:"0.62rem"}}>保存</Btn>
            <Btn color={C.textDim} onClick={cancelEdit} style={{fontSize:"0.62rem"}}>キャンセル</Btn>
          </div>
        </div>
        :
        <div key={i} style={{background:C.surface,border:`1px solid ${t.key?C.border:C.yellow+"55"}`,borderRadius:4,padding:"6px 8px",marginBottom:3}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:"0.78rem",fontWeight:700,color:C.accent,display:"flex",alignItems:"center",flexWrap:"wrap",gap:4}}>
              {t.key&&<span style={{fontSize:"0.56rem",color:C.bg,background:C.accent,padding:"1px 5px",borderRadius:3,fontWeight:700}}>{t.key}</span>}
              {t.type&&<span style={{fontSize:"0.54rem",color:t.type==="notation"?C.green:C.blue,border:`1px solid ${t.type==="notation"?C.green:C.blue}`,padding:"0 4px",borderRadius:3}}>{t.type}</span>}
              <span>{t.term}</span>
              {t.category&&<span style={{fontSize:"0.58rem",color:C.purple,background:`${C.purple}22`,padding:"1px 5px",borderRadius:3}}>{t.category}</span>}
            </span>
            <span style={{display:"flex",gap:6,alignItems:"center"}}>
              <span onClick={()=>startEdit(i)} style={{color:C.blue,fontSize:"0.6rem",cursor:"pointer"}}>編集</span>
              <span onClick={()=>{if(t.key){if(!confirm(`正本キー ${t.key}「${t.term}」を削除しますか？`))return}setTerms(p=>p.filter((_,j)=>j!==i))}} style={{color:C.red,fontSize:"0.62rem",cursor:"pointer"}}>×</span>
            </span>
          </div>
          {t.definition&&<div style={{fontSize:"0.68rem",color:C.textBright,marginTop:2}}>{t.definition}</div>}
          {t.explanation&&<div style={{fontSize:"0.65rem",color:C.text,marginTop:1,whiteSpace:"pre-wrap"}}>{t.explanation}</div>}
          {t.trivia&&<div style={{fontSize:"0.62rem",color:C.textDim,marginTop:1,fontStyle:"italic"}}>💡 {t.trivia}</div>}
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// バックアップ／復元モーダル
// ═══════════════════════════════════════════════════
function BackupModal({show,onClose,getCurrentData,onRestore}) {
  const [backups,setBackups]=useState([]);
  const [label,setLabel]=useState("");
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ if(show){ setBackups(loadBackups()); setLabel(""); } },[show]);
  if(!show)return null;

  const summary=(data)=>{
    const fc=(data?.firms||[]).length;
    const pc=(data?.firms||[]).reduce((a,f)=>a+((f.plans||[]).length),0);
    const gc=(data?.glossaryTerms||[]).length;
    return `Firm ${fc} / Plan ${pc} / 用語 ${gc}`;
  };

  const handleBackup=(auto)=>{
    setBusy(true);
    const data=getCurrentData();
    const list=loadBackups();
    const snap=makeBackupSnapshot(auto?"(復元前 自動退避)":(label.trim()||""),data,auto);
    let next=[snap,...list];
    if(next.length>BACKUP_MAX)next=next.slice(0,BACKUP_MAX);
    if(saveBackups(next)){ setBackups(next); setLabel(""); }
    setBusy(false);
    return snap;
  };

  const handleRestore=(bk)=>{
    if(!window.confirm(`このバックアップで現在の状態を置き換えます。\n\n${bk.label||"(無題)"}\n${fmtBackupTime(bk.ts)}\n${summary(bk.data)}\n\n※復元の直前に、いまの状態を自動で退避バックアップとして保存します。\n復元しますか？`))return;
    // 復元直前に現在状態を自動退避
    handleBackup(true);
    onRestore(bk.data);
    onClose();
  };

  const handleDelete=(id)=>{
    if(!window.confirm("このバックアップを削除しますか？"))return;
    const next=loadBackups().filter(b=>b.id!==id);
    saveBackups(next); setBackups(next);
  };

  const handleDownload=(bk)=>{
    exportJSON(bk.data,`pfm-backup-${fmtBackupTime(bk.ts).replace(/[ :]/g,"-")}.json`);
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:560,maxWidth:"92vw",maxHeight:"86vh",overflow:"auto",background:C.surface,border:`1px solid ${C.accent}`,borderRadius:8,padding:"14px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontWeight:700,color:C.accent,fontSize:"0.9rem"}}>💾 バックアップ / 復元</span>
          <span style={{fontSize:"0.6rem",color:C.textDim}}>ブラウザ内に保存（最大{BACKUP_MAX}件）</span>
          <div style={{flex:1}} />
          <span onClick={onClose} style={{cursor:"pointer",color:C.red,fontSize:"1rem",lineHeight:1}}>×</span>
        </div>

        {/* 新規バックアップ */}
        <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center"}}>
          <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="メモ（任意）例: 用語整理後"
            onKeyDown={e=>{if(e.key==="Enter")handleBackup(false)}}
            style={{flex:1,background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"4px 8px",fontSize:"0.72rem",outline:"none"}} />
          <Btn color={C.green} disabled={busy} onClick={()=>handleBackup(false)} style={{fontSize:"0.7rem",padding:"4px 12px"}}>＋ 今すぐバックアップ</Btn>
        </div>

        {/* 一覧 */}
        {backups.length===0?(
          <div style={{color:C.textDim,fontSize:"0.72rem",textAlign:"center",padding:"24px 0"}}>バックアップはまだありません</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {backups.map(bk=>(
              <div key={bk.id} style={{display:"flex",alignItems:"center",gap:8,background:C.surfaceAlt,border:`1px solid ${bk.auto?C.yellow:C.border}`,borderRadius:5,padding:"6px 8px"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.74rem",color:C.textBright,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {bk.auto&&<span style={{color:C.yellow,fontSize:"0.62rem",marginRight:4}}>[自動]</span>}
                    {bk.label||<span style={{color:C.textDim,fontWeight:400}}>(無題)</span>}
                  </div>
                  <div style={{fontSize:"0.62rem",color:C.textDim}}>{fmtBackupTime(bk.ts)}　{summary(bk.data)}</div>
                </div>
                <Btn color={C.accent} onClick={()=>handleRestore(bk)} style={{fontSize:"0.64rem"}}>↩️ 復元</Btn>
                <Btn color={C.blue} onClick={()=>handleDownload(bk)} style={{fontSize:"0.64rem"}} title="JSONファイルとして書き出し">⬇</Btn>
                <Btn color={C.red} onClick={()=>handleDelete(bk.id)} style={{fontSize:"0.64rem"}}>🗑</Btn>
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:12,fontSize:"0.6rem",color:C.textDim,lineHeight:1.6,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
          ・「復元」は現在のデータを<b>置き換え</b>ます（直前の状態は自動で退避保存されるので元に戻せます）。<br/>
          ・データはこのブラウザの localStorage に保存されます。別端末・キャッシュ削除では消えるため、重要時は⬇でJSONも保存してください。
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// マージ取込モーダル（2台のデータ統合）
// ═══════════════════════════════════════════════════
function MergeModal({show,onClose,getCurrentData,onApplyMerge}) {
  const [incoming,setIncoming]=useState(null);   // 読み込んだファイル
  const [plan,setPlan]=useState(null);           // planMerge結果
  const [choices,setChoices]=useState({});       // {firmName: 'file'|'keep'|'both'}

  useEffect(()=>{ if(!show){ setIncoming(null); setPlan(null); setChoices({}); } },[show]);
  if(!show)return null;

  const summary=(data)=>{
    const fc=(data?.firms||[]).length;
    const pc=(data?.firms||[]).reduce((a,f)=>a+((f.plans||[]).length),0);
    const gc=(data?.glossaryTerms||[]).length;
    return `Firm ${fc} / Plan ${pc} / 用語 ${gc}`;
  };
  const planCount=f=>(f?.plans||[]).length;

  const pickFile=()=>{
    importJSON(d=>{
      if(!d||!Array.isArray(d.firms)){alert("このファイルにはfirmsデータがありません");return}
      const base=getCurrentData();
      const p=planMerge(base,d);
      setIncoming(d);
      setPlan(p);
      // 衝突の初期選択は「両方残す」（最も安全）
      const init={};
      p.conflicts.forEach(c=>{init[c.name]="both"});
      setChoices(init);
    });
  };

  const apply=()=>{
    if(!plan)return;
    onApplyMerge(incoming, plan, choices);
    onClose();
  };

  const base=getCurrentData();

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:620,maxWidth:"94vw",maxHeight:"88vh",overflow:"auto",background:C.surface,border:`1px solid ${C.blue}`,borderRadius:8,padding:"14px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontWeight:700,color:C.blue,fontSize:"0.9rem"}}>🔀 マージ取込（2台のデータ統合）</span>
          <div style={{flex:1}} />
          <span onClick={onClose} style={{cursor:"pointer",color:C.red,fontSize:"1rem",lineHeight:1}}>×</span>
        </div>

        {!plan?(
          <div>
            <div style={{fontSize:"0.72rem",color:C.text,lineHeight:1.7,marginBottom:12}}>
              もう一方のPCで「全保存」して書き出したJSONファイルを選んでください。<br/>
              現在のデータ（<b style={{color:C.accent}}>{summary(base)}</b>）に<b>足し合わせ</b>ます。上書きではありません。
            </div>
            <Btn color={C.blue} onClick={pickFile} style={{fontSize:"0.74rem",padding:"5px 14px"}}>📂 JSONファイルを選ぶ</Btn>
          </div>
        ):(
          <div>
            {/* 自動追加分 */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:C.green,marginBottom:4}}>そのまま追加：{plan.autoAdd.length} 件</div>
              {plan.autoAdd.length===0?(
                <div style={{fontSize:"0.66rem",color:C.textDim}}>（重複しない新規Firmはありません）</div>
              ):(
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {plan.autoAdd.map(f=>(
                    <span key={f.id} style={{fontSize:"0.66rem",color:C.text,background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:3,padding:"2px 6px"}}>{f.name}（Plan {planCount(f)}）</span>
                  ))}
                </div>
              )}
            </div>

            {/* 衝突 */}
            <div style={{marginBottom:8}}>
              <div style={{fontSize:"0.72rem",fontWeight:700,color:C.yellow,marginBottom:4}}>同名Firmの衝突：{plan.conflicts.length} 件</div>
              {plan.conflicts.length===0?(
                <div style={{fontSize:"0.66rem",color:C.textDim}}>（衝突はありません）</div>
              ):(
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {plan.conflicts.map(c=>(
                    <div key={c.name} style={{background:C.surfaceAlt,border:`1px solid ${C.yellow}`,borderRadius:5,padding:"7px 9px"}}>
                      <div style={{fontSize:"0.74rem",fontWeight:700,color:C.textBright,marginBottom:5}}>{c.name}</div>
                      <div style={{fontSize:"0.62rem",color:C.textDim,marginBottom:6}}>
                        こちら: Plan {planCount(c.base)} ／ ファイル: Plan {planCount(c.incoming)}
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {[["both","両方残す（別Firmで複製）",C.green],["file","ファイルで上書き",C.blue],["keep","こちらを残す（スキップ）",C.textDim]].map(([val,labelTxt,col])=>(
                          <button key={val} onClick={()=>setChoices(p=>({...p,[c.name]:val}))}
                            style={{background:choices[c.name]===val?col:"transparent",color:choices[c.name]===val?C.bg:col,border:`1px solid ${col}`,borderRadius:3,padding:"3px 8px",fontSize:"0.64rem",fontWeight:700,cursor:"pointer"}}>
                            {labelTxt}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div style={{fontSize:"0.66rem",color:C.text,marginBottom:10}}>
              用語辞典：新規 {plan.glossaryAdd.length} 件を追加（既存keyは保持）
            </div>

            <div style={{display:"flex",gap:6,justifyContent:"flex-end",borderTop:`1px solid ${C.border}`,paddingTop:10}}>
              <Btn color={C.textDim} onClick={()=>{setPlan(null);setIncoming(null);setChoices({})}} style={{fontSize:"0.7rem"}}>← 戻る</Btn>
              <Btn color={C.blue} onClick={apply} style={{fontSize:"0.72rem",padding:"4px 14px"}}>この内容でマージ実行</Btn>
            </div>
            <div style={{marginTop:8,fontSize:"0.6rem",color:C.textDim,lineHeight:1.6}}>
              ※ 実行直前に現在の状態を自動バックアップします（💾から復元可能）。
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// Firm統合モーダル（同名2箱を1つに寄せる）
// ═══════════════════════════════════════════════════
function ConsolidateModal({show,onClose,firms,tabDataMap,initialKeepId,onApply}) {
  const [keepId,setKeepId]=useState(initialKeepId||"");
  const [absorbId,setAbsorbId]=useState("");
  const [plan,setPlan]=useState(null);
  const [resolve,setResolve]=useState({}); // {conflictKey: 'keep'|'absorb'}

  useEffect(()=>{ if(show){ setKeepId(initialKeepId||""); setAbsorbId(""); setPlan(null); setResolve({}); } },[show,initialKeepId]);
  if(!show)return null;

  const keepFirm=firms.find(f=>f.id===keepId);
  // 吸収候補は「残す側」と同名の別Firm、なければ全Firm（残す側以外）
  const sameName=keepFirm?firms.filter(f=>f.id!==keepId&&f.name.replace(/\s*\(\d+\)\s*$/,"")===keepFirm.name.replace(/\s*\(\d+\)\s*$/,"")):[];
  const others=firms.filter(f=>f.id!==keepId);
  const absorbCandidates=sameName.length?sameName:others;

  const ckey=c=>`${c.scope}|${c.planName}|${c.slotKey}`;

  const buildPlan=()=>{
    const kf=firms.find(f=>f.id===keepId), af=firms.find(f=>f.id===absorbId);
    if(!kf||!af){alert("残す側・吸収側の両方を選んでください");return}
    if(kf.id===af.id){alert("同じFirmは選べません");return}
    const p=planFirmConsolidation(kf,af,tabDataMap);
    setPlan(p);
    const init={}; p.conflicts.forEach(c=>{init[ckey(c)]="keep"}); setResolve(init);
  };

  const apply=()=>{
    onApply(keepId,absorbId,plan,resolve);
    onClose();
  };

  const slotLabel=k=>k; // slotKeyそのまま表示（短い英字キー）

  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:640,maxWidth:"94vw",maxHeight:"88vh",overflow:"auto",background:C.surface,border:`1px solid ${C.purple}`,borderRadius:8,padding:"14px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontWeight:700,color:C.purple,fontSize:"0.9rem"}}>⤵ Firm統合（2箱を1つに）</span>
          <div style={{flex:1}} />
          <span onClick={onClose} style={{cursor:"pointer",color:C.red,fontSize:"1rem",lineHeight:1}}>×</span>
        </div>

        {/* 選択 */}
        <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:"0.62rem",color:C.green,marginBottom:3,fontWeight:700}}>残す（こちらに寄せる）</div>
            <select value={keepId} onChange={e=>{setKeepId(e.target.value);setPlan(null)}} style={{width:"100%",background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"4px 6px",fontSize:"0.72rem"}}>
              <option value="">選択...</option>
              {firms.map(f=><option key={f.id} value={f.id}>{f.name}（Plan {(f.plans||[]).length}）</option>)}
            </select>
          </div>
          <div style={{fontSize:"0.8rem",color:C.textDim,paddingBottom:5}}>◀</div>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:"0.62rem",color:C.red,marginBottom:3,fontWeight:700}}>吸収して削除する</div>
            <select value={absorbId} onChange={e=>{setAbsorbId(e.target.value);setPlan(null)}} disabled={!keepId} style={{width:"100%",background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:3,padding:"4px 6px",fontSize:"0.72rem"}}>
              <option value="">選択...</option>
              {absorbCandidates.map(f=><option key={f.id} value={f.id}>{f.name}（Plan {(f.plans||[]).length}）</option>)}
            </select>
          </div>
          <Btn color={C.purple} onClick={buildPlan} disabled={!keepId||!absorbId} style={{fontSize:"0.7rem",padding:"5px 12px"}}>突合する</Btn>
        </div>

        {plan&&(
          <div>
            {/* Plan処理サマリ */}
            <div style={{marginBottom:8,fontSize:"0.68rem",color:C.text}}>
              <span style={{color:C.green,fontWeight:700}}>移動するPlan：</span>
              {plan.planActions.filter(a=>a.type==="move").length===0?"なし":
                plan.planActions.filter(a=>a.type==="move").map(a=>a.absorbPlan.name).join("、")}
            </div>
            <div style={{marginBottom:10,fontSize:"0.68rem",color:C.text}}>
              <span style={{color:C.yellow,fontWeight:700}}>同名Planを合成：</span>
              {plan.planActions.filter(a=>a.type==="merge").length===0?"なし":
                plan.planActions.filter(a=>a.type==="merge").map(a=>a.absorbPlan.name).join("、")}
            </div>

            {/* 競合 */}
            <div style={{fontSize:"0.72rem",fontWeight:700,color:C.yellow,marginBottom:5}}>値の競合：{plan.conflicts.length} 件</div>
            {plan.conflicts.length===0?(
              <div style={{fontSize:"0.66rem",color:C.textDim,marginBottom:8}}>競合なし。空欄は吸収側の値で補完されます。</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                {plan.conflicts.map(c=>{
                  const key=ckey(c);
                  return (
                    <div key={key} style={{background:C.surfaceAlt,border:`1px solid ${C.yellow}`,borderRadius:5,padding:"7px 9px"}}>
                      <div style={{fontSize:"0.64rem",color:C.textDim,marginBottom:5}}>
                        {c.scope==="firm"?"Firm本体":`Plan「${c.planName}」`} ／ 項目: <b style={{color:C.textBright}}>{slotLabel(c.slotKey)}</b>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setResolve(p=>({...p,[key]:"keep"}))} style={{flex:1,textAlign:"left",background:resolve[key]==="keep"?C.green:"transparent",color:resolve[key]==="keep"?C.bg:C.text,border:`1px solid ${C.green}`,borderRadius:3,padding:"4px 7px",fontSize:"0.64rem",cursor:"pointer"}}>
                          <div style={{fontWeight:700,fontSize:"0.6rem",marginBottom:2}}>残す側</div>
                          <div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.keepText}</div>
                        </button>
                        <button onClick={()=>setResolve(p=>({...p,[key]:"absorb"}))} style={{flex:1,textAlign:"left",background:resolve[key]==="absorb"?C.blue:"transparent",color:resolve[key]==="absorb"?C.bg:C.text,border:`1px solid ${C.blue}`,borderRadius:3,padding:"4px 7px",fontSize:"0.64rem",cursor:"pointer"}}>
                          <div style={{fontWeight:700,fontSize:"0.6rem",marginBottom:2}}>吸収側</div>
                          <div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.absorbText}</div>
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{display:"flex",gap:6,justifyContent:"flex-end",borderTop:`1px solid ${C.border}`,paddingTop:10}}>
              <Btn color={C.textDim} onClick={()=>setPlan(null)} style={{fontSize:"0.7rem"}}>← 選び直す</Btn>
              <Btn color={C.purple} onClick={apply} style={{fontSize:"0.72rem",padding:"4px 14px"}}>統合を実行</Btn>
            </div>
            <div style={{marginTop:8,fontSize:"0.6rem",color:C.textDim,lineHeight:1.6}}>
              ※ 吸収側Firmは統合後に削除されます。実行直前に自動バックアップを取ります（💾から復元可）。<br/>
              ※ アーカイブ（保管テキスト）は重複を除いて両方ぶんを残します。
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// 機能目次
// ═══════════════════════════════════════════════════
function FuncIndex({show,onClose}) {
  const [chk,setChk]=useState({});
  const [cmt,setCmt]=useState({});
  const [collapsed,setCollapsed]=useState({});
  if(!show)return null;
  const cnt=Object.keys(chk).length;
  const allItems=FUNC_INDEX.flatMap(g=>g.items);
  const copy=()=>{
    const lines=[];
    FUNC_INDEX.forEach(g=>{
      const checked=g.items.filter(f=>chk[f.id]);
      if(!checked.length)return;
      lines.push(`[${g.group}]`);
      checked.forEach(f=>{const c=(cmt[f.id]||"").trim();lines.push(c?`  ${f.label} | ${c}`:`  ${f.label}`)});
    });
    return lines.join("\n");
  };
  return (
    <div style={{position:"fixed",top:8,right:8,zIndex:9999,width:340,maxHeight:"85vh",overflow:"auto",background:C.surface,border:`1px solid ${C.accent}`,borderRadius:8,padding:"10px 12px",boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:"0.78rem",fontWeight:700,color:C.accent}}>📋 機能目次</span>
        <div style={{display:"flex",gap:4}}>
          {cnt>0&&<CopyBtn getText={copy} label={`コピー(${cnt})`} color={C.accent} />}
          {cnt>0&&<Btn color={C.textDim} onClick={()=>{setChk({});setCmt({})}}>クリア</Btn>}
          <span onClick={onClose} style={{cursor:"pointer",color:C.textDim,fontSize:"1rem"}}>✕</span>
        </div>
      </div>
      {FUNC_INDEX.map(g=>{
        const gc=collapsed[g.group];
        const groupChecked=g.items.filter(f=>chk[f.id]).length;
        return (
          <div key={g.group} style={{marginBottom:4}}>
            <div onClick={()=>setCollapsed(p=>({...p,[g.group]:!p[g.group]}))} style={{
              display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"4px 0",
              borderBottom:`1px solid ${C.border}`,userSelect:"none",
            }}>
              <span style={{fontSize:"0.6rem",color:C.textDim}}>{gc?"▶":"▼"}</span>
              <span style={{fontSize:"0.72rem",fontWeight:700,color:C.yellow}}>{g.group}</span>
              <span style={{fontSize:"0.58rem",color:C.textDim}}>{g.items.length}</span>
              {groupChecked>0&&<span style={{fontSize:"0.58rem",color:C.accent}}>✓{groupChecked}</span>}
            </div>
            {!gc&&g.items.map(f=>(
              <div key={f.id} style={{padding:"2px 0 2px 12px"}}>
                <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}>
                  <input type="checkbox" checked={!!chk[f.id]} onChange={()=>setChk(p=>{const n={...p};n[f.id]?delete n[f.id]:n[f.id]=true;return n})} style={{accentColor:C.accent,margin:0}} />
                  <span style={{fontSize:"0.68rem",fontWeight:600,color:chk[f.id]?C.accent:C.textBright}}>{f.label}</span>
                  <span style={{fontSize:"0.55rem",color:C.textDim}}>{f.desc}</span>
                </label>
                {chk[f.id]&&<input type="text" value={cmt[f.id]||""} placeholder="コメント" onChange={e=>setCmt(p=>({...p,[f.id]:e.target.value}))}
                  style={{width:"calc(100% - 24px)",marginLeft:24,marginTop:1,background:C.bg,color:C.textBright,border:`1px solid ${C.accent}44`,borderRadius:3,padding:"1px 6px",fontSize:"0.62rem",fontFamily:font,outline:"none"}} />}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// MAIN APP

function App() {

  const [firms,setFirms]=useState([{"id":"f2","name":"The5ers","plans":[{"id":"p2","name":"High Stakes"},{"id":"p3","name":"Hyper-Growth"},{"id":"p4","name":"Bootcamp"},{"id":"p5","name":"Pro-Growth"}]},{"id":"f3","name":"FundingPips","plans":[{"id":"p6","name":"FundingPips Zero"},{"id":"p7","name":"1-Step"},{"id":"p8","name":"2-Step Standard"},{"id":"p9","name":"2-Step Pro"}]},{"id":"f4","name":"FundedNext","plans":[{"id":"p10","name":"Stellar 1-Step"},{"id":"p11","name":"Stellar 2-Step"},{"id":"p12","name":"Stellar Lite"},{"id":"p13","name":"Stellar Instant"}]}]);
  const [activeTabId,setActiveTabId]=useState("f2");
  const nextId=useRef(14);

  // アクティブがFirmかPlanか判定
  const activeType=useMemo(()=>{
    for(const f of firms){if(f.id===activeTabId)return"firm";for(const p of(f.plans||[]))if(p.id===activeTabId)return"plan"}return"firm";
