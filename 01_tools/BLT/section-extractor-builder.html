<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Section Extractor Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080910;--bg2:#0d0e14;--bg3:#12131c;
  --border:#1a1d28;--border2:#252836;
  --text:#c8ccd4;--text2:#888;--text3:#555;
  --green:#00ff88;--green2:#00cc66;--green-dim:#00ff881a;
  --blue:#2962ff;--red:#ff4444;
}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;font-size:13px}
::selection{background:#2962ff33}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr auto;height:100vh;gap:0}
.header{grid-column:1/-1;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;background:var(--bg)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
.header-title{font-weight:700;color:#e1e4ea;font-size:14px;letter-spacing:.5px}
.header-url{margin-left:auto;font-size:10px;color:var(--text3);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Left panel */
.panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-right{display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;justify-content:space-between}
.badge{background:var(--green-dim);color:var(--green);padding:2px 8px;border-radius:10px;font-size:10px;border:1px solid #00ff882a}

/* JSON input */
.json-input{flex:1;border:none;background:var(--bg2);color:#9ca3af;font-family:inherit;font-size:11px;padding:16px;resize:none;outline:none}
.json-input::placeholder{color:var(--text3)}
.parse-btn{margin:12px;padding:10px;background:var(--border);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.parse-btn:hover{background:var(--border2);border-color:#333}

/* Section list */
.section-list{flex:1;overflow-y:auto;padding:8px}
.group{margin-bottom:12px}
.group-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px;padding:4px 8px 6px}
.section-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:3px}
.section-item:hover{background:var(--bg3);border-color:var(--border)}
.section-item.selected{background:var(--green-dim);border-color:#00ff882a}
.section-item input[type=checkbox]{accent-color:var(--green);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.section-key{font-size:11px;font-weight:600;color:#a0e4c0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-item.selected .section-key{color:var(--green)}
.section-meta{font-size:9px;color:var(--text3);flex-shrink:0;text-align:right;line-height:1.6}
.section-meta span{display:block}

/* Right panel - output */
.output-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.output-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3)}
.output-placeholder .arrow{font-size:32px;opacity:.3}
.output-placeholder p{font-size:11px}
.selected-list{padding:12px 16px;border-bottom:1px solid var(--border);min-height:48px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.selected-tag{background:var(--green-dim);border:1px solid #00ff882a;color:var(--green);padding:3px 10px;border-radius:20px;font-size:10px;display:flex;align-items:center;gap:6px}
.selected-tag button{background:none;border:none;color:var(--green);cursor:pointer;font-size:12px;line-height:1;opacity:.7}
.selected-tag button:hover{opacity:1}
.no-selection{color:var(--text3);font-size:11px}

.bookmarklet-box{flex:1;display:flex;flex-direction:column;padding:16px;gap:10px}
.bookmarklet-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;display:flex;justify-content:space-between;align-items:center}
.bookmarklet-code{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;color:var(--green);font-size:11px;font-family:inherit;resize:none;outline:none;word-break:break-all}
.bookmarklet-code.empty{color:var(--text3);font-style:italic}
.copy-btn{padding:10px 20px;background:linear-gradient(135deg,var(--green),var(--green2));color:#000;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s;flex-shrink:0}
.copy-btn:hover{opacity:.85}
.copy-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.copy-btn.copied{background:var(--border);color:var(--green)}

/* Footer */
.footer{grid-column:1/-1;border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;background:var(--bg)}
.footer-hint{font-size:10px;color:var(--text3)}
.select-all-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--text2);font-family:inherit;font-size:10px;padding:3px 10px;cursor:pointer;transition:all .15s}
.select-all-btn:hover{border-color:#444;color:var(--text)}
.clear-btn{background:none;border:none;color:var(--text3);font-family:inherit;font-size:10px;cursor:pointer}
.clear-btn:hover{color:var(--red)}
.error{background:#ff444411;border:1px solid #ff44442a;border-radius:6px;padding:8px 12px;color:var(--red);font-size:11px;margin:8px}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
</style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <div class="header">
    <div class="dot"></div>
    <span class="header-title">SECTION EXTRACTOR BUILDER</span>
    <span class="header-url" id="scannedUrl">目次JSONを貼り付けてください</span>
  </div>

  <!-- Left: JSON input + section list -->
  <div class="panel-left">
    <div id="inputPanel">
      <div class="panel-header">
        <span>① 目次スキャン JSON</span>
      </div>
      <textarea class="json-input" id="jsonInput" placeholder='toc-scanner の出力JSONをここに貼り付け...'></textarea>
      <button class="parse-btn" onclick="parseJson()">PARSE →</button>
      <div id="parseError" class="error" style="display:none"></div>
    </div>

    <div id="listPanel" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="panel-header">
        <span>セクション一覧</span>
        <span class="badge" id="sectionCount">0</span>
      </div>
      <div class="section-list" id="sectionList"></div>
    </div>
  </div>

  <!-- Right: selected + output -->
  <div class="panel-right">
    <div class="panel-header">
      <span>② 選択中のセクション</span>
      <span class="badge" id="selectedCount">0</span>
    </div>
    <div class="selected-list" id="selectedList">
      <span class="no-selection">左のリストからセクションを選択</span>
    </div>
    <div class="output-area">
      <div class="bookmarklet-box">
        <div class="bookmarklet-label">
          <span>生成されたブックマークレット</span>
          <span id="bmSize" style="font-size:10px;color:var(--text3)"></span>
        </div>
        <textarea class="bookmarklet-code empty" id="bmOutput" readonly>セクションを選択すると自動生成されます</textarea>
        <button class="copy-btn" id="copyBtn" disabled onclick="copyBookmarklet()">COPY BOOKMARKLET</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="select-all-btn" onclick="selectAll()">全選択</button>
    <button class="select-all-btn" onclick="selectNone()">全解除</button>
    <button class="clear-btn" onclick="resetAll()">リセット</button>
    <span class="footer-hint" style="margin-left:auto">ブックマークレットをコピー → ブックマークのURL欄に貼り付け → 対象ページで実行</span>
  </div>
</div>

<script>
var tocData = null;
var selected = new Set();
var allItems = [];

function parseJson() {
  var raw = document.getElementById('jsonInput').value.trim();
  var err = document.getElementById('parseError');
  err.style.display = 'none';
  try {
    var d = JSON.parse(raw);
    if (!d.toc) throw new Error('toc-scannerの出力ではありません');
    tocData = d;
    document.getElementById('scannedUrl').textContent = d._url || '?';
    renderSections();
  } catch(e) {
    err.textContent = 'Parse error: ' + e.message;
    err.style.display = 'block';
  }
}

function renderSections() {
  var toc = tocData.toc;
  var list = document.getElementById('sectionList');
  list.innerHTML = '';
  allItems = [];
  selected.clear();

  // by ID
  var ids = toc.byId || {};
  if (Object.keys(ids).length) {
    addGroup(list, 'ID ベース', Object.keys(ids).map(function(id) {
      var info = ids[id];
      return { selector: '#' + id, label: '#' + id, meta: [info.tag, chars(info.chars), info.tables ? 'tables:'+info.tables : null].filter(Boolean) };
    }));
  }

  // by data attr
  var da = toc.byDataAttr || {};
  if (Object.keys(da).length) {
    addGroup(list, 'data属性 ベース', Object.keys(da).map(function(k) {
      var info = da[k];
      var parts = k.split('=');
      var sel = '[' + parts[0] + '="' + (parts[1]||'') + '"]';
      return { selector: sel, label: k, meta: ['×'+info.count, chars(info.chars)] };
    }));
  }

  // semantic
  var sem = toc.bySemantic || {};
  Object.keys(sem).forEach(function(tag) {
    var items = sem[tag];
    addGroup(list, 'セマンティック: <' + tag + '>', items.map(function(item) {
      return { selector: item.selector, label: item.selector, meta: [chars(item.chars)] };
    }));
  });

  // tables
  var tables = toc.tables || [];
  if (tables.length) {
    addGroup(list, 'テーブル', tables.map(function(t) {
      return { selector: t.id.startsWith('#') ? t.id : t.id, label: t.id, meta: ['rows:'+t.rows, t.headers.slice(0,3).join('/')] };
    }));
  }

  var total = allItems.length;
  document.getElementById('sectionCount').textContent = total;
  document.getElementById('inputPanel').style.display = 'none';
  var lp = document.getElementById('listPanel');
  lp.style.display = 'flex';
  updateSelected();
}

function addGroup(container, label, items) {
  if (!items.length) return;
  var g = document.createElement('div');
  g.className = 'group fade-in';
  var gl = document.createElement('div');
  gl.className = 'group-label';
  gl.textContent = label;
  g.appendChild(gl);
  items.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'section-item';
    div.dataset.selector = item.selector;
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.addEventListener('change', function() { toggleItem(item.selector, div, cb); });
    var key = document.createElement('span');
    key.className = 'section-key';
    key.textContent = item.label;
    var meta = document.createElement('span');
    meta.className = 'section-meta';
    item.meta.forEach(function(m) { if(m){ var s=document.createElement('span');s.textContent=m;meta.appendChild(s); } });
    div.appendChild(cb);
    div.appendChild(key);
    div.appendChild(meta);
    div.addEventListener('click', function(e) { if(e.target !== cb){ cb.checked = !cb.checked; toggleItem(item.selector, div, cb); } });
    g.appendChild(div);
    allItems.push({ selector: item.selector, el: div, cb: cb });
  });
  container.appendChild(g);
}

function chars(n) { return n > 999 ? Math.round(n/1000)+'K chars' : n+' chars'; }

function toggleItem(sel, div, cb) {
  if (cb.checked) { selected.add(sel); div.classList.add('selected'); }
  else { selected.delete(sel); div.classList.remove('selected'); }
  updateSelected();
}

function updateSelected() {
  var sl = document.getElementById('selectedList');
  var cnt = document.getElementById('selectedCount');
  cnt.textContent = selected.size;
  sl.innerHTML = '';
  if (!selected.size) {
    sl.innerHTML = '<span class="no-selection">左のリストからセクションを選択</span>';
    setOutput('');
    return;
  }
  selected.forEach(function(sel) {
    var tag = document.createElement('div');
    tag.className = 'selected-tag fade-in';
    tag.innerHTML = '<span>' + esc(sel) + '</span><button onclick="removeItem(\'' + esc(sel) + '\')">×</button>';
    sl.appendChild(tag);
  });
  generateBookmarklet();
}

function removeItem(sel) {
  selected.delete(sel);
  allItems.forEach(function(item) { if(item.selector === sel){ item.cb.checked=false; item.el.classList.remove('selected'); } });
  updateSelected();
}

function selectAll() { allItems.forEach(function(item){ item.cb.checked=true; item.el.classList.add('selected'); selected.add(item.selector); }); updateSelected(); }
function selectNone() { allItems.forEach(function(item){ item.cb.checked=false; item.el.classList.remove('selected'); }); selected.clear(); updateSelected(); }

function resetAll() {
  tocData = null; selected.clear(); allItems = [];
  document.getElementById('jsonInput').value = '';
  document.getElementById('scannedUrl').textContent = '目次JSONを貼り付けてください';
  document.getElementById('inputPanel').style.display = 'block';
  document.getElementById('listPanel').style.display = 'none';
  document.getElementById('parseError').style.display = 'none';
  setOutput('');
  updateSelected();
}

function generateBookmarklet() {
  var selectors = Array.from(selected);
  var url = (tocData && tocData._url) || '';
  var siteName = url ? url.replace(/https?:\/\//, '').replace(/\//g, '-').replace(/[^a-z0-9-]/gi, '').substring(0, 30) : 'site';

  var selectorsJson = JSON.stringify(selectors);

  var code = "javascript:void((function(){'use strict';" +
    "var targets=" + selectorsJson + ";" +
    "var result={_tool:'extractor-" + siteName + "',_version:'1.0',_url:location.href,_at:new Date().toISOString(),data:{}};" +
    "targets.forEach(function(target){" +
      "var el=null;try{el=document.querySelector(target);}catch(e){result.data[target]={error:'invalid selector'};return;}" +
      "if(!el){result.data[target]={error:'not found'};return;}" +
      "var out={selector:target,tag:el.tagName.toLowerCase()};" +
      "if(el.id)out.id=el.id;" +
      "var tbls=el.tagName==='TABLE'?[el]:Array.from(el.querySelectorAll('table'));" +
      "if(tbls.length){out.tables=tbls.map(function(t){" +
        "var th=t.querySelector('thead');" +
        "var headers=th?Array.from(th.querySelectorAll('th,td')).map(function(c){return(c.textContent||'').trim();}).filter(Boolean):[];" +
        "var rows=Array.from(t.querySelectorAll('tbody tr')).map(function(tr){" +
          "var cells=Array.from(tr.querySelectorAll('td,th')).map(function(td){return(td.textContent||'').trim();});" +
          "if(!headers.length)return cells;" +
          "var obj={};cells.forEach(function(v,i){obj[headers[i]||('col'+i)]=v;});return obj;" +
        "});return{headers:headers,rows:rows};});}" +
      "var links=Array.from(el.querySelectorAll('a[href]')).slice(0,50).map(function(a){return{text:(a.textContent||'').trim().substring(0,80),href:a.href};});" +
      "if(links.length)out.links=links;" +
      "out.text=(el.innerText||'').trim();" +
      "out.charCount=out.text.length;" +
      "result.data[target]=out;" +
    "});" +
    "var json=JSON.stringify(result,null,2);" +
    "var kb=(new Blob([json]).size/1024).toFixed(1);" +
    "navigator.clipboard.writeText(json).then(function(){toast('✅ 抽出完了 ('+kb+' KB)');}).catch(function(){var ta=document.createElement('textarea');ta.value=json;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✅ 抽出完了 ('+kb+' KB)');});" +
    "function toast(msg){var d=document.createElement('div');d.textContent=msg;d.style.cssText='position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#0f0;padding:12px 20px;border-radius:8px;font-family:monospace;font-size:14px;z-index:999999;box-shadow:0 4px 12px rgba(0,0,0,.5);border:1px solid #0f03;transition:opacity .5s;';document.body.appendChild(d);setTimeout(function(){d.style.opacity='0';},2500);setTimeout(function(){d.remove();},3200);}" +
  "})())";

  setOutput(code);
}

function setOutput(code) {
  var ta = document.getElementById('bmOutput');
  var btn = document.getElementById('copyBtn');
  var sz = document.getElementById('bmSize');
  if (!code) {
    ta.value = 'セクションを選択すると自動生成されます';
    ta.className = 'bookmarklet-code empty';
    btn.disabled = true;
    sz.textContent = '';
  } else {
    ta.value = code;
    ta.className = 'bookmarklet-code';
    btn.disabled = false;
    sz.textContent = (new Blob([code]).size / 1024).toFixed(1) + ' KB';
  }
}

function copyBookmarklet() {
  var code = document.getElementById('bmOutput').value;
  var btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(code).then(function() {
    btn.textContent = '✓ COPIED';
    btn.className = 'copy-btn copied';
    setTimeout(function() { btn.textContent = 'COPY BOOKMARKLET'; btn.className = 'copy-btn'; }, 2000);
  }).catch(function() {
    var ta = document.getElementById('bmOutput');
    ta.select();
    document.execCommand('copy');
    btn.textContent = '✓ COPIED';
    btn.className = 'copy-btn copied';
    setTimeout(function() { btn.textContent = 'COPY BOOKMARKLET'; btn.className = 'copy-btn'; }, 2000);
  });
}

function esc(s) { return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

// Auto-parse on paste
document.getElementById('jsonInput').addEventListener('paste', function() {
  setTimeout(parseJson, 50);
});
</script>
</body>
</html>
