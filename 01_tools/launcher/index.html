<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PFD Launcher</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #888;
    --line: #ececec;
    --line-strong: #ccc;
    --accent: #2563eb;
    --hover: #f5f7fb;
    --danger: #dc2626;
    --overlay: rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", "Yu Gothic UI", "Hiragino Sans", system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    overflow: hidden;
  }
  body {
    display: flex; flex-direction: column; height: 100vh;
    transform: translateX(100%);
    transition: transform 0.22s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  body.ready { transform: translateX(0); }
  @media (prefers-reduced-motion: reduce) {
    body { transition: none; transform: translateX(0); }
  }

  header {
    flex-shrink: 0;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--line);
  }
  .titlebar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .titlebar h1 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .titlebar h1 .accent { color: var(--accent); }
  .icon-btn {
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--fg);
    width: 26px; height: 26px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .icon-btn:hover { background: var(--hover); border-color: var(--accent); color: var(--accent); }
  #search {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font: inherit;
    color: var(--fg);
    background: var(--bg);
    outline: none;
  }
  #search:focus { border-color: var(--accent); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px 14px;
  }
  .cat-section { margin-bottom: 14px; }
  .cat-section h2 {
    margin: 6px 0 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .row {
    display: flex; align-items: stretch;
    border: 1px solid var(--line);
    border-radius: 5px;
    margin-bottom: 5px;
    overflow: hidden;
    background: var(--bg);
  }
  .row:hover { border-color: var(--accent); }
  .row .open {
    flex: 1;
    padding: 9px 11px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    min-width: 0;
  }
  .row .open:hover { background: var(--hover); }
  .row .name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .desc { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .edit {
    border: none; border-left: 1px solid var(--line);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    padding: 0 11px;
    font-size: 13px;
  }
  .row .edit:hover { background: var(--hover); color: var(--accent); }

  .empty {
    color: var(--muted);
    padding: 24px;
    text-align: center;
    font-size: 12px;
  }
  footer {
    flex-shrink: 0;
    padding: 6px 14px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 10px;
    display: flex; justify-content: space-between;
  }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: var(--overlay);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: 8px;
    width: 92%; max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 16px 18px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  .modal h3 {
    margin: 0 0 12px;
    font-size: 13px;
    font-weight: 600;
  }
  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
    letter-spacing: 0.04em;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 6px 9px;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    font: inherit;
    color: var(--fg);
    background: var(--bg);
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 50px; }
  .field .hint { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Segmented type toggle */
  .seg { display: flex; border: 1px solid var(--line-strong); border-radius: 4px; overflow: hidden; }
  .seg-btn {
    flex: 1;
    padding: 6px 0;
    border: none;
    background: var(--bg);
    color: var(--muted);
    font: inherit;
    cursor: pointer;
  }
  .seg-btn + .seg-btn { border-left: 1px solid var(--line-strong); }
  .seg-btn.active { background: var(--accent); color: #fff; }
  .seg-btn:not(.active):hover { background: var(--hover); }

  /* App row marker */
  .row .open .name .badge {
    font-size: 9px; font-weight: 600;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 0 4px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.06em;
  }

  /* Slot number badge (left of row) */
  .row .slot {
    flex-shrink: 0;
    width: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: var(--accent);
    border-right: 1px solid var(--line);
    background: var(--hover);
    user-select: none;
  }
  .row .slot.empty { color: transparent; background: transparent; border-right: none; width: 0; }

  /* Combo (2-screen) checklist inside modal */
  #comboField { display: none; }
  #comboField.show { display: block; }
  .combo-list {
    max-height: 130px; overflow-y: auto;
    border: 1px solid var(--line-strong); border-radius: 4px;
    padding: 4px 6px;
  }
  .combo-list label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--fg); padding: 3px 2px;
    cursor: pointer; letter-spacing: 0;
  }
  .combo-list label:hover { color: var(--accent); }
  .combo-list input { width: auto; margin: 0; }
  .combo-list .none { color: var(--muted); font-size: 11px; padding: 4px 2px; }

  /* Drag & drop overlay */
  body.dragover::after {
    content: 'ドロップで登録';
    position: fixed; inset: 8px;
    border: 2px dashed var(--accent);
    border-radius: 8px;
    background: rgba(37,99,235,0.06);
    color: var(--accent);
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    z-index: 150; pointer-events: none;
  }

  .modal-actions {
    display: flex; gap: 8px; margin-top: 14px;
    justify-content: flex-end;
  }
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    color: var(--fg);
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
  }
  .btn:hover { background: var(--hover); }
  .btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn.primary:hover { opacity: 0.9; background: var(--accent); }
  .btn.danger {
    color: var(--danger);
    border-color: var(--danger);
    margin-right: auto;
  }
  .btn.danger:hover { background: #fef2f2; }

  .toast {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a; color: white;
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* Tab bar (Tools / Clipboard) */
  .tabs { display: flex; gap: 0; margin-top: 8px; }
  .tab {
    flex: 1; padding: 6px 0; text-align: center;
    border: none; border-bottom: 2px solid transparent;
    background: var(--bg); color: var(--muted);
    font: inherit; font-size: 12px; cursor: pointer;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab:not(.active):hover { background: var(--hover); }

  /* Clipboard view */
  #clipMain { flex: 1; overflow-y: auto; padding: 8px 14px 14px; }
  .clip-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .clip-head .lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .clip-clear {
    border: 1px solid var(--line); background: var(--bg); color: var(--muted);
    border-radius: 4px; padding: 2px 8px; font: inherit; font-size: 11px; cursor: pointer;
  }
  .clip-clear:hover { color: var(--danger); border-color: var(--danger); }
  .clip-item {
    border: 1px solid var(--line); border-radius: 5px;
    margin-bottom: 5px; padding: 7px 9px;
    cursor: pointer; background: var(--bg);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .clip-item:hover { border-color: var(--accent); background: var(--hover); }
  .clip-item .kind { flex-shrink: 0; font-size: 12px; opacity: 0.7; }
  .clip-item .body { min-width: 0; flex: 1; }
  .clip-item .txt {
    font-size: 12px; white-space: pre-wrap; word-break: break-word;
    max-height: 56px; overflow: hidden;
  }
  .clip-item .meta { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .clip-item img {
    max-width: 100%; max-height: 120px; border-radius: 3px;
    border: 1px solid var(--line); display: block;
  }
</style>
</head>
<body>

<header>
  <div class="titlebar">
    <h1>PFD <span class="accent">Launcher</span></h1>
    <button id="addBtn" class="icon-btn" title="ツールを追加">＋</button>
  </div>
  <input id="search" type="text" placeholder="検索" autofocus>
  <div class="tabs">
    <button class="tab active" id="tabTools" data-view="tools">ツール</button>
    <button class="tab" id="tabClip" data-view="clip">📋 履歴</button>
  </div>
</header>

<main id="main">
  <div class="empty">読み込み中…</div>
</main>

<main id="clipMain" style="display:none">
  <div class="clip-head">
    <span class="lbl">クリップボード履歴</span>
    <button class="clip-clear" id="clipClear">クリア</button>
  </div>
  <div id="clipList"><div class="empty">—</div></div>
</main>

<footer>
  <span id="footerInfo"></span>
  <span id="footerStatus"></span>
</footer>

<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">ツールを追加</h3>
    <div class="field">
      <label>種類</label>
      <div class="seg" id="typeSeg">
        <button type="button" class="seg-btn active" data-type="web">Web / URL</button>
        <button type="button" class="seg-btn" data-type="app">アプリ (.exe/.lnk)</button>
      </div>
    </div>
    <div class="field">
      <label>名前 *</label>
      <input id="f_name" type="text" placeholder="Page Maker v12">
    </div>
    <div class="field">
      <label>パス *</label>
      <div style="display:flex; gap:6px;">
        <input id="f_path" type="text" placeholder="/01_tools/core/page-maker-v12.html" style="flex:1;">
        <button type="button" class="btn" id="browseBtn" title="ファイル選択" style="padding:6px 10px;">📁</button>
      </div>
      <div class="hint" id="pathHint">サーバルート起点（例: /01_tools/core/xxx.html）または http(s)://...</div>
    </div>
    <div class="field">
      <label>カテゴリ</label>
      <select id="f_category"></select>
    </div>
    <div class="field">
      <label>説明</label>
      <textarea id="f_description" placeholder="短い説明（省略可）"></textarea>
    </div>
    <div class="field">
      <label>ホットキー番号（パネル表示中に押すと起動）</label>
      <select id="f_slot">
        <option value="">なし</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
      </select>
    </div>
    <div class="field" id="comboField">
      <label>2画面起動（Shift+番号で一緒に開く）</label>
      <div class="combo-list" id="f_combo"></div>
      <div class="hint">チェックしたツールを、このツールと同時に起動します。</div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="deleteBtn" style="display:none">削除</button>
      <button class="btn" id="cancelBtn">キャンセル</button>
      <button class="btn primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let data = { categories: {}, tools: [] };
let query = '';
let editingIdx = -1;
let formType = 'web';   // 'web' | 'app' — current add/edit modal type

const HINTS = {
  web: 'サーバルート起点（例: /01_tools/core/xxx.html）または http(s)://...',
  app: 'アプリ(.exe)やショートカット(.lnk)の絶対パス。📁はスタートメニュー起点で開きます（インストール済みアプリ/PWAもそこ）',
};
const PLACEHOLDERS = {
  web: '/01_tools/core/page-maker-v12.html',
  app: 'C:\\Users\\...\\App.lnk',
};

const setType = (type) => {
  formType = (type === 'app') ? 'app' : 'web';
  document.querySelectorAll('#typeSeg .seg-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === formType);
  });
  $('pathHint').textContent = HINTS[formType];
  $('f_path').placeholder = PLACEHOLDERS[formType];
};

const toast = (msg) => {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 1600);
};

const load = async () => {
  try {
    const res = await fetch('/api/tools?t=' + Date.now());
    data = await res.json();
    if (!data.tools) data.tools = [];
    if (!data.categories) data.categories = {};
    populateCatSelect();
    render();
  } catch (e) {
    $('main').innerHTML = '<div class="empty">読み込み失敗: ' + escapeHtml(e.message) + '</div>';
  }
};

const save = async () => {
  const payload = { categories: data.categories, tools: data.tools };
  try {
    const res = await fetch('/api/tools', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const r = await res.json();
    if (!r.ok) throw new Error(r.error || 'save failed');
    toast('保存しました');
    return true;
  } catch (e) {
    toast('保存失敗: ' + e.message);
    return false;
  }
};

const populateCatSelect = () => {
  const sel = $('f_category');
  const cats = Object.entries(data.categories).sort((a,b)=>(a[1].order??99)-(b[1].order??99));
  sel.innerHTML = cats.map(([k, v]) => `<option value="${escapeHtml(k)}">${escapeHtml(v.label||k)}</option>`).join('')
    + '<option value="misc">misc</option>';
};

// Build the combo checklist (every tool except the one being edited).
const populateCombo = (selected, selfName) => {
  const box = $('f_combo');
  const sel = new Set(selected || []);
  const others = data.tools.filter(t => t.name && t.name !== selfName);
  box.innerHTML = others.length
    ? others.map(t => `<label><input type="checkbox" value="${escapeHtml(t.name)}"${sel.has(t.name) ? ' checked' : ''}>${escapeHtml(t.name)}</label>`).join('')
    : '<div class="none">他のツールがありません</div>';
};

const getComboSelection = () =>
  [...$('f_combo').querySelectorAll('input:checked')].map(i => i.value);

// Show the combo field only when a slot number is chosen.
const syncComboVisibility = () => {
  $('comboField').classList.toggle('show', !!$('f_slot').value);
};

const render = () => {
  const main = $('main');
  const q = query.trim().toLowerCase();
  const visible = data.tools.filter(t => !t.hidden);
  const filtered = visible.filter(t => {
    if (!q) return true;
    return t.name.toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q);
  });

  if (filtered.length === 0) {
    main.innerHTML = visible.length === 0
      ? '<div class="empty">ツール未登録<br><br>右上の ＋ から追加</div>'
      : '<div class="empty">該当なし</div>';
    $('footerInfo').textContent = filtered.length + ' / ' + visible.length;
    return;
  }

  const groups = {};
  filtered.forEach((t, i) => {
    const idx = data.tools.indexOf(t);
    const c = t.category || 'misc';
    (groups[c] = groups[c] || []).push({ t, idx });
  });
  const catOrder = Object.keys(groups).sort((a, b) =>
    (data.categories[a]?.order ?? 99) - (data.categories[b]?.order ?? 99));

  main.innerHTML = catOrder.map(c => {
    const label = data.categories[c]?.label || c;
    const rows = groups[c].map(({ t, idx }) => {
      const isApp = t.type === 'app';
      const hasCombo = Array.isArray(t.combo) && t.combo.length > 0;
      const slotTitle = t.slot ? `${t.slot} を押して起動` + (hasCombo ? ` / Shift+${t.slot} で2画面` : '') : '';
      const slot = t.slot
        ? `<div class="slot" title="${escapeHtml(slotTitle)}">${t.slot}${hasCombo ? '<span style="font-size:8px">⊞</span>' : ''}</div>`
        : `<div class="slot empty"></div>`;
      const inner = `
          <div class="name">${escapeHtml(t.name)}${isApp ? '<span class="badge">APP</span>' : ''}</div>
          ${t.description ? `<div class="desc">${escapeHtml(t.description)}</div>` : ''}`;
      const opener = isApp
        ? `<div class="open" data-launch="${idx}" role="button" tabindex="0" title="アプリを起動">${inner}</div>`
        : `<a class="open" href="${escapeHtml(t.path)}" target="_blank" rel="noopener">${inner}</a>`;
      return `
      <div class="row">
        ${slot}
        ${opener}
        <button class="edit" data-idx="${idx}" title="編集">⋯</button>
      </div>`;
    }).join('');
    return `<section class="cat-section"><h2>${escapeHtml(label)}</h2>${rows}</section>`;
  }).join('');

  main.querySelectorAll('.edit').forEach(btn => {
    btn.addEventListener('click', () => openEditModal(parseInt(btn.dataset.idx, 10)));
  });
  main.querySelectorAll('[data-launch]').forEach(el => {
    const idx = parseInt(el.dataset.launch, 10);
    el.addEventListener('click', () => launchApp(idx));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); launchApp(idx); }
    });
  });

  $('footerInfo').textContent = filtered.length + ' / ' + visible.length;
};

const launchApp = async (idx) => {
  const t = data.tools[idx];
  if (t) launchTool(t);
};

// Launch one tool by type: app → local via server, web → open URL/HTML.
const launchTool = async (t) => {
  if (!t) return;
  if (t.type === 'app') {
    try {
      const res = await fetch('/api/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: t.path }),
      });
      const r = await res.json();
      if (!r.ok) throw new Error(r.error || '起動失敗');
      toast('起動: ' + t.name);
    } catch (e) {
      toast('起動失敗: ' + e.message);
    }
  } else {
    window.open(t.path, '_blank', 'noopener');
    toast('起動: ' + t.name);
  }
};

// Number key → slot's tool (1画面). Shift → also launch its combo partners (2画面).
const launchSlot = (n, dual) => {
  const t = data.tools.find(x => !x.hidden && Number(x.slot) === n);
  if (!t) return;
  launchTool(t);
  if (dual && Array.isArray(t.combo)) {
    t.combo.forEach(name => {
      const partner = data.tools.find(x => x.name === name);
      if (partner) launchTool(partner);
    });
  }
};

const openAddModal = () => {
  editingIdx = -1;
  $('modalTitle').textContent = 'ツールを追加';
  $('deleteBtn').style.display = 'none';
  $('f_name').value = '';
  $('f_path').value = '';
  $('f_category').value = Object.keys(data.categories)[0] || 'misc';
  $('f_description').value = '';
  $('f_slot').value = '';
  populateCombo([], '');
  syncComboVisibility();
  setType('web');
  $('modal').classList.add('open');
  setTimeout(() => $('f_name').focus(), 50);
};

const openEditModal = (idx) => {
  editingIdx = idx;
  const t = data.tools[idx];
  $('modalTitle').textContent = 'ツールを編集';
  $('deleteBtn').style.display = '';
  $('f_name').value = t.name || '';
  $('f_path').value = t.path || '';
  $('f_category').value = t.category || 'misc';
  $('f_description').value = t.description || '';
  $('f_slot').value = t.slot ? String(t.slot) : '';
  populateCombo(t.combo || [], t.name);
  syncComboVisibility();
  setType(t.type === 'app' ? 'app' : 'web');
  $('modal').classList.add('open');
  setTimeout(() => $('f_name').focus(), 50);
};

const closeModal = () => $('modal').classList.remove('open');

const onSave = async () => {
  const name = $('f_name').value.trim();
  const path = $('f_path').value.trim();
  if (!name || !path) { toast('名前とパスは必須'); return; }
  const tool = {
    name,
    path,
    category: $('f_category').value || 'misc',
    description: $('f_description').value.trim(),
  };
  if (formType === 'app') tool.type = 'app';   // 'web' is the default → omit to keep json lean
  if (!tool.description) delete tool.description;

  const slot = parseInt($('f_slot').value, 10);
  if (slot >= 1 && slot <= 9) {
    tool.slot = slot;
    const combo = getComboSelection();
    if (combo.length) tool.combo = combo;
    // Enforce slot uniqueness: clear this number from any other tool.
    data.tools.forEach((other, i) => {
      if (i !== editingIdx && Number(other.slot) === slot) {
        delete other.slot;
        delete other.combo;
      }
    });
  }

  if (editingIdx >= 0) {
    data.tools[editingIdx] = tool;
  } else {
    data.tools.push(tool);
  }
  if (await save()) {
    closeModal();
    render();
  }
};

const onDelete = async () => {
  if (editingIdx < 0) return;
  if (!confirm(`「${data.tools[editingIdx].name}」を削除しますか？`)) return;
  data.tools.splice(editingIdx, 1);
  if (await save()) {
    closeModal();
    render();
  }
};

const onBrowse = async () => {
  const btn = $('browseBtn');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '…';
  try {
    const kind = formType === 'app' ? 'app' : 'html';
    const res = await fetch('/api/browse?kind=' + kind + '&t=' + Date.now());
    const r = await res.json();
    if (r.cancelled) return;
    if (!r.ok) { toast(r.error || '選択に失敗'); return; }
    $('f_path').value = r.path;
    if (r.type) setType(r.type);
    if (!$('f_name').value.trim() && r.name) {
      $('f_name').value = r.name;
    }
    $('f_name').focus();
  } catch (e) {
    toast('選択に失敗: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
};

document.querySelectorAll('#typeSeg .seg-btn').forEach(btn => {
  btn.addEventListener('click', () => setType(btn.dataset.type));
});
$('addBtn').addEventListener('click', openAddModal);
$('cancelBtn').addEventListener('click', closeModal);
$('saveBtn').addEventListener('click', onSave);
$('deleteBtn').addEventListener('click', onDelete);
$('browseBtn').addEventListener('click', onBrowse);
$('search').addEventListener('input', e => { query = e.target.value; render(); });
$('f_slot').addEventListener('change', syncComboVisibility);
$('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

const isModalOpen = () => $('modal').classList.contains('open');
const isTyping = () => {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT');
};

// Number keys launch slots while the panel is open (② = panel-focused only).
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); return; }
  if (isModalOpen() || isTyping()) return;
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (e.code >= 'Digit1' && e.code <= 'Digit9') {
    const n = Number(e.code.slice(5));
    e.preventDefault();
    launchSlot(n, e.shiftKey);
  }
});

// --- Drag & drop registration (④) ---
// URL/link drop → prefill web modal (full auto). File drop → open the confirm
// picker, because the browser sandbox never exposes a dropped file's real path.
const extractUrl = (dt) => {
  const uri = dt.getData('text/uri-list') || dt.getData('text/plain') || '';
  const line = uri.split('\n').map(s => s.trim()).find(s => /^https?:\/\//i.test(s));
  return line || '';
};
document.addEventListener('dragover', e => {
  if (isModalOpen()) return;
  e.preventDefault();
  document.body.classList.add('dragover');
});
document.addEventListener('dragleave', e => {
  if (e.relatedTarget === null) document.body.classList.remove('dragover');
});
document.addEventListener('drop', async e => {
  e.preventDefault();
  document.body.classList.remove('dragover');
  if (isModalOpen()) return;
  const dt = e.dataTransfer;
  const url = extractUrl(dt);
  if (url) {
    openAddModal();
    setType('web');
    $('f_path').value = url;
    try { $('f_name').value = new URL(url).hostname.replace(/^www\./, ''); } catch {}
    $('f_name').focus();
    toast('URLを取り込みました');
    return;
  }
  if (dt.files && dt.files.length) {
    const fname = dt.files[0].name || '';
    const isHtml = /\.html?$/i.test(fname);
    openAddModal();
    setType(isHtml ? 'web' : 'app');
    if (!isHtml && fname) $('f_name').value = fname.replace(/\.[^.]+$/, '');
    toast('パス確定のためファイルを選択してください');
    onBrowse();   // browser can't read the path → confirm via native picker
  }
});

// --- Clipboard history (③) ---
let clipTimer = null;
let currentView = 'tools';

const switchView = (v) => {
  currentView = v;
  const isClip = v === 'clip';
  $('main').style.display = isClip ? 'none' : '';
  $('clipMain').style.display = isClip ? '' : 'none';
  $('search').style.visibility = isClip ? 'hidden' : 'visible';
  $('tabTools').classList.toggle('active', !isClip);
  $('tabClip').classList.toggle('active', isClip);
  if (isClip) { loadClip(); startClipPoll(); } else { stopClipPoll(); }
};

const startClipPoll = () => { stopClipPoll(); clipTimer = setInterval(loadClip, 1500); };
const stopClipPoll = () => { if (clipTimer) { clearInterval(clipTimer); clipTimer = null; } };

const loadClip = async () => {
  try {
    const res = await fetch('/api/clipboard?t=' + Date.now());
    const r = await res.json();
    renderClip(r.items || []);
  } catch (e) {
    $('clipList').innerHTML = '<div class="empty">取得失敗</div>';
  }
};

const renderClip = (items) => {
  const box = $('clipList');
  if (!items.length) {
    box.innerHTML = '<div class="empty">履歴なし<br><br>コピーするとここに溜まります</div>';
    return;
  }
  box.innerHTML = items.map(it => {
    if (it.type === 'image') {
      return `<div class="clip-item" data-id="${it.id}" title="クリックで再コピー">
        <span class="kind">🖼</span>
        <div class="body"><img src="/api/clipboard/img/${it.id}" alt="">
        <div class="meta">${it.w}×${it.h}</div></div></div>`;
    }
    const more = it.len > it.preview.length ? ` …(${it.len}字)` : '';
    return `<div class="clip-item" data-id="${it.id}" title="クリックで再コピー">
      <span class="kind">📝</span>
      <div class="body"><div class="txt">${escapeHtml(it.preview)}</div>
      <div class="meta">${it.len}字${more ? '' : ''}</div></div></div>`;
  }).join('');
  box.querySelectorAll('.clip-item').forEach(el => {
    el.addEventListener('click', () => useClip(el.dataset.id));
  });
};

const useClip = async (id) => {
  try {
    const res = await fetch('/api/clipboard/use', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    const r = await res.json();
    if (!r.ok) throw new Error(r.error || '失敗');
    toast('クリップボードにコピー');
  } catch (e) {
    toast('コピー失敗: ' + e.message);
  }
};

const clearClip = async () => {
  if (!confirm('クリップボード履歴をすべて消去しますか？')) return;
  try {
    await fetch('/api/clipboard/clear', { method: 'POST' });
    loadClip();
    toast('履歴を消去しました');
  } catch (e) {
    toast('消去失敗: ' + e.message);
  }
};

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => switchView(t.dataset.view)));
$('clipClear').addEventListener('click', clearClip);

load();
// First launch: slide the content in on load.
requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.add('ready')));

// The slide animates BOTH ways while the window stays on the primary monitor
// (a window-position slide would cross onto monitor 2 which sits to the right,
// and Chrome clamps the min window width so a width-drawer is out — instead the
// content slides inside a fixed-size window):
//  • Slide out: the hotkey sends F14 → content slides out; it then hides the
//    window only after the animation finishes (the page can't know it's about to
//    be hidden). This also parks the content off-screen.
//  • Slide in: the hotkey just shows the window; visibilitychange→visible slides
//    the content back in. It looks clean because the prior slide-out parked it
//    off-screen. (Sending a key right after showing a hidden window is unreliable
//    — the web content isn't focused yet — so we rely on visibilitychange here.)
const slideIn  = () => requestAnimationFrame(() => document.body.classList.add('ready'));
const slideOut = () => document.body.classList.remove('ready');
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') slideIn();
});
window.addEventListener('keydown', e => {
  if (e.key === 'F13') { e.preventDefault(); slideIn(); }        // best-effort (faster when it lands)
  else if (e.key === 'F14') { e.preventDefault(); slideOut(); }
});
</script>
</body>
</html>
