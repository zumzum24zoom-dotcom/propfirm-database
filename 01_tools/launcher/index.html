<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PFD Launcher</title>
<style>
  :root {
    --bg: #0d0221;
    --bg-elev: #1a0f33;
    --fg: #e3ddff;
    --muted: #7a6bb0;
    --line: #2a1a4d;
    --line-strong: #4a2d80;
    --accent: #00e5ff;
    --accent2: #ff2e97;
    --hover: rgba(0, 229, 255, 0.08);
    --danger: #ff3864;
    --overlay: rgba(8, 2, 20, 0.78);
    --glow: 0 0 6px rgba(0, 229, 255, 0.55);
    --glow2: 0 0 6px rgba(255, 46, 151, 0.55);
  }
  * { box-sizing: border-box; }
  @keyframes fadeScaleIn {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", "Yu Gothic UI", "Hiragino Sans", system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    overflow: hidden;
  }
  body {
    display: flex; flex-direction: column; height: 100vh;
    background-image: linear-gradient(rgba(0, 229, 255, 0.025) 1px, transparent 1px);
    background-size: 100% 3px;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  header {
    flex-shrink: 0;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--line-strong);
    box-shadow: 0 1px 8px rgba(0, 229, 255, 0.12);
    background: linear-gradient(180deg, rgba(74, 45, 128, 0.25), transparent);
    backdrop-filter: blur(6px);
  }
  .titlebar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .icon-btn {
    border: 1px solid var(--line-strong);
    background: var(--bg-elev);
    color: var(--fg);
    width: 28px; height: 28px;
    border-radius: 7px;
    cursor: pointer;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .icon-btn svg { width: 15px; height: 15px; display: block; }
  .icon-btn:hover { background: var(--hover); border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); transform: translateY(-1px); }
  .icon-btn:active { transform: translateY(0) scale(0.95); }
  .icon-btn.active { background: var(--accent); border-color: var(--accent); color: #021018; box-shadow: var(--glow); }
  .tabs { display: flex; gap: 4px; margin-top: 8px; }
  .tab {
    flex: 1;
    border: 1px solid var(--line-strong);
    background: var(--bg-elev);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 0;
    font: inherit;
    font-family: "Consolas", "Cascadia Mono", monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }
  .tab.active {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
    box-shadow: var(--glow);
    background: linear-gradient(180deg, rgba(0, 229, 255, 0.14), rgba(0, 229, 255, 0.02));
  }
  .tab:hover { background: var(--hover); }
  #search {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    font: inherit;
    color: var(--fg);
    background: var(--bg-elev);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); box-shadow: var(--glow); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px 14px;
  }
  .cat-section { margin-bottom: 14px; }
  .cat-section h2 {
    margin: 6px 0 6px;
    padding-left: 8px;
    font-size: 10px;
    font-weight: 600;
    font-family: "Consolas", "Cascadia Mono", monospace;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent2);
    border-left: 2px solid var(--accent2);
    box-shadow: -1px 0 6px rgba(255, 46, 151, 0.4);
  }
  .row {
    display: flex; align-items: stretch;
    border: 1px solid var(--line);
    border-radius: 7px;
    margin-bottom: 5px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--bg-elev), rgba(74, 45, 128, 0.18));
    animation: slideUp 0.25s ease both;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .row:hover { border-color: var(--accent); box-shadow: var(--glow); transform: translateY(-1px); }
  .row .open {
    flex: 1;
    padding: 9px 11px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    min-width: 0;
  }
  .row .open:hover { background: var(--hover); }
  .row .name {
    display: flex; align-items: center; gap: 6px;
    font-weight: 600; white-space: nowrap; overflow: hidden;
  }
  .row .name .name-text { overflow: hidden; text-overflow: ellipsis; }
  .row .desc { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .edit {
    border: none; border-left: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--muted);
    cursor: pointer;
    padding: 0 11px;
    font-size: 13px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .row .edit:hover { background: var(--hover); color: var(--accent); }
  .num-badge {
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-size: 10px;
    font-family: "Consolas", "Cascadia Mono", monospace;
    border-radius: 2px;
    box-shadow: var(--glow2);
  }

  .empty {
    color: var(--muted);
    padding: 24px;
    text-align: center;
    font-size: 12px;
  }
  footer {
    flex-shrink: 0;
    padding: 6px 14px;
    border-top: 1px solid var(--line-strong);
    color: var(--muted);
    font-family: "Consolas", "Cascadia Mono", monospace;
    font-size: 10px;
    display: flex; justify-content: space-between;
  }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: var(--overlay);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: linear-gradient(160deg, var(--bg-elev), rgba(74, 45, 128, 0.3));
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    width: 92%; max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 16px 18px;
    box-shadow: 0 0 24px rgba(0, 229, 255, 0.25), 0 12px 32px rgba(0,0,0,0.5);
    animation: fadeScaleIn 0.18s ease both;
  }
  .modal h3 {
    margin: 0 0 12px;
    font-size: 13px;
    font-weight: 600;
    font-family: "Consolas", "Cascadia Mono", monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: var(--glow);
  }
  .field { margin-bottom: 10px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
    letter-spacing: 0.04em;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 6px 9px;
    border: 1px solid var(--line-strong);
    border-radius: 5px;
    font: inherit;
    color: var(--fg);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: var(--glow); }
  .field textarea { resize: vertical; min-height: 50px; }
  .field .hint { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .modal-actions {
    display: flex; gap: 8px; margin-top: 14px;
    justify-content: flex-end;
  }
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--line-strong);
    background: var(--bg-elev);
    color: var(--fg);
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .btn:hover { background: var(--hover); border-color: var(--accent); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.primary {
    background: var(--accent);
    color: #021018;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { opacity: 0.9; background: var(--accent); box-shadow: var(--glow); }
  .btn.danger {
    color: var(--danger);
    border-color: var(--danger);
    margin-right: auto;
  }
  .btn.danger:hover { background: rgba(255, 56, 100, 0.1); box-shadow: 0 0 6px rgba(255, 56, 100, 0.5); }

  .toast {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elev); color: var(--accent);
    border: 1px solid var(--accent);
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 12px;
    font-family: "Consolas", "Cascadia Mono", monospace;
    box-shadow: var(--glow);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="titlebar">
    <button id="pinBtn" class="icon-btn" title="最前面に固定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 3h6l1.2 6.5L19 12v2H5v-2l2.8-2.5z"/></svg>
    </button>
    <div style="display:flex; gap:6px;">
      <button id="addBtn" class="icon-btn" title="ツールを追加">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
  <input id="search" type="text" placeholder="検索">
  <div class="tabs">
    <button class="tab active" data-tab="tools">Tools</button>
    <button class="tab" data-tab="clipboard">Clipboard</button>
  </div>
</header>

<main id="main">
  <div class="empty">読み込み中…</div>
</main>

<main id="clipMain" style="display:none">
  <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
    <button class="btn" id="clipClearBtn" style="font-size:11px; padding:4px 10px;">全削除</button>
  </div>
  <div id="clipList"></div>
</main>

<footer>
  <span id="footerInfo"></span>
  <span id="footerStatus"></span>
</footer>

<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">ツールを追加</h3>
    <div class="field">
      <label>名前 *</label>
      <input id="f_name" type="text" placeholder="Page Maker v12">
    </div>
    <div class="field">
      <label>種別</label>
      <select id="f_type">
        <option value="html">ページ（HTML / URL）</option>
        <option value="exe">アプリ（exe・ファイル）</option>
        <option value="pwa">インストール済みアプリ（PWA等）</option>
      </select>
    </div>
    <div class="field" id="pathField">
      <label>パス *</label>
      <div style="display:flex; gap:6px;">
        <input id="f_path" type="text" placeholder="/01_tools/core/page-maker-v12.html" style="flex:1;">
        <button type="button" class="btn" id="browseBtn" title="ファイル選択" style="padding:6px 10px;">📁</button>
      </div>
      <div class="hint" id="pathHint">サーバルート起点（例: /01_tools/core/xxx.html）または http(s)://...</div>
    </div>
    <div class="field" id="pwaField" style="display:none;">
      <label>アプリ選択 *</label>
      <select id="f_pwa"></select>
    </div>
    <div class="field">
      <label>カテゴリ</label>
      <select id="f_category"></select>
    </div>
    <div class="field">
      <label>説明</label>
      <textarea id="f_description" placeholder="短い説明（省略可）"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="deleteBtn" style="display:none">削除</button>
      <button class="btn" id="cancelBtn">キャンセル</button>
      <button class="btn primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let data = { categories: {}, tools: [] };
let query = '';
let editingIdx = -1;
let quickList = [];

const launchTool = async (t, pane = 'left') => {
  if (t.type === 'exe' || t.type === 'pwa') {
    try {
      const res = await fetch('/api/launch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: t.path, type: t.type }),
      });
      const r = await res.json();
      if (!r.ok) toast('起動失敗: ' + r.error);
    } catch (err) {
      toast('起動失敗: ' + err.message);
    }
  } else {
    // 数字キー=左ペイン / Alt+数字=右ペイン。両ペインが埋まると agent 側が
    // 自動で左右半分にタイルする（位置・サイズ計算と再タイルは agent が担当）。
    try {
      await fetch('/api/open-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: t.path, pane }),
      });
    } catch (err) {
      toast('起動失敗: ' + err.message);
    }
  }
};

const toast = (msg) => {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 1600);
};

const load = async () => {
  try {
    const res = await fetch('/api/tools?t=' + Date.now());
    data = await res.json();
    if (!data.tools) data.tools = [];
    if (!data.categories) data.categories = {};
    populateCatSelect();
    render();
  } catch (e) {
    $('main').innerHTML = '<div class="empty">読み込み失敗: ' + escapeHtml(e.message) + '</div>';
  }
};

const save = async () => {
  const payload = { categories: data.categories, tools: data.tools };
  try {
    const res = await fetch('/api/tools', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const r = await res.json();
    if (!r.ok) throw new Error(r.error || 'save failed');
    toast('保存しました');
    return true;
  } catch (e) {
    toast('保存失敗: ' + e.message);
    return false;
  }
};

const populateCatSelect = () => {
  const sel = $('f_category');
  const cats = Object.entries(data.categories).sort((a,b)=>(a[1].order??99)-(b[1].order??99));
  sel.innerHTML = cats.map(([k, v]) => `<option value="${escapeHtml(k)}">${escapeHtml(v.label||k)}</option>`).join('')
    + '<option value="misc">misc</option>';
};

const render = () => {
  const main = $('main');
  const q = query.trim().toLowerCase();
  const visible = data.tools.filter(t => !t.hidden);
  const filtered = visible.filter(t => {
    if (!q) return true;
    return t.name.toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q);
  });

  if (filtered.length === 0) {
    main.innerHTML = visible.length === 0
      ? '<div class="empty">ツール未登録<br><br>右上の ＋ から追加</div>'
      : '<div class="empty">該当なし</div>';
    $('footerInfo').textContent = filtered.length + ' / ' + visible.length;
    return;
  }

  const groups = {};
  filtered.forEach((t, i) => {
    const idx = data.tools.indexOf(t);
    const c = t.category || 'misc';
    (groups[c] = groups[c] || []).push({ t, idx });
  });
  const catOrder = Object.keys(groups).sort((a, b) =>
    (data.categories[a]?.order ?? 99) - (data.categories[b]?.order ?? 99));

  quickList = [];
  catOrder.forEach(c => groups[c].forEach(({ t }) => quickList.push(t)));
  quickList = quickList.slice(0, 9);

  main.innerHTML = catOrder.map(c => {
    const label = data.categories[c]?.label || c;
    const rows = groups[c].map(({ t, idx }) => {
      const qn = quickList.indexOf(t);
      const badge = qn >= 0 ? `<span class="num-badge" title="${qn + 1}キー=左に起動 / Alt+${qn + 1}=右に分割">${qn + 1}</span>` : '';
      const inner = `<div class="name">${badge}<span class="name-text">${escapeHtml(t.name)}</span></div>${t.description ? `<div class="desc">${escapeHtml(t.description)}</div>` : ''}`;
      const open = `<a class="open" href="#" data-launch="${idx}">${inner}</a>`;
      return `
      <div class="row">
        ${open}
        <button class="edit" data-idx="${idx}" title="編集">⋯</button>
      </div>
    `;
    }).join('');
    return `<section class="cat-section"><h2>${escapeHtml(label)}</h2>${rows}</section>`;
  }).join('');

  main.querySelectorAll('.edit').forEach(btn => {
    btn.addEventListener('click', () => openEditModal(parseInt(btn.dataset.idx, 10)));
  });
  main.querySelectorAll('[data-launch]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      launchTool(data.tools[parseInt(el.dataset.launch, 10)]);
    });
  });

  $('footerInfo').textContent = filtered.length + ' / ' + visible.length;
};

const PWA_HINTS = {
  html: 'サーバルート起点（例: /01_tools/core/xxx.html）または http(s)://...',
  exe: 'ローカルのファイルパス（例: C:\\Apps\\foo.exe）',
  pwa: '',
};

let pwaApps = null;

const loadPwaApps = async () => {
  if (pwaApps) return pwaApps;
  try {
    const res = await fetch('/api/apps');
    const r = await res.json();
    pwaApps = r.ok ? r.apps : [];
  } catch (e) {
    pwaApps = [];
  }
  $('f_pwa').innerHTML = pwaApps.map(a => `<option value="${escapeHtml(a.appid)}">${escapeHtml(a.name)}</option>`).join('');
  return pwaApps;
};

const applyTypeUI = async (type) => {
  $('pathField').style.display = type === 'pwa' ? 'none' : '';
  $('pwaField').style.display = type === 'pwa' ? '' : 'none';
  $('pathHint').textContent = PWA_HINTS[type] || '';
  if (type === 'pwa') await loadPwaApps();
};

$('f_type').addEventListener('change', () => applyTypeUI($('f_type').value));

const openAddModal = () => {
  editingIdx = -1;
  $('modalTitle').textContent = 'ツールを追加';
  $('deleteBtn').style.display = 'none';
  $('f_name').value = '';
  $('f_path').value = '';
  $('f_type').value = 'html';
  $('f_category').value = Object.keys(data.categories)[0] || 'misc';
  $('f_description').value = '';
  applyTypeUI('html');
  $('modal').classList.add('open');
  setTimeout(() => $('f_name').focus(), 50);
};

const openEditModal = async (idx) => {
  editingIdx = idx;
  const t = data.tools[idx];
  $('modalTitle').textContent = 'ツールを編集';
  $('deleteBtn').style.display = '';
  $('f_name').value = t.name || '';
  $('f_path').value = t.path || '';
  $('f_type').value = t.type || 'html';
  $('f_category').value = t.category || 'misc';
  $('f_description').value = t.description || '';
  await applyTypeUI($('f_type').value);
  if ($('f_type').value === 'pwa') $('f_pwa').value = t.path || '';
  $('modal').classList.add('open');
  setTimeout(() => $('f_name').focus(), 50);
};

const closeModal = () => $('modal').classList.remove('open');

const onSave = async () => {
  const name = $('f_name').value.trim();
  const type = $('f_type').value;
  const path = type === 'pwa' ? $('f_pwa').value : $('f_path').value.trim();
  if (!name || !path) { toast('名前とパスは必須'); return; }
  const tool = {
    name,
    path,
    type,
    category: $('f_category').value || 'misc',
    description: $('f_description').value.trim(),
  };
  if (type === 'html') delete tool.type;
  if (!tool.description) delete tool.description;

  if (editingIdx >= 0) {
    data.tools[editingIdx] = tool;
  } else {
    data.tools.push(tool);
  }
  if (await save()) {
    closeModal();
    render();
  }
};

const onDelete = async () => {
  if (editingIdx < 0) return;
  if (!confirm(`「${data.tools[editingIdx].name}」を削除しますか？`)) return;
  data.tools.splice(editingIdx, 1);
  if (await save()) {
    closeModal();
    render();
  }
};

const onBrowse = async () => {
  const btn = $('browseBtn');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '…';
  try {
    const htmlFilter = $('f_type').value === 'html' ? '&html=1' : '';
    const res = await fetch('/api/browse?t=' + Date.now() + htmlFilter);
    const r = await res.json();
    if (r.cancelled) return;
    if (!r.ok) { toast(r.error || '選択に失敗'); return; }
    $('f_path').value = r.path;
    if (!$('f_name').value.trim() && r.name) {
      $('f_name').value = r.name;
    }
    $('f_name').focus();
  } catch (e) {
    toast('選択に失敗: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
};

// -- Clipboard panel --------------------------------------------------
let clipPoll = null;

const loadClipboard = async () => {
  try {
    const res = await fetch('/api/clipboard?t=' + Date.now());
    const r = await res.json();
    renderClipboard(r.items || []);
  } catch (e) {
    $('clipList').innerHTML = '<div class="empty">読み込み失敗: ' + escapeHtml(e.message) + '</div>';
  }
};

const renderClipboard = (items) => {
  const list = $('clipList');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty">履歴なし</div>';
    return;
  }
  list.innerHTML = items.map(it => {
    const body = it.type === 'image'
      ? `<img src="/api/clipboard/image/${escapeHtml(it.image_file)}" style="max-width:100%; max-height:120px; display:block; border-radius:3px; object-fit:contain;">`
      : `<div class="desc" style="white-space:pre-wrap; -webkit-line-clamp:3; display:-webkit-box; -webkit-box-orient:vertical; overflow:hidden; color:var(--fg);">${escapeHtml(it.preview)}</div>`;
    return `
      <div class="row" style="flex-direction:column; align-items:stretch;">
        <div style="padding:8px 11px;">${body}</div>
        <div style="display:flex; border-top:1px solid var(--line);">
          <button class="edit" style="flex:1; border-left:none;" data-restore="${it.id}">コピー</button>
          <button class="edit" data-delete="${it.id}">削除</button>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('[data-restore]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const res = await fetch('/api/clipboard/restore', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: btn.dataset.restore }),
      });
      const r = await res.json();
      toast(r.ok ? 'コピーしました' : '失敗: ' + r.error);
    });
  });
  list.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch('/api/clipboard/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: btn.dataset.delete }),
      });
      loadClipboard();
    });
  });
};

$('clipClearBtn').addEventListener('click', async () => {
  if (!confirm('クリップボード履歴を全削除しますか？')) return;
  await fetch('/api/clipboard/clear', { method: 'POST' });
  loadClipboard();
});

// -- Tabs ---------------------------------------------------------------
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
    const isClipboard = btn.dataset.tab === 'clipboard';
    $('main').style.display = isClipboard ? 'none' : '';
    $('clipMain').style.display = isClipboard ? '' : 'none';
    $('search').style.display = isClipboard ? 'none' : '';
    if (isClipboard) {
      loadClipboard();
      if (!clipPoll) clipPoll = setInterval(loadClipboard, 3000);
    } else if (clipPoll) {
      clearInterval(clipPoll);
      clipPoll = null;
    }
  });
});

// -- Pin (always-on-top) -------------------------------------------------
let pinned = false;
$('pinBtn').addEventListener('click', async () => {
  const next = !pinned;
  try {
    const res = await fetch('/api/window/topmost', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ on: next }),
    });
    const r = await res.json();
    if (!r.ok) { toast('失敗: ' + r.error); return; }
    pinned = next;
    $('pinBtn').classList.toggle('active', pinned);
  } catch (e) {
    toast('失敗: ' + e.message);
  }
});

$('addBtn').addEventListener('click', openAddModal);
$('cancelBtn').addEventListener('click', closeModal);
$('saveBtn').addEventListener('click', onSave);
$('deleteBtn').addEventListener('click', onDelete);
$('browseBtn').addEventListener('click', onBrowse);
$('search').addEventListener('input', e => { query = e.target.value; render(); });
$('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
// Altキー単独はWindowsメニューバーをアクティブ化してフォーカスを奪うため抑止
// (capture段階でpreventDefault+stopPropagationしないとAlt+数字が拾えない)
window.addEventListener('keydown', e => {
  if ((e.key === 'Alt' || e.altKey) && !e.ctrlKey && !e.metaKey) {
    // Alt単独 or Alt+数字 はメニュー有効化を防ぐ
    if (e.key === 'Alt' || (e.code && (e.code.startsWith('Digit') || e.code.startsWith('Numpad')))) {
      e.preventDefault();
    }
  }
}, true);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    document.activeElement?.blur();
    return;
  }
  // 入力欄にフォーカス中は数字をそのまま入力させる
  const tag = document.activeElement?.tagName;
  const typing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
  const isDigit = (e.code >= 'Digit1' && e.code <= 'Digit9') || (e.code >= 'Numpad1' && e.code <= 'Numpad9');
  if (!typing && !e.ctrlKey && !e.metaKey && isDigit) {
    const n = e.code.startsWith('Numpad') ? e.code.slice(6) : e.code.slice(5);
    const t = quickList[parseInt(n, 10) - 1];
    if (t) {
      e.preventDefault();
      // 数字キー = 左側(右側未使用なら全幅), Alt+数字キー = 右半分。順序に関わらず両方開いていれば左右に並ぶ
      launchTool(t, e.altKey ? 'right' : 'left');
    }
  }
});

// Insert で表示された直後にウィンドウへフォーカスを当てて数字キーを即受け取れるようにする
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    try { window.focus(); } catch {}
  }
});
window.addEventListener('focus', () => {
  try { document.body && document.body.focus({ preventScroll: true }); } catch {}
});

load();
</script>
